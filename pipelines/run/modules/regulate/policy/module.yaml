#
# 🔟❎ 'run' policy lookup output module

module:

  name: policyInput

  title: Policy regulator lookup input

  description: generate a regulator event rate policy lookup file

  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: run/regulate/policy

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: +include $=TenXEnv.get("docGenerate") ? "run/modules/regulate/policy/doc.md":""

  # 'allowMultiple' is disabled for this module. Pipeline command line arguments and configuration files
  #  can specify a single value at max for each option defined below.
  allowMultiple: true

  # 'options' defines a group of named/typed configuration values to pass to a unit/module at startup
  #  via command line arguments (e.g., '> tenx -myA X -myB Y') or YAML launch files (e.g., '> tenx @my.config').
  #  Instances of this group passed are accessible at runtime via TenXEnv.get: https://doc.log10x.com/api/js/#TenXEnv.get
  options:

  # --------------------------- Prometheus Options ----------------------------

    - names:
      - policyPrometheusEndpoint
      description: prometheus instance endpoint
      type: string
      required: false
      category: prometheus
      doc: |
        defines the address of the Prometheus [HTTP API](https://prometheus.io/docs/prometheus/latest/querying/api/) to query
      defValue: https://prometheus.log10x.com

    - names:
      - policyPrometheusSeries
      description: prometheus series to query
      type: string
      required: false
      category: prometheus
      doc: |
        defines the name of the series to query for events volume in bytes
      defValue: all_events_summaryBytes_total

    - names:
      - policyPrometheusLabels
      description: Prometheus metric labels for grouping
      type: list
      required: true
      category: prometheus
      doc: |
        specifies the list of metric labels to group by in the Prometheus query.

        NOTE: this list must match the [rateRegulatorFieldNames](https://doc.log10x.com/run/regulate/rate/#rateRegulatorFieldNames) specified by the edge rate regulator.

      defValue: [symbolMessage]

    - names:
      - policyPrometheusApps
      description: Prometheus metric app names
      type: list
      required: false
      category: prometheus
      doc: |
        specifies the list of 10x edge app names to specify in the Prometheus query.

      defValue: reporter|regulator|optimizer

    - names:
      - policyPrometheusStart
      description: query start time
      type: string
      required: false
      category: prometheus
      doc: |
        sets query's beginning timestamp for Prometheus data retrieval (e.g., 2025-10-13T23:29:23Z, 1736724563).
      defValue: $=now() / 1000

    - names:
      - policyPrometheusRangeInterval
      description: query time range interval
      type: string
      required: true
      category: prometheus
      doc: |
        defines the time range interval for the Prometheus range query (e.g., '5m', '1h')
      defValue: 6h

    - names:
      - policyPrometheusStepDuration
      description: query resolution step duration
      type: string
      required: true
      category: prometheus
      doc: |
        defines the query resolution step duration for the Prometheus range query (e.g., '30s', '1m')
      defValue: 5m

    - names:
      - policyPrometheusTopEvents
      description: number of top events to return from Prometheus query
      type: number
      required: false
      category: prometheus
      defValue: 50
      doc: |
        specifies the number of highest-rate event patterns to return using the Prometheus [topk operator](https://prometheus.io/docs/prometheus/latest/querying/operators/#aggregation-operators)

  # ------------------------ Ingestion Cost Options ---------------------------

    - names:
      - policyIngestionCostPerGB
      description: vendor ingestion cost per GB in USD for cost calculation
      type: number
      required: false
      category: cost
      defValue: 1.5
      doc: |
        defines the cost per GB charged by your observability vendor for log ingestion.
        Used to calculate cost-per-hour data for each event pattern in the generated lookup file.

        Edge rate regulators in global mode use this cost data (from the lookup) to enforce cluster-wide budget policies.

        **Important:** This value should match[rateRegulatorIngestionCostPerGB](https://doc.log10x.com/run/regulate/policy/#policyingestioncostpergb) configured on your edge rate regulators.

        **Common vendor pricing (2025):**
        - **Splunk Cloud**: ~$1.50/GB (varies by contract, SKU)
        - **Datadog Logs**: ~$0.10-$0.25/GB (depends on tier: standard, flex, online archives)
        - **Elastic Cloud**: ~$0.109/GB (standard logging tier)
        - **New Relic**: ~$0.30/GB (Data Plus)
        - **Sumo Logic**: ~$1.50/GB (depends on plan)
        - **AWS CloudWatch Logs**: ~$0.50/GB ingestion + $0.03/GB storage

        **Example:** If your Splunk contract is $1.50/GB and you emit 100GB/hour across all apps, the total cost is $150/hour. The policy module calculates per-event-pattern costs (e.g., "error_login|frontend" = $20/hour) and writes them to the lookup. Edge regulators then enforce per-app or per-pattern caps based on this data.

  # -------------------------- Output lookup Options --------------------------

    - names:
      - policyOutputPath
      description: output path for the generated policy lookup file
      type: string
      required: true
      category: output
      doc: |
        defines the output path for the policy lookup file containing cluster-wide spend data (per field set and total) averaged over the configured time range.

        **Behavior depends on `policyOutputGithubRepo`:**

        - **If [policyOutputGithubRepo](https://doc.log10x.com/run/regulate/policy/#policyoutputgithubrepo) is NOT set**: Local file path where the lookup will be written (e.g., `/tmp/rate-policy.csv`, `./policies/rate-lookup.csv`)
        - **If [policyOutputGithubRepo](https://doc.log10x.com/run/regulate/policy/#policyoutputgithubrepo) IS set**: Path within the GitHub repository where the lookup will be pushed (e.g., `policies/rate-lookup.csv`, `rate-policy.csv`)

        Edge rate regulators in global mode pull this file to enforce cluster-wide budgets.

    - names:
      - policyOutputGithubRepo
      description: GitHub repository to push the policy lookup file
      type: string
      category: output
      required: false
      doc: |
        defines the GitHub repository (format: `owner/repo`) where the generated policy lookup file will be pushed.
        Used for sharing the lookup with distributed edge rate regulators.

        Requires GitHub authentication (via token or SSH key).

        **Example:** `my-org/observability-policies`

    - names:
      - policyOutputGithubBranch
      description: GitHub branch for pushing the policy lookup file
      type: string
      category: output
      required: false
      doc: |
        defines the Git branch to use when pushing the policy lookup file to GitHub.

        **Example:** `main`, `production`, or `policies`
      defValue: main

    - names:
      - policyOutputGithubSquashMerge
      description: use squash merge when merging GitHub pull requests
      type: boolean
      category: output
      required: false
      doc: |
        specifies whether to use squash merge (true) or regular merge (false) when merging pull requests to GitHub.
        Squash merge combines all commits into a single commit, resulting in a cleaner commit history.
        This is particularly useful for automated policy updates that run frequently (e.g., every 5 minutes).

        **Recommendation:** Enable this for production environments with frequent policy updates.
      defValue: true
