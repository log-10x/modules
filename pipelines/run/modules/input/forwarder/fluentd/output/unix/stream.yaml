# 🔟❎ 'run' Fluentd forward output stream configuration

# This configuration defines a Unix domain socket output to write
# encoded/plain-text TenXObjects to a Fluentd forwarder host process via the native Fluentd 'forward' protocol.

#  To learn more see: https://github.com/fluent/fluent-bit-docs/blob/master/pipeline/outputs/forward.md

# Set the 10x pipeline to 'run'
tenx: run

# =============================== Dependencies ================================

include:

  - source: match
    options:

      # Capture 'rawOutputForwardAddress' from tenx-unix-source.conf value as a 10x env variable
      path: run//modules/input/forwarder/fluentd/conf/auxiliary/tenx-unix-source.conf
      regex: "^\\s*path\\s+(?<rawOutputForwardAddress>.*?)$"

    # load the forward protocol over the Unix domain socket module
  - run/modules/output/event/forward

# ============================= Output Options ================================

# 'outputForward' defines the output used to write to the Fluentd forwarder
outputForward:

    # Write objects in plain-text form using the intrinsic 'fullText' field if 'encodeObjects' is NOT set.
  - writeObjects: /$=!TenXEnv.get("encodeObjects")

    # Sets Unix domain socket address from the value read from tenx-unix-source.conf (see above)
    address: $=rawOutputForwardAddress

    # 'fields' is set to the 'fullText', which contains the TenXObject's original text
    fields:
      - fullText
      - $?fluentdOutputFields
    encodeType: $?fluentdOutputEncodeType
    encodeDelimiter: ","

    # Do not encode templates
    writeTemplates: false

    # Write objects in encoded form using encode() function if 'encodeObjects' is set.
    # To learn more see https://doc.log10x.com/api/js/#TenXObject+encode
  - writeObjects: /$=TenXEnv.get("encodeObjects")

    # Sets Unix domain socket address from the value read from tenx-unix-source.conf (see above)
    address: $=rawOutputForwardAddress

    # 'fields' is set to the return value of the encode() function
    #  https://doc.log10x.com/api/js/#TenXObject+encode
    fields:
      - 'encoded=shouldEncode() ? encode() : fullText'
      - $?fluentdOutputFields
    encodeType: $?fluentdOutputEncodeType
    encodeDelimiter: ","

    # Encode templates in JSON format.
    # To learn more about TenXTemplates, see: https://doc.log10x.com/run/template
    # Only write the templates when also encoding objects.
    writeTemplates: /$=TenXEnv.get("encodeObjects")
