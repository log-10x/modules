#
#  🔟❎ OpenTelemetry Collector Optimize module

module:

  name: otelCollectorOptimize

  title: OpenTelemetry Collector optimizer

  description: optimize events collected by OpenTelemetry Collector forwarders

  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: run/input/forwarder/otel-collector/optimize

  configSort:
    otelCollectorOptimize: [config, tenx-splunk, tenx-elastic]

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: '+include $=TenXEnv.get("docGenerate") ? "run/modules/input/forwarder/otel-collector/optimize/doc.md":""'

  allowMultiple: false

  options:

    - names:
      - otelCollectorEncodeObjects
      description: controls whether events written to an OpenTelemetry Collector forwarder are encoded or written in raw form
      type: boolean
      required: false
      defValue: true
      doc: |
        sets the format in which to serialize TenXObjects back to the OpenTelemetry Collector forwarder.
        If true, write events using the [encode](https://doc.log10x.com/api/js/#TenXObject+encode) function.
        If false, write events in their original form as read from the OpenTelemetry Collector forwarder
        using the [fullText](https://doc.log10x.com/api/js/#TenXBaseObject+fullText) field.

    - names:
      - otelCollectorOutputFields
      description: list of TenXObject field names to include alongside the main event in output
      type: list
      required: false
      defValue: []
      doc: |
        specifies TenXObject field names to emit alongside the main event text
        when writing back to the OpenTelemetry Collector forwarder. When empty (default), only
        the main event field is written. Example fields: level, group, symbolMessage.

    - names:
      - otelCollectorOutputEncodeType
      description: "output format when outputFields are set. Possible values: [json, delimited]"
      type: string
      required: false
      defValue: delimited
      doc: |
        specifies how the combined output (main event field plus outputFields)
        is encoded when writing back to the OpenTelemetry Collector forwarder. Possible values:
        - **json**: formats all fields as a JSON object
        - **delimited**: formats field values separated by the output delimiter
        Only takes effect when otelCollectorOutputFields is set.

