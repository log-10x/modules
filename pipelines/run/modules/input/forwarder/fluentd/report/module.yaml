#
#  🔟❎ Fluentd Report module

module:

  name: fluentdReport

  title: Fluentd reporter

  description: read  events from a Fluentd forwarder

  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: run/input/forwarder/fluentd/report

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: '+include $=TenXEnv.get("docGenerate") ? "run/modules/input/forwarder/fluentd/report/doc.md":""'    
