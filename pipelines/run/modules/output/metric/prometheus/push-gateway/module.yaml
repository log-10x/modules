#
# 🔟❎ 'run' Prometheus push gateway metrics output module

module:

  name: prometheusPGMetrics

  title: Prometheus Push gateway metrics output

  description: publish TenXSummary metrics to Prometheus via a Push gateway

  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: run/output/metric/prometheus/push-gateway

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: +include $=TenXEnv.get("docGenerate") ? "run/modules/output/metric/prometheus/push-gateway/doc.md":""

  # 'allowMultiple' is enabled for this module. Pipeline command line arguments and configuration files
  #  can specify multiple groupings of the options defined below.
  allowMultiple: true

  # 'options' defines a group of named/typed configuration values to pass to a unit/module at startup
  #  via command line arguments (e.g., '> tenx -myA X -myB Y') or YAML launch files (e.g., '> tenx @my.config').
  #  Instances of this group passed are accessible at runtime via TenXEnv.get: https://doc.log10x.com/api/js/#TenXEnv.get
  options:

    - names:
      - prometheusPGEnabled
      description: enable this output
      type: boolean
      required: false
      category: general
      defValue: true
      doc: |
        enable or disable this output.

    - names:
        - prometheusPGHost
      description: Host address of Prometheus push gateway instance to push data to
      type: string
      required: true
      category: connection
      doc: |
        defines the host address of the push gateway used for pushing the metrics.

    - names:
        - prometheusPGJob
      description: Name of job assigned to pushed metrics
      type: string
      required: true
      category: connection
      doc: |
        defines the name of the job that to assign to output metrics.

    - names:
        - prometheusPGStep
      description: the interval at which to publish metrics to output
      required: false
      type: string
      category: counter
      doc: |
        sets the interval at which to publish metrics to the time-series destination (e.g., '1m').
        To learn more see [rate-aggregation](https://micrometer.io/docs/concepts#rate-aggregation)
      defValue: 1min

    - names:
        - prometheusPGNameField
      description: name of the TenXSummary field identifying the metric
      type: string
      required: false
      category: counter
      doc: |
        defines the name of the TenXSummary field whose value identifies a metric counter.
        Defaults to the [summaryValues](https://doc.log10x.com/api/js/#TenXSummary+summaryValues) field which holds the value(s) by which TenXObjects are
        grouped into the current TenXSummary instance.
        To learn more see [micrometer counters](https://www.baeldung.com/micrometer#2-counter)
      defValue: "[summaryValues](https://doc.log10x.com/api/js/#TenXSummary+summaryValues)"

    - names:
        - prometheusPGCounterFields
      description: names of the TenXSummary fields used to increment the metric counter value
      type: list
      required: false
      category: counter
      doc: |
        defines the name of the TenXSummary field by whose value to increment the counter.
      defValue: "[summaryVolume](https://doc.log10x.com/api/js/#TenXSummary+summaryVolume)"

    - names:
        - prometheusPGTagFields
      description: list of TenXSummary fields to use as metric tag values
      type: list
      required: false
      category: counter
      doc: |
        defines the TenXSummary field names to use as `tag` values.
        Tags are dimensions that enable slicing a particular named metric to drill down to reason about its value.
        To learn more see [micrometer tags](https://www.baeldung.com/micrometer#1-tags)

    - names:
        - prometheusPGTagFieldNames
      description: list of custom names to use for TenXSummary fields.
      type: list
      required: false
      category: counter
      doc: |
        defines the a list of custom names to give fields when reporting them.
        Format as a list of name1, custom1, name2, custom2.

        For example, to set a custom name of 'My-Custom-Field' to an existing 'intrinsic-field':
        ``` yaml
        prometheusPG:
          tagFieldNames:
            - intrinsic-field
            - My-Custom-Field

    - names:
      - prometheusPGFilter
      description: a JavaScript expression an TenXSummary must evaluate as 'truthy' against to be written to this output
      type: string
      required: false
      category: counter
      doc: |
        Specifies a JavaScript expression that an TenXSummary must evaluate as truthy to write its
        instance/template field values to the target counter.

        For example, to only emit TenXSummaries produced by the 'myMetric' aggregator, specify:
        ``` yaml
        prometheusPG:
          filter: this.inputName == "myMetric"
        ```

        To learn more see [inputName](https://doc.log10x.com/api/js/#TenXBaseObject+inputName)

    - names:
      - prometheusPGMaxCardinality
      description: maximum number of unique metric combinations allowed
      type: number
      required: false
      category: counter
      doc: |
        sets the maximum number of unique metric combinations (cardinality) allowed for this output.
        When exceeded, metrics will be dropped to prevent excessive cardinality.
      defValue: 500
