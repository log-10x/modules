# 🔟❎ 'run' File input stream configuration

# The 'fileInput' module defines a disk file/glob input from which to read
# events to transform into TenXObjects.

# Input streams are read once from disk and NOT tailed.

# Set the 10x pipeline to 'run'
tenx: run

# define an extractor to extract results from the Prometheus query response
# extractor:

#   - name: metric
#     type: json

#     actions:
#       - captureAll:result

#groupExpressions:
#  - extractorKey == "symbolMessage"

input:

    # 'name' defines a logical name for this input.
    #  This value identifies TenXObjects instantiated from this input via their 'inputName' field
  - name: $inputFilePath
    
    # 'type' defines the type of input (e.g., stdin, file, stream).
    type: file

    # 'path' defines the file/glob pattern path on disk
    path: $inputFilePath

    # 'enabled' specifies wither the input is open
    enabled: $?inputFileEnabled=true
 
    # 'extractors' are set to the 'inputFileExtractors' argument
   #extractors: 
   #   - $?inputFileExtractors
    
    # 'sourcePattern' is set to the 'inputFileSourcePattern' argument    
    sourcePattern: $?inputFileSourcePattern

    # 'sourcePattern' is set to the 'inputFileSourcePattern' argument    
    sourceFields: 
      - $?inputFileSourceFields

    printProgress: $?inputFilePrintProgress=true

    # the 'foreach' macro will duplicate the input node for every instance of the
    #'fileInput' option group
    foreach: fileInput

    #extractors:
    #  - metric

