#
# 🔟❎ 'run' output streams unit

unit:

  name: outputStreams

  title: Custom output

  description: write TenXObjects to custom event and metric destinations. 
    
  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: +include $=TenXEnv.get("docGenerate") ? "run/units/output/stream/doc.md":""

  # 'allowMultiple' is enabled for this unit. Pipeline command line arguments and configuration files
  #  can specify multiple groupings of the options defined below.
  allowMultiple: true

  # 'options' defines a group of named/typed configuration values to pass to a pipeline unit/module at startup
  #  via command line arguments (e.g., '> tenx -myA X -myB Y') or YAML launch files (e.g., '> tenx @my.config').
  #  Instances of this group passed to the pipeline are accessible at runtime via the TenXEnv JavaScript class.
  options:

    - names:
      - outputEnabled
      description: a JavaScript expression that must be evaluated as 'truthy' to enable this output
      type: string
      required: false
      category: general      
      doc: |
        enables/disables this output stream. If set, the JavaScript expression must be truthy
        to open the output. 

    - names:
      - outputName
      description: logical name for the output stream 
      type: string
      required: true
      category: general      
      doc: |
        defines a unique logical name for the output (e.g., `datadog`). 
        Each TenXObject will return this value via its [outputName](https://doc.log10x.com/api/js/#TenXOutput+outputName) field. 
   
    - names:
      - outputFilter
      description: a JavaScript expression an TenXObject must evaluate as 'truthy' against to be encoded
      type: string
      category: general      
      required: false
      doc: |
        defines a JavaScript expression an TenXObject must evaluate as truthy against 
        to be written the target output. This filter operates in an AND relationship with the
         [outputFilters](https://doc.log10x.com/run/output/regulate/#outputfilters) regulator argument (i.e., both must be evaluated as truthy to pass)  
 
    - names:
      - outputType
      description: type of destination output. Possible values:[file, stdout, event, metric, stream]
      type: string
      required: true
      category: general      
      doc: |
        defines the mechanism for writing TenXObject, template and summary instance field values to this output.
        
        Possible values: 

        - **file**: emit field values to a file on disk.

        - **stdout**: emit field values to stdout/err device.

        - **event**: utilizes the java log4j2 library to emit TenXObjects into a wide array of 
           output destinations via log4j appenders (e.g., file, socket, http).
           To learn more see [appender](https://doc.log10x.com/run/output/event/appender) outputs.

        - **metric**: utilizes the [Micrometer library](https://micrometer.io/)  to 
           emit [TenXSummary]([TenXObjects](https://doc.log10x.com/api/js/#TenXSummary) instances as metric counter to time series output destinations (e.g., Prometheus). 
           To learn more see [metric outputs](https://doc.log10x.com/run/output/metric).

        - **stream**: instantiates a sub-class of [java.io.OutputStream/Writer](https://www.baeldung.com/java-outputstream) 
           to write TenXObject field values to a user-provided stream. 
           
           This method allows for programmatically defining output destinations.
           For an example, see the default [outputStream](https://github.com/log-10x/config/blob/main/pipelines/run/config/output/event/outputStream/config.yaml) configuration.  
  
    - names:
      - outputPath
      description: logical output destination 
      type: string
      category: general      
      required: true
      doc: |
        defines the concrete destination for this output stream. 
        
        This value is dependent on that of [outputType](https://doc.log10x.com/run/output/stream/#outputtype). For:
        - **file**:  location on disk to append/overwrite 
        - **event**: a .yaml or .xml file containing a [log4j2 configuration](https://logging.apache.org/log4j/2.x/manual/configuration.html) for a logger and appender(s)
          to log TenXObjects via the [Message interface](https://logging.apache.org/log4j/2.x/javadoc/log4j-api/org/apache/logging/log4j/message/Message.html).
        - **metric**: fully qualified Java class name implementing the [MetricRegistryFactory](https://github.com/log-10x/pipeline-extensions/blob/main/edge-extensions/src/main/java/com/log10x/ext/edge/micrometer/MetricRegistryFactory.java)
          interface to create a micrometer registry. 
        - **stream**: fully qualified class name derived from [OutputStream](https://docs.oracle.com/javase/8/docs/api/java/io/OutputStream.html) or
          [Writer](https://docs.oracle.com/javase/8/docs/api/java/io/Writer.html) to instantiate. 
          The output will [flush](https://docs.oracle.com/javase/8/docs/api/java/io/Flushable.html#flush--) the stream/writer after serializing the values of [outputFields](https://doc.log10x.com/run/output/stream/#outputfields).
          for each TenXObject. It is up to the class to implement any required batching and buffering logic.
          An [EvaluatorBean](https://github.com/log-10x/pipeline-extensions/blob/main/edge-extensions/src/main/java/com/log10x/api/bean/EvaluatorBean.java) reference
          provides an interface to the 10x JavaScript engine.
          The class to instantiate must declare a constructor with one of the following signatures: 
          
          ``` java
          public class MyOutputStream extends OutputStream {
          
            // This signature is used (if declared)
            MyOutputStream(Map<String, Object> config, com.log10x.api.bean.EvaluatorBean bean) {...}

            // otherwise use this signature 
            MyOutputStream(Map<String, Object> config) {...}

            // If neither are declared, utilize a parameterless constructor
            MyOutputStream() {...}
          }
          ```
          If the search for a matching constructor fails, the pipeline halts. 


    - names:
      - outputArgs
      description: custom arguments passed to OutputStream/Writer instance
      type: list
      category: general      
      required: false
      doc: |
        If [outputType](https://doc.log10x.com/run/output/stream/#outputtype) is `stream`, this argument specifies a list of values pairs (key1,value1...) passed to the constructor of the
        class specified by [outputPath](https://doc.log10x.com/run/output/stream/#outputpath). 
        
        A Map combining these values and those of the output's module option group 
        specified by the [outputForeach](https://doc.log10x.com/run/output/stream/#outputforeach) argument(if present) provide the 
        stream with module-specific context (e.g., auth tokens, host addresses).
      
    - names:
      - outputFields
      description: a comma-delimited list of TenXObject fields to encode
      type: list
      required: true
      category: encode
      doc: |
        Lists fields from each TenXObject to write to this output. Fields can be:

        - [Intrinsic](https://doc.log10x.com/api/js/#TenXObject): Built into all TenXObject and summary instances.
        - [Enriched](https://doc.log10x.com/run/initialize/): Added via initializer modules (e.g., symbol, GeoIP, file lookups).
        - [Extracted](https://doc.log10x.com/run/transform/fields/): Extracted from JSON/KV pairs in the log event.
        - [Calculated](https://doc.log10x.com/run/transform/script/object/#enrich): Derived using custom JavaScript constructors.
        - Expression: An inline JavaScript expression defining an output-only field used when writing instances to this output. The field name and value can be explicitly set (e.g., `myFoo=foo()`) or implicitly derived using the `$=` prefix (e.g., `$=foo()` sets the field name to `foo`).        
       
        Example:

        ```yaml
        outputFile:
          path: out.log
          fields: 
          - myJsonExtField
          - myEnrichedField
          - myCalcField
          - myExpField=TenXEnv.get("var") ? "myCalcField":"foo()" 
          - encode()
        ```
        
        Below are examples of TenXObject fields which can be encoded to output:
      
        | Field                                                                                     | Description                                   | Type |
        |-------------------------------------------------------------------------------------------|-----------------------------------------------|------|
        | [encode()](https://doc.log10x.com/api/js/#TenXObject+encode)                                | [Losslessly compact](https://doc.log10x.com/run/transform/#compact) the instance. The field name is automatically set to `encode` | Expression |
        | [fullText](https://doc.log10x.com/api/js/#TenXBaseObject+fullText)                          | Full text of the underlying raw/expanded event | Intrinsic |
        | [symbolSequence](https://doc.log10x.com/run/initialize/message/#sequence)                   | Metric-complaint symbol values sequence       | Enriched |
        | [symbolMessage](https://doc.log10x.com/run/initialize/message/#message)                     | Logical event message symbol values sequence  | Enriched |
        | [symbolOrigin](https://doc.log10x.com/run/initialize/message/#class)                        | Symbol value with [class context](https://doc.log10x.com/run/transform/symbol/#class) | Enriched 
        | [namespace_name](https://doc.log10x.com/run/initialize/k8s/#k8snamespacenamefield)         | Kubernetes namespace context | Enriched |
        | [container_name](https://doc.log10x.com/run/initialize/k8s/#k8scontainernamefield)         | Kubernetes container context | Enriched |
        | [pod_name](https://doc.log10x.com/run/initialize/k8s/#k8spodnamefield)                     | Kubernetes pod context       | Enriched |
        | [city](https://doc.log10x.com/run/initialize/geoIP/#geoipcityfield)                        | GeoIP reference lookup (city, country.. ) |  Enriched |
        | [lookupValue](https://doc.log10x.com/run/initialize/lookup/#lookupvaluefield)              | Text file (e.g., .CSV, .TSV) lookup  |  Enriched |
        | [code]( https://doc.log10x.com/run/transform/script/object/#enrich)                        | Calculated HTTP code field |  Calculated |        
        | [template](https://doc.log10x.com/api/js/#TenXBaseObject+template)                          | TenXTemplate representation (i.e., [_hidden class_](https://doc.log10x.com/engine/design/#optimization-model))  | Intrinsic |
        | [timestamp](https://doc.log10x.com/api/js/#TenXObject+timestamp)                            | 64bit Unix epoch [timestamps](https://doc.log10x.com/run/transform/#timestamps) | Intrinsic |
        | [vars](https://doc.log10x.com/api/js/#TenXBaseObject+vars)                                  | High-cardinality [variables](https://doc.log10x.com/run/transform/#variables) | Intrinsic |
        | [ipAddress](https://doc.log10x.com/api/js/#TenXBaseObject+ipAddress)                        | Embedded IPv4 addresses | Intrinsic |

    - names:
      - outputEncodeType
      description: output format for encoding TenXObject values. Possible values:[json, delimited]
      type: string
      required: false
      category: encode
      doc: |
        specifies how to format TenXObject field values to a stream/event output 
        Possible values: 
        - **json**: formats N specified [outputFields](https://doc.log10x.com/run/output/stream/#outputhttpfields) names and values for the target TenXObject as: `{"field":"str","field2":1, "field3": true, .. "fieldN": "value"}`.
        - **delimited**: formats N specified [outputFields](https://doc.log10x.com/run/output/stream/#outputhttpfields) values for the target TenXObject as: `"str",1,true,..N-value`.
                         The [outputEncodeDelimiter](https://doc.log10x.com/run/output/stream/#outputhttpencodedelimiter) option determines the value separator 
  
        NOTE: This argument does not apply to outputs whose [outputType](https://doc.log10x.com/run/output/stream/#outputtype) is set to `metric`.

    - names:
      - outputEncodedLinePrefix
      description: char line prefix to prepend when encoding delimited TenXObject field values
      type: string
      required: false
      category: encode
      doc: |
        sets the char line prefix which will be prepended to TenXObject field values encoded to a stream/event output.
        This argument only applies when [outputEncodeType](https://doc.log10x.com/run/output/stream/#outputencodetype) is set to `delimited`.

    - names:
      - outputEncodeDelimiter
      description: char delimiter to use when separating encoded delimited TenXObject field values
      type: string
      required: false
      category: encode
      doc: |
        sets the char delimiter for separate TenXObject field values encoded to a stream/event output.
        This argument only applies when [outputEncodeType](https://doc.log10x.com/run/output/stream/#outputencodetype) is set to `delimited`.

    - names:
      - outputEncodeGroupDelimiter
      description: delimiter to separate TenXObjects encoded into as a group
      type: string
      required: false
      category: encode
      doc: |
        sets the string delimiter used to separate individual 10x events inside a group
        when encoded to a stream/event output
      
    - names:
      - outputAsync
      description: determines whether encoding of this out is done in a dedicated thread 
      type: boolean
      category: advanced
      required: false 
      doc: |
        controls whether the output uses a dedicated thread for encoding TenXObjects or does so from the calling thread. 
      defValue: true

    - names:
      - outputForeach
      description: name of module options group for whose instances to create matching outputs
      type: string
      category: advanced      
      required: false
      doc: |
        specifies the name of an options group for whose instances 
        to replicate this output object. This value enables 10x modules
        to create multiple input instances, each receiving a unique set of arguments.

        For an example, see [httpOutput](https://doc.log10x.com/run/output/event/http)    

    - names:
      - outputGroup
      description: option names whose values for grouping/synchronizing output streams 
      type: list
      required: false
      category: advanced
      doc: |
        enables synchronizing different outputs pointing to a shared logical destination.
        
        For example, in cases where multiple outputs are pointing at the same output file or stdout, it is desirable
        to synchronize writing between the outputs to ensure that no 'interlacing'
        of TenXObject values takes place during write. For this, any variables from the options group instance 
        defined by `outputForeach` can be used to define a unique 'key' for this output
        to synchronize it with other outputs sharing the same value.

        The example below, taken from: [file/stream.yaml](https://github.com/log-10x/modules/blob/main/pipelines/run/modules/output/event/file/stream.yaml#L38)
        groups all log4j appenders writing to the same output file 
        via their associated 'fileOutput' options group instance's 'outputFilePath' value.
                
        ``` yaml
        - type: event
          foreach: fileOutput

          path: run/modules/output/event/file
          group:
            - $outputFilePath
        ```   

        Specify `*` to group by all values of the option group instance.   
        