#
# 🔟❎ 'run' Cloud inputs module

module:

  name: objectStorage

  title: Object storage input

  description: query and stream events from object storage (e.g., AWS S3)

  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: run/modules/input/objectStorage
  
  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: +include $=TenXEnv.get("docGenerate") ? "run/modules/input/objectStorage/doc.md":""

  # 'allowMultiple' is disabled for this module. Pipeline command line arguments and configuration files
  #  can specify a single value at max for each option defined below.
  allowMultiple: false

  # 'options' defines a group of named/typed configuration values to pass to a unit/module at startup
  #  via command line arguments (e.g., '> tenx -myA X -myB Y') or YAML launch files (e.g., '> tenx @my.config').
  #  Instances of this group passed are accessible at runtime via TenXEnv.get: https://doc.log10x.com/api/js/#TenXEnv.get
  options:
    - names:
      - objectStorageClassName
      description: alias and class name pair used to access a target Object storage
      type: list
      required: true
      doc: |

        Defines access to an Object storage (e.g., AWS S3, Azure Blobs, GCP storage) and REST endpoint (e.g., k8s container) for
        launching [index](https://doc.log10x.com/run/input/objectStorage/index) and [query](https://doc.log10x.com/run/input/objectStorage/query) runtime instances.

        Specify this value in the form of <alias>:<class> identifying a logical alias (e.g., AWS) and a fully qualified 
        Java class name implementing the [ObjectStorageIndexAccessor](https://github.com/log-10x/pipeline-extensions/blob/main/cloud-extensions/src/main/java/com/log10x/ext/cloud/index/interfaces/ObjectStorageIndexAccessor.java) interface.

        For example:
        ``` yaml
        objectStorageClassName: AWS:com.log10x.ext.cloud.index.access.AWSIndexAccess
        ```
        
        To configure a target storage (e.g., authenticate) define and specify configuration [launch arguments](https://doc.log10x.com/config) accessible via the [EvaluatorBean](https://github.com/log-10x/pipeline-extensions/blob/main/edge-extensions/src/main/java/com/log10x/api/bean/EvaluatorBean.java#L14) constructor parameter.

        The class implementing [ObjectStorageIndexAccessor](https://github.com/log-10x/pipeline-extensions/blob/main/cloud-extensions/src/main/java/com/log10x/ext/cloud/index/interfaces/ObjectStorageIndexAccessor.java) must define the following constructor signature:

        ``` java

        public class MyIndexAccess implements ObjectStorageIndexAccessor {
        
          public MyIndexAccess(IndexOptions options, EvaluatorBean evaluatorBean) {
            ...
          }    
          ...
        }
        ```

        For an example implementation, see [AWSIndexAccess](https://github.com/log-10x/pipeline-extensions/blob/main/cloud-extensions/src/main/java/com/log10x/ext/cloud/index/access/AWSIndexAccess.java)

 