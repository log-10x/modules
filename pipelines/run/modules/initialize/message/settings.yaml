# 🔟❎ 'run' symbol lookup settings

# Configure symbol lookup aggregation fields
# To learn more see https://doc.log10x.com/run/initialize/message

# Set the 10x pipeline to 'run'
tenx: run

# ============================ Aggregation Settings ===========================

# Install the symbol lookup enrichment fields as default fields by which to aggregate TenXObjects
# To learn more see https://doc.log10x.com/run/initialize/#enrichmentFields

include:
  - run/modules/initialize/module.yaml
  - run/modules/output/metric/module.yaml

enrichmentFields:
  # use yield to ensure all arguments are loaded
  - $=yield TenXEnv.get("symbolMessageField") ? (TenXEnv.get("symbolMessageField")):""
  - $=yield TenXEnv.get("symbolOriginField") ? (TenXEnv.get("symbolOriginField")):""
