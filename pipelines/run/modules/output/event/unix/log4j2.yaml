# 🔟❎ 'run' Unix output module log4j configuration

# The 'Unix' log4j2 configuration defines the loggers and appenders used to
# write TenXObject field and template values to a target Unix address.
# Multiple socket outputs are supported, each specified by the instance 
# of the 'unixSocketOutput' module defined in: https://doc.log10x.com/run/output/event/unix 

log4j:

  # 'loggerName' defines a prefix to use with a running counter (e.g., 'tenxUnixSocket0') 
  #  to name matching log4j2 logger and appender objects uniquely 
  #  for each instance of the 'unixSocketOutput' options group 

  #  This provides the ability to encode TenXObjects to different sockets
  #  based on different sets of filters (specified by 'outputUnixSocketFilter') 
  #  and fields (specified by 'outputUnixSocketFields'). 
  loggerName: tenxUnixSocket

  configuration:

    appenders:

      unixSocket:

          # 'name' sets a unique identifier assigned to each appender
          #  generated for a target output defined by an instance of the 
          #  'socketOutput' options group       
        - name: $loggerName
          
          tenxLayout:
          # The 'encodedFields' and 'filter' options of the 'tenxLayout' layout 
          # consume the 'outputUnixSocketFields' and 'outputUnixSocketFilter' arguments at runtime
            encodedFields: null
            filter: null

          address: $outputUnixSocketAddress
      
          bufferSize: 2000000 # Ensure a large buffer size for very long lines

          connectTimeoutMillis: $?outputUnixSocketConnectTimeout=5000

    loggers:
      logger:
 
          # A dedicated logger whose name matches the socket appender is used to
          # to write object/template values for this output instance 
        - name: $loggerName
          additivity: false
          appenderRef:
            - ref: $loggerName
