#
# 🔟❎ 'run' subprocess output module

module:

  name: processOutput

  title: Process output

  description: write TenXObject and template values to a sub-process stdin

   # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: run/output/event/process

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: +include $=TenXEnv.get("docGenerate") ? "run/modules/output/event/process/doc.md":""

  # 'allowMultiple' is enabled for this module. Pipeline command line arguments and configuration files
  #  can specify multiple groupings of the options defined below.
  allowMultiple: true

  # 'options' defines a group of named/typed configuration values to pass to a unit/module at startup
  #  via command line arguments (e.g., '> tenx -myA X -myB Y') or YAML launch files (e.g., '> tenx @my.config').
  #  Instances of this group passed are accessible at runtime via TenXEnv.get: https://doc.log10x.com/api/js/#TenXEnv.get
  options:

    - names:
        - procOutCommand
      description: command to launch
      type: string
      required: true
      category: process
      doc: |
        specifies the command to execute to launch the sub-process.
        This command can specify a shipper (e.g., Fluent Bit, Filebeat) or OS util (e.g., nc)
        process that will forward the output object values to a remote destination.

    - names:
        - procOutArgs
      description: arguments to pass to the spawned sub-process
      type: list
      required: false
      category: process
      doc: |
        list of values to pass as startup arguments to the spawned sub-process.

    - names:
        - procOutLazyLaunch
      description: sets whether to launch the process on-demand
      type: boolean
      required: false
      category: process
      doc: |
        controls whether to spawn the target sub-process upon the creation of the output or on-demand.
        If true, launch the sub-process when the first TenXObject instance is written to its stdin.

    - names:
        - procOutStartupWaitMs
      description: wait time for process to startup
      type: number
      required: false
      category: process
      doc: |
        sets a startup delay wait time in milliseconds before the process is considered available for events.
        if provided, will add a wait as part of starting the process before emitting events into it.
        max value for this argument is 10,000 (ie 10 seconds).
        if [procOutStartupWaitPattern](https://doc.log10x.com/run/output/event/process/#procoutstartupwaitpattern) is also provided, the process will be considered
        a failure if the wait time has passed before a line matching 'procOutStartupWaitPattern' was emitted.

    - names:
        - procOutStartupWaitPattern
      description: wait for an output from the process at startup
      type: string
      required: false
      category: process
      doc: |
        sets a regex pattern to wait for the process to emit for it to be considered available for events.
        if provided, will wait until the process has emitted a line to it's output that matches the regex
        before emitting events into it.
        if [procOutStartupWaitMs](https://doc.log10x.com/run/output/event/process/#procOutStartupWaitMs) is also provided, will only wait for the specified
        wait time, after which if no line was emitted to match the provided regex the process will be considered
        a failure.

    - names:
        - procOutDestroyMode
      description: control how to terminate the sub-process on output close
      type: string
      required: false
      category: lifecycle
      doc: |
        controls how to treat spawned sub-process when this output closes. Possible values:

        | Value      | Description |
        |------------|-------------|
        | **graceful** (default)   | The sub-process is destroyed gracefully with a timeout period of [procOutDestroyWait](https://doc.log10x.com/run/output/event/process/#procoutdestroywait). |
        | **forcible**             | Terminates the sub-process immediately. |
        | **cached**               | The sub-process remains alive for future pipelines that launch the same command and argument combination within the host JVM. A maximum of [procOutMaxCacheSize](https://doc.log10x.com/run/output/event/process/#procoutmaxcachesize) can be kept alive. Useful for launching shippers (e.g., Filebeat, Fluent Bit) across multiple 10x pipeline runs in a long-living server environment. |

    - names:
        - procOutDestroyWait
      description: duration to wait for spawned sub-process to terminate
      type: string
      required: false
      category: lifecycle
      doc: |
        controls the time duration that the output stream will
        wait for the sub-process to terminate gracefully (e.g., '5s').
        If the process timeouts, the output will forcibly terminate it. If set to 0,
        the output stream will wait indefinitely for the sub-process to terminate.
        This value only applies when [procOutDestroyMode](https://doc.log10x.com/run/output/event/process/#procoutdestroymode) is set to `graceful`.

    - names:
      - procOutMaxCacheSize
      description: max number of sub-processes to keep alive across subsequent 10x pipeline executions
      type: number
      required: false
      category: lifecycle
      doc: |
        sets the global maximum number of processes that can retained globally
        across 10x pipeline executions within the host JVM. This value is useful
        when launching shippers (e.g., Filebeat, Fluent Bit) for use
        across multiple 10x pipeline executions within a server environment.
        This value only applies when [procOutDestroyMode](https://doc.log10x.com/run/output/event/process/#procoutdestroymode) is set to `cached`.
        If [procOutMaxCacheSize](https://doc.log10x.com/run/output/event/process/#procoutmaxcachesize) is set to 0, no caching is performed, and sub-processes
        are destroyed gracefully.

    - names:
      - procOutAllowMultipleStreams
      description: allow multiple concurrent outputs to share a subprocess
      type: boolean
      required: false
      category: lifecycle
      defValue: false
      doc: |
        If this value is true, multiple output streams sharing an identical
        command and arguments will emit their values to a single subprocess.
        Write access to the subprocess' stdin device will be synchronized between concurrent output streams.

        For example, if the target subprocess is a log forwarder (e.g., Fluentd/Bit)
        it can be configured to route TenXObjects from multiple output streams to their target
        destinations without requiring a separate instance of the forwarder for each configured output stream.

    - names:
        - procOutFields
      description: list of TenXObject field names to encode
      type: list
      required: false
      category: encoding
      doc: |
        specifies a list of TenXObject intrinsic/calculated/extracted field names to extract and write to the output.
      defValue: 
        - encodedOuterText](https://doc.log10x.com/api/js/#TenXBaseObject+encodedOuterText)

    - names:
        - procOutFilter
      description: a JavaScript expression an TenXObject must evaluate as 'truthy' against to be written to this output
      type: string
      required: false
      category: encoding
      doc: |
        Specifies a JavaScript expression that an TenXObject must evaluate as truthy to write its
        instance/template field values to this output.

        For example, to only emit [timestamped](https://doc.log10x.com/api/js/#TenXBaseObject+timestamped) TenXObjects, specify:
        ``` yaml
        procOutFilter: this.timestamped
        ```

    - names:
        - procOutWriteObjects
      description: if true, TenXObject field values specified by [procOutFields](https://doc.log10x.com/run/output/event/process/#procoutfields) are encoded to this output
      type: string
      required: false
      category: encoding
      doc: |
        Determine whether to write [procOutFields](https://doc.log10x.com/run/output/event/process/#procoutfields) values of an TenXObject passed to this output.
        This configuration is typically defined using a JavaScript expression.

        To enable/disable the output depending on whether a launch argument, environment variable,
        or JVM -D option evaluates as truthy, use:
        ``` yaml
          procOutWriteObjects: $=TenXEnv.get("myProcCmd")
        ```
        To learn more see [TenXEnv.get](https://doc.log10x.com/api/js/#TenXEnv.get).

      defValue: true

    - names:
        - procOutWriteTemplates
      description: if true, write new TenXTemplates to this output
      type: string
      required: false
      category: encoding
      doc: |
        controls whether to write template values of TenXObjects passed to this output.
        The output will only emit TenXTemplates that the pipeline did not load at startup via the[templateFile](https://doc.log10x.com/run/template/#templatefiles) argument,
        and will only emit an TenXTemplate once based on its [templateHash](https://doc.log10x.com/api/js/#TenXBaseObject+templateHash) value.
      defValue: false

    - names:
        - procOutEncodeType
      description: the output format in which to encode TenXObject values. Possible values:[json, delimited]
      type: string
      required: false
      category: encoding
      doc: |
        specifies how to encode [procOutFields](https://doc.log10x.com/run/output/event/process/#procoutfields) values to this output. Possible values:
        - **json**: formats names and values for the current TenXObject as: {"field":"str","field2":1, "field3": true}
        - **delimited**: formats values for the current TenXObject as: "str",1,true
           The [procOutEncodeDelimiter](https://doc.log10x.com/run/output/event/process/#procoutencodedelimiter) argument determines the separator to use.
      defValue: delimited

    - names:
        - procOutEncodedLinePrefix
      description: the line prefix prepended to the encoded event if 'procOutEncodeType' is 'delimited'
      type: string
      required: false
      category: encoding
      doc: |
        sets the char which is prepended to the emitted TenXObject field values when [procOutEncodeType](https://doc.log10x.com/run/output/event/process/#procoutencodetype) is `delimited`.
      defValue: ''

    - names:
        - procOutEncodeDelimiter
      description: the delimiter placed between key and values pairs if 'procOutEncodeType' is 'delimited'
      type: string
      required: false
      category: encoding
      doc: |
        sets the char delimiter to separate TenXObject field values when [procOutEncodeType](https://doc.log10x.com/run/output/event/process/#procoutencodetype) is `delimited`.
      defValue: ' '
