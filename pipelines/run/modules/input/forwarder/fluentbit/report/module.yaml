#
#  🔟❎ Fluent Bit Report module

module:

  name: fluentbitReport

  title: Fluent Bit reporter

  description: read events from Fluent Bit forwarders

  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: run/input/forwarder/fluentbit/report

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: '+include $=TenXEnv.get("docGenerate") ? "run/modules/input/forwarder/fluentbit/report/doc.md":""'    
