# 🔟❎ 'run' Cloud reporter general settings

# This configuration general settings for use by the Cloud Reporter app.
# To learn more see https://doc.log10x.com/apps/cloud/reporter

# ============================ Bootstrap Runtime ==============================

tenx: run    # https://doc.log10x.com/run/bootstrap

# ======================== Application Dependencies ===========================

runtimeAttributes:
 - app:reporter
 - env:cloud

include:
  - apps/shared
  - run/aggregate/report  # https://doc.log10x.com/run/aggregate/#report

