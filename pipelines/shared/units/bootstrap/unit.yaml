#
# 🔟❎ runtime global options

unit:

  name: bootstrap

  title: Pipeline Bootstrapper

  description: Authenticate the log10x account and launch a target pipeline

  # 'configFolders' specifies folders containing default configuration files for this module
  configFolders:
    run: pipelines/run/bootstrap
    compile: pipelines/compile/bootstrap

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: +include $=TenXEnv.get("docGenerate") ? "shared/units/bootstrap/doc.md":""

  # 'allowMultiple' is disabled for this unit. Pipeline command line arguments and configuration files
  #  can specify a single value at max for each option defined below.
  allowMultiple: false

  # 'options' defines a group of named/typed configuration values to pass to a unit/module at startup
  #  via command line arguments (e.g., '> tenx -myA X -myB Y') or YAML launch files (e.g., '> tenx @my.config').
  #  Instances of this group passed to the pipeline are accessible at runtime via the TenXEnv JavaScript class.
  options:

    - names:
      - tenx
      - pipeline
      description: name of pipeline to execute
      type: string
      required: true
      doc: |
        Target [pipeline](https://doc.log10x.com/engine/pipeline/) to execute.

        For example, to specify the [run](https://doc.log10x.com/run/) pipeline and a [YAML](https://doc.log10x.com/config/yaml/) config file containing launch arguments, use:

        ``` console
        $ tenx run @~/my.yaml
        ```
        The YAML file may specify the pipeline name via a 'tenx' entry, allowing the 'pipeline' argument to be omitted from the command line.

        For example (my.yaml):

        ``` yaml
        tenx: run # set the pipeline to 'run'
        apiKey: <my-key>
        ...
        ```

        Allows for launching the run pipeline via:
        ``` console
        $ tenx @~/my.yaml
        ```

    - names:
      - apiKey
      - TENX_API_KEY
      description: 10x api key
      type: string
      required: true
      doc: |
        Specifies an api key used for authenticating against the 10x service.
        This value is accessible from your [account settings](https://console.log10x.com).

    - names:
      - metricEndpoint
      description: 10x service Prometheus metrics endpoint
      type: string
      required: false
      doc: |
        Specifies the address of the Prometheus remote write endpoint to write
        pipeline usage and health metrics.

        !!! note ""

            This argument is only settable in the 10x 'on-premises' build.

      defValue: https://prometheus.log10x.com/api/v1/write

    - names:
      - runtimeName
      description: name to report to the 10x service endpoint for this runtime instance
      type: string
      required: false
      doc: |
        Specifies a logical name used as a [tag value](https://www.baeldung.com/micrometer#4-meters) for pipeline metrics.
        This value identifies instances of the 10x run/compile pipelines
        when reporting to the 10x service. For example, for a 10x [Reducer](https://doc.log10x.com/apps/reducer/) with optimization enabled for Fluent Bit forwarders collecting events from a `broker` user-app,
        this value can be set to: `regulate_fluentbit_broker`

    - names:
      - runtimeAttributes
      description: list of attributes to add to all metrics reporting
      type: list
      required: false
      doc: |
        Specifies a list of key-value pairs in the format `key:value` to be added as tags to pipeline metrics reported to the 10x service.
        These tags enable finer-grained filtering and analysis in monitoring systems like Prometheus.
        Multiple attributes can be combined into a single string using a semicolon (`;`), e.g., `key1:val1;key2:val2`.

        If a key does not start with tenx_, the prefix tenx_ is automatically prepended to ensure consistency in tag naming conventions.
        For example, a provided attribute app:my-app will be reported as tenx_app:my-app

        ``` yaml
          runtimeAttributes:
            - app:reporter
            - env:edge
        ```

    - names:
      - includePaths
      description: pipeline include folders
      type: list
      required: false
      doc: |
        Specifies folders on disk for resoling relative references within [include directives](https://doc.log10x.com/config/yaml/#include-directives).
      defValue: [working directory of current process]

    - names:
      - jarFiles
      description: jar files to load
      type: list
      required: false
      doc: |
        Specifies a list of .jar files to load into the host JVM for use by [compile](https://doc.log10x.com/api/compile/),
        [input](https://doc.log10x.com/api/input/) and [output](https://doc.log10x.com/api/output/) API extensions.

        !!! note ""

            This argument is not supported in the [edge](https://doc.log10x.com/engine/flavors/#edge) runtime flavor.

    - names:
      - quiet
      description: disable printing binary version information to the console
      type: boolean
      required: false
      doc: |
        disable printing build/version information to the console upon launch
      defValue: false

    - names:
      - disabledArgs
      description: limit argument values that can be set by users
      type: list
      required: false
      doc: |
        specifies a list of launch arguments that are disallowed from either command line or user config files.
        This argument provides a method of limiting the target [pipeline](https://doc.log10x.com/shared/bootstrap/#pipeline), [source](https://doc.log10x.com/config/#sources)
        and and [command line](https://doc.log10x.com/config/cli/) settable by the user.

        This mechanism enables pipeline launchers such as the [Quarkus launcher](https://doc.log10x.com/api/launch/#quarkus)
        to limit user input received via REST requests to a target subset of 'safe' arguments.

        For example, adding [procOutCommand](https://doc.log10x.com/run/output/event/process/#procoutcommand) to this list
        ensures that no external process outputs can be launched by the runtime.

        An optional regex pattern can limit arguments to a certain subset of values in the form of: `<arg-name>[:pattern]` (e.g., specific process names).
        Multiple patterns can be specified per argument.

        Matching the `source` argument determines which source locations to inspect (e.g., folders, files, GitHub repos).
        For example, an admin may place .yaml config files containing preset Fluent Bit outputs in `/etc/log10x/`,
        excluding their enclosed arguments from limits set by this list, while disallowing users to directly set them via the command-line
        or by sourcing them from their local/GitHub config files (see example below).

        To limit:

        The target pipeline (e.g., [run](https://doc.log10x.com/run/), [compile](https://doc.log10x.com/compile/)):

        ``` yaml
          disabledArgs:
          - "pipeline:^run" # disallow compile
        ```

        Target arguments (e.g., [process outputs](https://doc.log10x.com/run/output/event/process/)):

        ``` yaml
          - "procOutCommand:^fluent-bit$"   # limit to Fluent Bit only
          # - procOutArgs: <specify-regex>  # further limit args for Fluent Bit
        ```

        Control which argument [sources](https://doc.log10x.com/config/#sources) to inspect:

        ``` yaml
          - "source:^github.*"             # inspect of all arguments sourced from GitHub against this list
          - "source:^(?!/etc/log10x/).*"   # inspect of all arguments sourced from config files NOT contained in: /etc/log10x/
        ```

    - names:
      - debugEnvVars
      description: list environment variables to debug
      type: list
      required: false
      doc: |
        specifies a list of env var names for which to log information relating to how they are resolved.

        For example, the following call: `L1Env.get("myVar", "myDefault")` can be resolved from a number of [sources](https://doc.log10x.com/api/js/#TenXEnv.get)
        ranging from launch arguments, to OS/JVM properties and a default value (e.g., myDefault).

        Setting this value to `myVar` will log INFO level information detailing how the value of the `myVar` was resolved.

