# 🔟❎ 'run' Fluent Bit forward output stream configuration

# This configuration defines a Unix domain socket output to write events
# back to a Fluent Bit forwarder process via the native Fluentd 'forward' protocol.

# To learn more see: https://github.com/fluent/fluent-bit-docs/blob/master/pipeline/outputs/forward.md

# Single output entry. Mode is selected by `outputEncodeField` and
# `outputWriteTemplates` (shared forwarder options), which the user-facing
# config.yaml sets via a `$=yield` expression that reads reducerOptimize and
# compactReducerLookupFile. Substitution happens at config-load time, so
# shouldEncode() only appears in the parsed field when compactReducer is
# actually configured.

# Set the 10x pipeline to 'run'
tenx: run

# =============================== Dependencies ================================

include:

  - source: match
    options:

      # Capture rawOutputForwardAddress from tenx-unix.conf as an 10x config variable
      path: run/modules/input/forwarder/fluentbit/conf/tenx-unix.conf
      regex: "^\\s*@SET\\s+forwardAddress\\s*=\\s*(?<rawOutputForwardAddress>.*?)$"

    # load the forward protocol over the Unix domain socket module
  - run/modules/output/event/forward

# ============================= Output Options ================================

outputForward:

  - address: $=rawOutputForwardAddress

    # 'fields' is driven by the mode. The $?outputEncodeField substitution
    # happens before DSL parse, so the field expression only references
    # shouldEncode() when the user picked compact-lookup mode.
    fields:
      - $?outputEncodeField=fullText
      - $?fluentbitOutputFields

    encodeType: $?fluentbitOutputEncodeType
    encodeDelimiter: ","

    writeTemplates: $?outputWriteTemplates=false
