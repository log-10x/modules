#
# 🔟❎ 'run' compact regulator module

module:

  name: compactRegulator

  title: Compact regulator

  description: Per-event compaction decision via a declarative field-set keyed lookup file. Decides whether each event is emitted via encode() (compact templateHash+vars form, ~20-40x volume reduction) or as fullText. GitOps-controlled — the MCP writes entries via PR, engine hot-reloads the lookup without restart.

  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: run/regulate/compact

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: +include $=TenXEnv.get("docGenerate") ? "run/modules/regulate/compact/doc.md":""

  allowMultiple: false

  options:

    - names:
      - compactRegulatorLookupFile
      description: path or URL to a compact decisions lookup file
      type: string
      required: false
      doc: |
        points the engine at a lookup file whose entries express per-pattern compaction decisions.

        **Entry format**:

            <fieldSet>=<encode>:<untilEpochSec>[:<reason>]

        `encode` is `true` (compact via `encode()`) or `false` (preserve `fullText`). `untilEpochSec` is a Unix epoch timestamp after which the entry self-heals to `compactRegulatorDefault`.

        **Example** (with `compactRegulatorFieldNames: [symbolMessage]`):

            payment_retry_gateway_timeout=true:1745856000:OPS-5123 spike mitigation
            auth_audit_trail=false:1745856000:compliance — keep verbose

        Entries express deviations from `compactRegulatorDefault`. An expired entry falls back to the default exactly like a rate-regulator mute does.

        The engine polls the file on the interval set by `compactRegulatorLookupRetain` — changes take effect without a restart, so this plays cleanly with a GitOps workflow where the MCP authors entries via PR.

    - names:
      - compactRegulatorFieldNames
      description: list of TenXObject fields used to key compact lookup entries
      type: list
      required: false
      doc: |
        defines the list of TenXObject field names joined with underscores to form each event's lookup key. The key format matches the rate regulator's `rateRegulatorFieldNames`, so an entry in the compact lookup targets the same pattern identity the Reporter attributes cost to.

        **Default**: `[symbolMessage]` (same as the rate regulator's default).

        **Multi-dimensional compaction** (e.g., "compact this pattern only for tenants X, Y"):

        ```yaml
        compactRegulatorFieldNames:
          - symbolMessage
          - tenantId
        ```

        Changing this field set currently requires an engine restart — a future enhancement will allow hot-swapping via a bootstrap key inside the lookup file.
      defValue: [symbolMessage]

    - names:
      - compactRegulatorLookupRetain
      description: lookup file poll interval in milliseconds
      type: number
      required: false
      doc: |
        defines how often the engine re-reads `compactRegulatorLookupFile` to pick up new/changed entries. Default of 5 minutes (300000ms) aligns with the rate regulator's `rateRegulatorLookupRetain`.

        Shorter values make GitOps changes take effect faster at the cost of more file I/O. Longer values reduce I/O but delay effect.

        **Validation**: must be at least 60000ms (1 minute).
      defValue: 300000

    - names:
      - compactRegulatorDefault
      description: default compaction decision when no lookup entry applies
      type: boolean
      required: false
      doc: |
        controls the fallback decision when no lookup file is loaded, no entry matches an event's field-set, or a matching entry has expired.

        - `false` (default) — preserve `fullText`. Lookup entries opt specific patterns INTO compaction.
        - `true` — compact via `encode()`. Lookup entries opt specific patterns OUT (e.g., audit/compliance patterns that must stay verbose).

        Flipping this value is a policy-level decision (affects every event), not a lookup edit. Changing it requires a pod rollout. The lookup handles pattern-level overrides without restart.

