# yaml-language-server: $schema=schema.json

# 🔟❎ 'compile' default symbol library - GitHub repositories

# This file contains the industry-standard frameworks and libraries that emit
# logs, errors, and exceptions. Use this as a reference when building your
# symbol library.

# To enable: uncomment the 'tenx: compile' line below, or copy specific repos
# to your config/pipelines/compile/pull/github/config.yaml

tenx: compile  # Uncomment to enable compilation of this library

# ============================== GitHub Repos =================================

githubPull:

  - token: $=TenXEnv.get("GH_TOKEN")
    repos:

      # =========================================================================
      # JAVA
      # =========================================================================

      # Spring Framework - Enterprise Java foundation
      - spring-projects/spring-boot        # Auto-config, REST APIs, actuator health/metrics logs
      - spring-projects/spring-framework   # Core DI, AOP, transactions, @Controller exception handling

      # Servlet Containers
      - apache/tomcat                      # HTTP access logs, servlet lifecycle, connector errors

      # Logging Frameworks - Define log patterns and levels
      - qos-ch/logback                     # Appenders, pattern layouts, MDC context
      - qos-ch/slf4j                       # Logging facade, marker APIs, bridge implementations
      - apache/logging-log4j2              # Async loggers, pattern layouts, lookup errors

      # Reactive & Cloud-Native
      - eclipse-vertx/vert.x               # Event loop, verticle deployment, cluster events
      - quarkusio/quarkus                  # GraalVM native, CDI, dev mode hot reload logs
      - micronaut-projects/micronaut-core  # Compile-time DI, startup optimization logs

      # Messaging & Streaming
      - apache/kafka                       # Broker logs, consumer groups, partition rebalancing
      - apache/spark                       # Job execution, stage progress, shuffle operations
      - apache/flink                       # Task manager, checkpoint coordination, watermarks
      - apache/pulsar                      # Topic lifecycle, subscription cursor, geo-replication
      - apache/activemq                    # Queue/topic operations, message persistence

      # Data Access
      - hibernate/hibernate-orm            # SQL generation, flush operations, cache statistics
      - mybatis/mybatis-3                  # Statement execution, result mapping, transaction logs

      # Integration & Routing
      - apache/camel                       # Route definitions, exchange processing, error handlers

      # Microservices
      - dropwizard/dropwizard              # Health checks, metrics, jersey request logs
      - reactor/reactor-core               # Reactive streams, backpressure, error signals
      - spring-cloud/spring-cloud-gateway  # Route predicates, filter chains, rate limiting
      - grpc/grpc-java                     # Channel lifecycle, call tracing, deadline exceeded
      - apache/dubbo                       # RPC invocation, service registry, load balancing

      # Networking
      - netty/netty                        # Channel events, pipeline handlers, buffer allocation

      # Search & Storage
      - elastic/elasticsearch              # Index operations, shard allocation, cluster state
      - apache/cassandra                   # CQL execution, compaction, gossip protocol

      # Additional Java
      - alibaba/nacos                      # Service discovery, config management
      - jetty/jetty.project                # HTTP requests, servlet context, websocket frames
      - hazelcast/hazelcast                # Distributed maps, cluster membership, partition migration
      - apache/shiro                       # Authentication attempts, authorization checks, session events

      # =========================================================================
      # JAVASCRIPT / NODE.JS
      # =========================================================================

      # Runtime & Core
      - nodejs/node                        # V8 errors, module resolution, process lifecycle

      # Web Frameworks
      - expressjs/express                  # Middleware chain, route matching, error handlers
      - nestjs/nest                        # Module initialization, guards, interceptors, pipes
      - vercel/next.js                     # SSR/SSG builds, API routes, image optimization
      - fastify/fastify                    # Request lifecycle, schema validation, plugin loading
      - koajs/koa                          # Middleware composition, context errors
      - hapijs/hapi                        # Server events, validation errors, auth schemes
      - adonisjs/core                      # MVC lifecycle, exception handling, IoC container

      # Real-time
      - socketio/socket.io                 # Connection events, room operations, transport fallback

      # Logging
      - winstonjs/winston                  # Transport writes, log levels, format transforms
      - pinojs/pino                        # JSON logging, child loggers, redaction
      - log4js-node/log4js-node            # Appender configuration, category levels
      - debug-js/debug                     # Namespaced debug output, enable patterns

      # RPC & Data
      - grpc/grpc-node                     # Client/server calls, metadata, status codes
      - typeorm/typeorm                    # Query execution, migrations, connection pool
      - sequelize/sequelize                # SQL queries, model validation, associations
      - prisma/prisma                      # Query engine, migrations, connection management

      # HTTP Client
      - axios/axios                        # Request/response interceptors, timeout errors

      # Additional Node.js
      - Automattic/mongoose                # MongoDB queries, schema validation, middleware hooks
      - jaredhanson/passport               # Authentication strategies, session serialization
      - OptimalBits/bull                   # Job processing, stalled job detection, rate limiting

