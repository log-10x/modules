# 🔟❎ 'run' Fluentd stdout output stream configuration

# This configuration defines a stdout output device through which
# to write encoded/plain-text TenXObjects to a host Fluentd forwarder process.

# Set the 10x pipeline to 'run'
tenx: run

# =============================== Dependencies ================================

# load the stdout output device module
include: run/modules/output/event/stdout

# ============================= Output Options ================================

# 'stdout' defines the output(s) used to write back to the Fluentd forwarder
stdout:

    # Regulate-only mode (fluentdEncodeObjects=false), no extra output fields:
    # TSV-join of source + fullText.
  - target: SYSTEM_OUT

    writeObjects: /$=!TenXEnv.get("fluentdEncodeObjects") && !TenXEnv.get("fluentdOutputFields")

    fields: event=joinFields("\t", "source", "fullText")

    # Regulate-only mode with extra output fields: emit source + fullText + extras.
  - target: SYSTEM_OUT

    writeObjects: /$=!TenXEnv.get("fluentdEncodeObjects") && TenXEnv.get("fluentdOutputFields")

    fields:
      - source
      - fullText
      - $?fluentdOutputFields
    encodeType: $?fluentdOutputEncodeType
    encodeDelimiter: ","

    # Compact-capable mode, no extra output fields: per-event ternary on
    # shouldEncode() — TSV-join of source + encoded-or-fullText.
  - target: SYSTEM_OUT

    writeObjects: /$=TenXEnv.get("fluentdEncodeObjects") && !TenXEnv.get("fluentdOutputFields")

    fields: event=joinFields("\t", "source", 'output=shouldEncode() ? encode() : fullText')

    # Compact-capable mode with extra output fields: same ternary + extras.
  - target: SYSTEM_OUT

    writeObjects: /$=TenXEnv.get("fluentdEncodeObjects") && TenXEnv.get("fluentdOutputFields")

    fields:
      - source
      - 'output=shouldEncode() ? encode() : fullText'
      - $?fluentdOutputFields
    encodeType: $?fluentdOutputEncodeType
    encodeDelimiter: ","

    # Ship TenXTemplates only for events actually being compacted.
  - target: SYSTEM_OUT

    writeObjects: /$=TenXEnv.get("fluentdEncodeObjects")

    filter: isNewTemplate()

    fields: customTemplate=concat("tenx-template", "\t", stringify("templateHash", templateHash, "template", template))
