#
# 🔟❎ 'run' socket output settings

# The 'socketOutput' module defines a TCP/UDP output
# to write TenXObject instance/template field values. The configuration
# below constructs a log4j-backed output stream for each instance of
# the 'socketOutput' options group.

# Set the 10x pipeline to 'run'
tenx: run

output:

    # 'type' defines the type of output (e.g., stdout, event, micrometer).
    #  The 'socket' output utilizes a log4j2 file appender to emit object/template values
  - type: event

    # 'path' points to the log4j2 configuration used for the output's
    #  appender and logger at: https://github.com/log-10x/modules/blob/main/pipelines/run/modules/output/event/socket/log4j2.yaml
    path: run/modules/output/event/socket

    # 'name' assigns a logical name to this output instance
    name: $outputSocketHost

    # 'foreach' sets 'socketOutput' as the options group for whose instances
    #  to create matching output streams to allow multiple socket outputs.
    foreach: socketOutput

    # 'group' sets host, port, and protocol as the keys for grouping all socket outputs
    #  targeting a socket into a single log4j2 appender. This
    #  prevents a situation where multiple non-synchronized appenders may be trying
    #  to write to the same socket address.
    group:
      - $?outputSocketHost=127.0.0.1
      - $outputSocketPort
      - $?outputSocketProtocol=TCP

    # 'enabled' sets whether to open the output. If true, any 'filter' value
    #  set below is evaluated for each TenXObject to determine whether to write its instance/template field values to output.
    enabled: $?outputSocketWriteObjects=true

    # 'filter' is set to skip templates when encoding object field values.
    #  A separate socket output stream is defined below to encode templates
    filter: $?outputSocketFilter=isObject

    # 'encodedLinePrefix', 'encodeType' and 'encodeDelimiter' control how TenXObject field values are
    #  written to output. To learn more see 'outputSocketEncodeType' in https://doc.log10x.com/run/output/event/socket
    encodedLinePrefix: $?outputSocketEncodedLinePrefix=""
    encodeType: $?outputSocketEncodeType=delimited
    encodeDelimiter: $?outputSocketEncodeDelimiter=" "

    # 'fields' defines the intrinsic/extracted/calculated field values
    #  to write to for each TenXObject passed to this output.
    fields:
      - $?outputSocketFields

    # If 'outputSocketWriteTemplates' is true, encode Template values for TenXObjects as JSON objects.
    # To learn more about TenXTemplates, see https://doc.log10x.com/run/template
  - type: event

    # 'name' assigns a logical name to this output instance
    name: $outputSocketHost

    # 'path' points to the log4j2 configuration used for this output at:
    # https://github.com/log-10x/modules/blob/main/pipelines/run/modules/output/event/socket/log4j2.yaml
    path: run/modules/output/event/socket

    # 'foreach' sets 'socketOutput' as the options group for whose instances
    #  to create matching output streams to allow multiple socket outputs.
    foreach: socketOutput

    # 'group' sets host, port, and protocol as the keys for grouping all socket outputs
    #  targeting a socket into a single log4j2 appender. This
    #  prevents a situation where multiple non-synchronized appenders may be trying
    #  to write to the same socket address.
    group:
      - $?outputSocketHost=127.0.0.1
      - $outputSocketPort
      - $?outputSocketProtocol=TCP

    # 'enabled' is false by default. 'outputSocketWriteTemplates' must be set to
    # true for templates to be encoded
    enabled: $?outputSocketWriteTemplates=false

    # 'filter' uses the 'isNewTemplate' 10x JavaScript function to skip templates
    #  loaded via the https://doc.log10x.com/run/template/#templatefiles or previously written to this output
    filter: isNewTemplate()

    encodeType: json
    fields:
      - templateHash
      - template
