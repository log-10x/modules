# 🔟❎ Filebeat log4j2 configuration

# This log4j configuration controls how to write Filebeat log messages to output.

# The 10x Filebeat module is designed to have Filebeat pipe its output directly to
# the 10x stdin pipeline via the shell: filebeat -e 2>&1 | tenx @in/filebeat

# This log configuration will emit Filebeat log messages (i.e., messages logged by the Filebeat
# process itself) to a target output based on the configuration values defined in the
# 'filebeat.yml' file, as defined in:
# https://www.elastic.co/guide/en/beats/filebeat/current/configuration-logging.html

# NOTE: support for Filebeat Window EventLogs can be added via a 'log4jna' log4j appender,
# but is not deployed by default. To learn more see https://github.com/dblock/log4jna

log4j:

  loggerName: tenxfilebeat

  configuration:
    appenders:

      # This logger emits Filebeat log messages to stderr-based
      # on the 'logging.to_stderr' configuration value set in 'filebeat.yml'.
      console:
        - name: filebeatStderr
          target: SYSTEM_ERR

          filters:
            thresholdFilter:
              # enable/disable the appender based on 'filebeatLoggingToStderr'
              level: "${tenxBoolLevel:filebeatLoggingToStderr:true}"

      # this logger emits Filebeat log messages to UNIX Syslog based
      # on the 'logging.to_syslog' configuration value set in 'filebeat.yml'.
      Syslog:
        - name: filebeatSyslog
          host: localhost
          protocol: UDP
          port: 514

          filters:
            thresholdFilter:
              # enable/disable the appender based on 'filebeatLoggingToSyslog'
              level: "${tenxBoolLevel:filebeatLoggingToSyslog}"

      # this logger emits Filebeat log messages to a rolling file based
      # on the configuration values set in 'filebeat.yml'.
      rollingFile:
        - name: filebeatRollingFile

          filters:
            thresholdFilter:
              # enable/disable the appender based on 'filebeatLoggingToFiles'
              level: "${tenxBoolLevel:filebeatLoggingToFiles}"

          # format fileName to <filebeatPath>/<filebeatName>-datetime.ndjson
          fileName:
            "${env:filebeatPath:-${env:filebeatLogsPath}}\
            ${fileSeperator:}\
            ${env:filebeatName:-filebeat}\
            -\
            ${date:yyyyMMdd}\
            .ndjson"

          # format filePattern to <filebeatPath>/<filebeatName>-datetime-%i.ndjson
          filePattern:
            "${env:filebeatPath:-${env:filebeatLogsPath}}\
            ${fileSeperator:}\
            ${env:filebeatName:-filebeat}\
            -\
            ${date:yyyyMMdd}\
            -%i.ndjson"

          # the Filebeat message is already timestamped and formatted; emit as-is
          patternLayout:
            pattern: "%msg%n"

          # Only create files when needed, similar to Filebeat.
          createOnDemand: true

          # the 'posixPermissions' lookup is defined in com.log10x.ext.edge.event.encode.log.plugin.FilePermissionsLookup
          # converts a permission octal mask (e.g., 0600) to a human-readable value  (e.g. 'rw-------')
          # expected by the appender
          filePermissions: "${posixPermissions:${env:filebeatPermissions:-0600}}"

          policies:

            onStartupTriggeringPolicy:
              # If 'filebeatRotateOnStartup' is set to true -> rotate logs on startup (e.g., '1'),
              # otherwise, use '2147483647' (i.e., max int) to disable the policy
              minSize: "${tenxBoolInt:filebeatRotateOnStartup:1:2147483647}"

            sizeBasedTriggeringPolicy:
              size: $?filebeatRotateEveryBytes=10485760 # use a 10MB default, matching filebeat's

            intervalBasedTriggeringPolicy:
              # This policy defined in : com.log10x.ext.edge.event.encode.log.plugin.IntervalBasedTriggeringPolicy
              # implements rollover based on time intervals, matching filebeat's logging.files.interval behavior
              # No default value is set as the feature is off by default in filebeat
              interval: $?filebeatInterval

          defaultRollOverStrategy:
            # use a 7 default, matching filebeat's
            max: ${env:filebeatKeepFiles:-7}

    loggers:
      logger:
        - name: $loggerName
          additivity: false
          appenderRef:
            - ref: filebeatStderr
            - ref: filebeatSyslog
            - ref: filebeatRollingFile
