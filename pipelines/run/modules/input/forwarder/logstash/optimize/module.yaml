#
#  🔟❎ Logstash Optimize module

module:

  name: logstashOptimize

  title: Logstash optimizer

  description: optimize events collected by Logstash forwarders

  # 'configFolders' specifies folders containing default configuration files for this module
  configFolders:
    config: run/input/forwarder/logstash/optimize
    template output: run/input/forwarder/logstash

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: '+include $=TenXEnv.get("docGenerate") ? "run/modules/input/forwarder/logstash/optimize/doc.md":""'

  allowMultiple: false

  options:

    - names:
      - logstashEncodeObjects
      description: controls whether events written to a Logstash forwarder are encoded or written in raw form
      type: boolean
      required: false
      defValue: true
      doc: |
        sets the format in which to serialize TenXObjects back to the Logstash forwarder.
        If true, write events using the [encode](https://doc.log10x.com/api/js/#TenXObject+encode) function.
        If false, write events in their original form as read from the Logstash forwarder
        using the [fullText](https://doc.log10x.com/api/js/#TenXBaseObject+fullText) field.

    - names:
      - logstashOutputFields
      description: list of TenXObject field names to include alongside the main event in output
      type: list
      required: false
      defValue: []
      doc: |
        specifies TenXObject field names to emit alongside the main event text
        when writing back to the Logstash forwarder. When empty (default), only
        the main event field is written. Example fields: level, group, symbolMessage.

    - names:
      - logstashOutputEncodeType
      description: "output format when outputFields are set. Possible values: [json, delimited]"
      type: string
      required: false
      defValue: delimited
      doc: |
        specifies how the combined output (main event field plus outputFields)
        is encoded when writing back to the Logstash forwarder. Possible values:
        - **json**: formats all fields as a JSON object
        - **delimited**: formats field values separated by the output delimiter
        Only takes effect when logstashOutputFields is set.