#
#  🔟❎ OpenTelemetry Collector Regulate module

module:

  name: otelCollectorRegulate

  title: OpenTelemetry Collector regulator

  description: read events from OpenTelemetry Collector forwarders to regulate which events to ship

  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: run/input/forwarder/otel-collector/regulate

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: '+include $=TenXEnv.get("docGenerate") ? "run/modules/input/forwarder/otel-collector/regulate/doc.md":""'

  allowMultiple: false

  options:

    - names:
      - otelCollectorOutputFields
      description: list of TenXObject field names to include alongside the main event in output
      type: list
      required: false
      defValue: []
      doc: |
        specifies TenXObject field names to emit alongside the main event text
        when writing back to the OpenTelemetry Collector forwarder. When empty (default), only
        the main event field is written. Example fields: level, group, symbolMessage.

    - names:
      - otelCollectorOutputEncodeType
      description: "output format when outputFields are set. Possible values: [json, delimited]"
      type: string
      required: false
      defValue: delimited
      doc: |
        specifies how the combined output (main event field plus outputFields)
        is encoded when writing back to the OpenTelemetry Collector forwarder. Possible values:
        - **json**: formats all fields as a JSON object
        - **delimited**: formats field values separated by the output delimiter
        Only takes effect when otelCollectorOutputFields is set.

