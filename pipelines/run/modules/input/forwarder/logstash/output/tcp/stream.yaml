# 🔟❎ 'run' Logstash forward output stream configuration

# This configuration defines a TCP socket output through which to write
# TenXObject encoded/plain-text values are to a Logstash forwarder process via a TCP socket.

# Set the 10x pipeline to 'run'
tenx: run

# =============================== Dependencies ================================

include:
  - source: match
    options:

      # Capture outputSocketPort from 'tenx-pipe-in-tcp.conf' as 10x env variable
      #
      path: '$="run/input/forwarder/logstash/" + (TenXEnv.get("logstashEncodeObjects") ? "optimize" : "regulate") + "/tenx-pipe-in-tcp.conf"'
      regex: "port\\s=>\\s*\"\\$\\{tenx_marker_pipeline_tcp_port:\\s*(?<rawOutputSocketPort>\\d+)\\s*\\}\""

    # Load the TCP socket module
  - run/modules/output/event/socket

# ============================= Output Options ================================

# 'outputSocket' defines the output used to write back to the Logstash forwarder
outputSocket:

    # Regulate-only mode (logstashEncodeObjects=false): every event goes out as fullText.
  - protocol: TCP

    host: 127.0.0.1

    port: $=rawOutputSocketPort

    writeObjects: /$=!TenXEnv.get("logstashEncodeObjects")

    fields:
      - fullText
      - $?logstashOutputFields
    encodeType: $?logstashOutputEncodeType
    encodeDelimiter: ","

    writeTemplates: false

    # Compact-capable mode (logstashEncodeObjects=true): per-event decision via
    # the compactRegulator predicate. One stream, ternary output field.
  - protocol: TCP

    host: 127.0.0.1

    port: $=rawOutputSocketPort

    writeObjects: /$=TenXEnv.get("logstashEncodeObjects") && !TenXEnv.get("compactRegulatorLookupFile")

    fields:
      - encoded=encode()
      - $?logstashOutputFields
    encodeType: $?logstashOutputEncodeType
    encodeDelimiter: ","

    writeTemplates: /$=TenXEnv.get("logstashEncodeObjects")

  - protocol: TCP

    host: 127.0.0.1

    port: $=rawOutputSocketPort

    writeObjects: /$=TenXEnv.get("logstashEncodeObjects") && TenXEnv.get("compactRegulatorLookupFile") != null

    fields:
      - 'output=shouldEncode() ? encode() : fullText'
      - $?logstashOutputFields
    encodeType: $?logstashOutputEncodeType
    encodeDelimiter: ","

    writeTemplates: /$=TenXEnv.get("logstashEncodeObjects")
