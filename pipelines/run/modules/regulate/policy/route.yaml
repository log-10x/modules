- route:

    id: policyOutputRoute
    from:
      uri: timer:policyOutput
      parameters:
        repeatCount: 1
        synchronous: true

      steps:
        # load request REST headers

        - setHeader:
            name: httpMethod
            expression:
              constant: POST
 
        - setHeader:
            name: Content-Type
            expression:
              constant: application/x-www-form-urlencoded
 
        - setHeader:
            name: X-10X-Auth
            expression:
              simple: ${bean:tenx.env("TENX_API_KEY")}

        - doTry:
            steps:

              # log the request to Prometheus
              - log:
                  message: "Prometheus request: ${bean:tenx.eval(ratePrometheusQuery)}"
                  loggingLevel: INFO

              # submit the query to the Prometheus API endpoint
              - toD:
                  uri: netty-http:${bean:tenx.eval(ratePrometheusQuery)}

              # log the response from Prometheus
              - to:
                  uri: log:?level=INFO&showBody=true&showHeaders=true

            # close on error
            doCatch:
              - exception: java.lang.Exception
                steps:
                  - log:
                      message: "HTTP error: ${exception.message}"
                      loggingLevel: ERROR
                  - to:
                      uri: bean:tenx
                      parameters:
                        method: close()

        # write query result to our output stream
        - setHeader:
            name: stream
            expression:
              simple: ${bean:tenx.stream}
        - to:
            uri: stream:header
        - to:
            uri: bean:tenx?method=close