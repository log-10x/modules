#
# 🔟❎ 'run' Filebeat Regulate module

module:

  name: filebeatRegulate

  title: Filebeat regulator

  description: read events from Filebeat forwarders to regulate which events to ship

  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: run/input/forwarder/filebeat/regulate

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: '+include $=TenXEnv.get("docGenerate") ? "run/modules/input/forwarder/filebeat/regulate/doc.md":""'

  allowMultiple: false

  options:

    - names:
      - filebeatEncodeObjects
      description: controls whether events written to a Filebeat forwarder are encoded or written in raw form
      type: boolean
      required: false
      defValue: false
      doc: |
        sets the format in which to serialize TenXObjects back to the Filebeat forwarder.
        If true, write events using the [encode](https://doc.log10x.com/api/js/#TenXObject+encode) function.
        If false, write events in their original form as read from the Filebeat forwarder
        using the [fullText](https://doc.log10x.com/api/js/#TenXBaseObject+fullText) field.

    - names:
      - filebeatOutputFields
      description: list of TenXObject field names to include alongside the main event in output
      type: list
      required: false
      defValue: []
      doc: |
        specifies TenXObject field names to emit alongside the main event text
        when writing back to the Filebeat forwarder. When empty (default), only
        the main event field is written. Example fields: level, group, symbolMessage.

    - names:
      - filebeatOutputEncodeType
      description: "output format when outputFields are set. Possible values: [json, delimited]"
      type: string
      required: false
      defValue: delimited
      doc: |
        specifies how the combined output (main event field plus outputFields)
        is encoded when writing back to the Filebeat forwarder. Possible values:
        - **json**: formats all fields as a JSON object
        - **delimited**: formats field values separated by the output delimiter
        Only takes effect when filebeatOutputFields is set.