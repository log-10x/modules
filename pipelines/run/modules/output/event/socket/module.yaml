#
# 🔟❎ 'run' TCP/UDP socket output module

module:

  name: socketOutput

  title: TCP/UDP output

  description: write TenXObject and template values to a TCP/UDP socket

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: '+include $=TenXEnv.get("docGenerate") ? "run/modules/output/event/socket/doc.md":""'

  # 'allowMultiple' is enabled for this module. Pipeline command line arguments and configuration files
  #  can specify multiple groupings of the options defined below.
  allowMultiple: true

  # 'options' defines a group of named/typed configuration values to pass to a unit/module at startup
  #  via command line arguments (e.g., '> tenx -myA X -myB Y') or YAML launch files (e.g., '> tenx @my.config').
  #  Instances of this group passed are accessible at runtime via TenXEnv.get: https://doc.log10x.com/api/js/#TenXEnv.get
  options:

    - names:
        - outputSocketProtocol
      description: Network protocol for the socket, either "TCP" or "UDP".
      type: string
      required: false
      doc: |
        specifies the Network protocol for the socket, either "TCP" (default) or "UDP"

    - names:
        - outputSocketHost
      description: host TCP/UDP address to connect and write to
      type: string
      required: false
      doc: |
        specifies a TCP/UDP address to transmit TenXObject instance/template field values
      defValue: 127.0.0.1

    - names:
        - outputSocketPort
      description: endpoint port number
      type: number
      required: true
      doc: |
        specifies the port number  (e.g., 9000) of the endpoint to transmit data to

    - names:
        - outputSocketFields
      description: list of TenXObject field names to encode
      type: list
      required: false
      doc: |
        specifies a list of TenXObject intrinsic/calculated/extracted field names to extract and write to the output.

    - names:
        - outputSocketFilter
      description: a JavaScript expression an TenXObject must evaluate as 'truthy' against to be written to this output
      type: string
      required: false
      doc: |
        Specifies a JavaScript expression that an TenXObject must evaluate as truthy to write its
        instance/template field values to this output.
        For example, 'outputSocketFilter: this.timestamp' will only emit [timestamped]https://doc.log10x.com/api/js/#TenXBaseObject+timestamped) TenXObjects.

    - names:
        - outputSocketWriteObjects
      description: if true, encode TenXObjects [outputSocketFields](https://doc.log10x.com/run/output/event/socket/#outputsocketfields) to this output
      type: string
      required: false
      doc: |
        Determine whether to write [outputSocketFields](https://doc.log10x.com/run/output/event/socket/#outputsocketfields) values of an TenXObject passed to this output.
        This configuration is typically defined using a JavaScript expression.

        To enable/disable the output depending on whether a launch argument, environment variable,
        or JVM -D option evaluates as truthy, use:
        ``` yaml
          outputSocketWriteObjects: $=TenXEnv.get("myTCPAddress")
        ```
        To learn more see [TenXEnv.get](https://doc.log10x.com/api/js/#TenXEnv.get).

      defValue: true

    - names:
        - outputSocketWriteTemplates
      description: if true, write new TenXTemplates to this output
      type: string
      required: false
      doc: |
        controls whether to write template values of TenXObjects passed to this output.
        The output will only emit TenXTemplates that the pipeline did not load at startup via the [templateFile](https://doc.log10x.com/run/template/#templatefiles) argument,
        and will only emit an TenXTemplate once based on its [templateHash](https://doc.log10x.com/api/js/#TenXBaseObject+templateHash) value.
      defValue: false

    - names:
        - outputSocketEncodeType
      description: the output format in which to encode TenXObject values. Possible values:[json, delimited]
      type: string
      defValue: delimited
      required: false
      doc: |
        specifies how to encode [outputSocketFields](https://doc.log10x.com/run/output/event/socket/#outputsocketfields) values to this output. Possible values:
        - **json**: formats names and values for the current TenXObject as: {"field":"str","field2":1, "field3": true}
        - **delimited**: formats values for the current TenXObject as: "str",1,true
           The [outputSocketEncodeDelimiter](https://doc.log10x.com/run/output/event/socket/#outputsocketencodedelimiter) argument determines the separator to use.

    - names:
        - outputSocketEncodedLinePrefix
      description: the line prefix prepended to the encoded event if 'outputSocketEncodeType' is 'delimited'
      type: string
      required: false
      doc: |
        sets the char which is prepended to the emitted TenXObject field values when [outputSocketEncodeType](https://doc.log10x.com/run/output/event/socket/#outputsocketencodetype) is `delimited`.
      defValue: ''

    - names:
        - outputSocketEncodeDelimiter
      description: the delimiter placed between key and values pairs if 'outputSocketEncodeType' is 'delimited'
      type: string
      required: false
      doc: |
        sets the char delimiter to separate TenXObject field values when [outputSocketEncodeType](https://doc.log10x.com/run/output/event/socket/#outputsocketencodetype) is `delimited`.
      defValue: ' '
