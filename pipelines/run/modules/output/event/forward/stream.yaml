#
# 🔟❎ 'run' Fluentd 'forward' output module stream settings

# The 'forwardOutput' module defines a Fluentd 'forward' output to which
# to write TenXObject instance/template field values. The configuration
# below constructs a log4j-backed output stream for each instance of
# the 'forwardOutput' options group.


# Set the 10x pipeline to 'run'
tenx: run

output:

    # 'type' defines the type of output (e.g., stdout, event, metrics).
    #  This output utilizes a log4j2 file appender to emit TenXObject instance/template field values
  - type: event

    # 'name' assigns a logical name to this output instance
    name: $=yield TenXEnv.get("outputForwardAddress", TenXEnv.get("outputForwardHostAddress","127.0.0.1") + ":" + TenXEnv.get("outputForwardHostPort",24224))

    # 'foreach' sets 'forwardOutput' as the options group for whose instances
    #  to create matching output streams to allow multiple forward outputs.
    foreach: forwardOutput

    # 'enabled' sets whether to open the output. If true, any 'filter' value
    #  set below is evaluated for each TenXObject to determine whether to write its instance/template field values to output.
    # `reducerReadOnly=true` short-circuits the gate so the reducer can run as a non-intervening reporter.
    enabled: $=yield !TenXEnv.get("reducerReadOnly", false) && TenXEnv.get("outputForwardWriteObjects", true)

    # 'filter' is configured only to encode TenXObject instance field values.
    #  A separate output stream is defined below to encode TenXTemplates
    filter: $?outputForwardFilter=isObject

    # 'path' points to the log4j2 configuration used for the output's
    #  appender and logger at: https://github.com/log-10x/modules/blob/main/pipelines/run/modules/output/event/forward/log4j2.yaml
    path: run/modules/output/event/forward

    # 'group' sets 'outputForwardAddress', 'outputForwardHostAddress' and 'outputForwardHostPort'
    #  as the keys for grouping all forward outputs targeting a socket into a single log4j2 appender.
    #  This prevents a situation where multiple non-synchronized appenders may be trying
    #  to write to the same socket.
    group:
      - $?outputForwardAddress
      - $?outputForwardHostAddress=127.0.0.1
      - $?outputForwardHostPort=24224

    # 'encodeType', 'encodeDelimiter' and 'encodeGroupDelimiter' control how TenXObject field values are
    #  written to the forward output.
    encodeType: $?outputForwardEncodeType=delimited
    encodeDelimiter: $?outputForwardEncodeDelimiter=","
    encodeGroupDelimiter: ","

    # 'fields' defines the intrinsic/extracted/calculated field values
    #  to write to for each TenXObject passed to this output.
    fields:
      - $?outputForwardFields

    # If 'outputForwardWriteTemplates' is true, encode Template values for TenXObjects as JSON objects.
    # To learn more about TenXTemplates, see https://doc.log10x.com/run/template
  - type: event

    # 'name' assigns a logical name to this output instance
    name: $=yield TenXEnv.get("outputForwardAddress", TenXEnv.get("outputForwardHostAddress","127.0.0.1") + ":" + TenXEnv.get("outputForwardHostPort",24224))

    # 'foreach' sets 'forwardOutput' as the options group for whose instances
    #  to create matching output streams to allow multiple forward outputs.
    foreach: forwardOutput

    # 'path' points to the log4j2 configuration used for this output at:
    #  https://github.com/log-10x/modules/blob/main/pipelines/run/modules/output/event/forward/log4j2.yaml
    path: run/modules/output/event/forward

    # 'group' sets 'outputForwardAddress', 'outputForwardHostAddress' and 'outputForwardHostPort'
    #  as the keys for grouping all forward outputs targeting a socket into a single log4j2 appender.
    #  This prevents a situation where multiple non-synchronized appenders may be trying
    #  to write to the same socket.
    group:
      - $?outputForwardAddress
      - $?outputForwardHostAddress=127.0.0.1
      - $?outputForwardHostPort=24224

    # 'enabled' must be set to true to encode TenXTemplates to this output.
    # `reducerReadOnly=true` short-circuits so no templates are emitted in read-only mode.
    enabled: $=yield !TenXEnv.get("reducerReadOnly", false) && TenXEnv.get("outputForwardWriteTemplates", true)

    # 'filter' uses the 'isNewTemplate' 10x JavaScript function to skip templates
    #  loaded via the https://doc.log10x.com/run/template/#templatefiles argument or previously written to this output
    filter: isNewTemplate()

    encodeType: json
    fields:
      - templateHash
      - template
      - tag="tenx-template" # Set a constant Fluentd tag for TenXTemplates
