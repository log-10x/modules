#
# 🔟❎ 'run' Cloud reporter app

app:

  name: cloudReporter

  title: Cloud Reporter

  description: report on the app/infra events incurring the most storage and licensing costs

  # 'configFolders' specifies folders containing default configuration files for this module
  configFolders:

    main Config: apps/cloud/reporter

    analyzer Inputs+Splunk: run/input/analyzer/splunk
    analyzer Inputs+Elastic: run/input/analyzer/elastic
    analyzer Inputs+Logz.io: run/input/analyzer/logzio
    analyzer Inputs+Coralogix: run/input/analyzer/coralogix
    analyzer Inputs+CloudWatch Logs: run/input/analyzer/cloudwatchLogs
    analyzer Inputs+Datadog Logs: run/input/analyzer/datadogLogs

    initializers+message: run/initialize/message
    initializers+level: run/initialize/level
    initializers+group: run/initialize/group
    initializers+httpCode: run/initialize/httpCode
    initializers+lookup: run/initialize/lookup
    initializers+k8s: run/initialize/k8s
    initializers+geoIP: run/initialize/geoIP

    metric Outputs+log10x metrics: run/output/metric/log10x
    metric Outputs+Prometheus: run/output/metric/prometheus/scrape
    metric Outputs+Prometheus PG: run/output/metric/prometheus/push-gateway
    metric Outputs+Prometheus RW: run/output/metric/prometheus/remote-write
    metric Outputs+Datadog: run/output/metric/datadog
    metric Outputs+CloudWatch: run/output/metric/cloudwatch
    metric Outputs+Elastic: run/output/metric/elastic
    metric Outputs+SignalFx: run/output/metric/signalFx
    metric Outputs+Log: run/output/metric/log

  advancedConfigFolders:

    bootstrap: run/bootstrap
    github Sync: gitops
    symbols: run/symbol
    aggregators: run/aggregate/report
    template: run/template

    transform+timestamp: run/transform/timestamp
    transform+fieldParser: run/transform/fields
    transform+origin: run/transform/symbol
    transform+group: run/transform/group
    transform+parallelize: run/transform/parallelize

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: +include $=TenXEnv.get("docGenerate") ? "apps/cloud/reporter/doc.md":""
