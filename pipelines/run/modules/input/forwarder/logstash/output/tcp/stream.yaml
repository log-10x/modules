# рџ”џвќЋ 'run' Logstash TCP output stream configuration

# Writes events to a Logstash forwarder process via a TCP socket.
#
# Mode is selected by `outputEncodeField` and `outputWriteTemplates` вЂ” see
# run/modules/input/forwarder/module.yaml for the shared-option model.

# Set the 10x pipeline to 'run'
tenx: run

# =============================== Dependencies ================================

include:
  - source: match
    options:

      # Capture outputSocketPort from 'tenx-pipe-in-tcp.conf' as 10x env variable.
      # Optimize/regulate selects the Logstash-side config, key it off outputWriteTemplates.
      path: '$="run/input/forwarder/logstash/" + (TenXEnv.get("outputWriteTemplates") ? "optimize" : "regulate") + "/tenx-pipe-in-tcp.conf"'
      regex: "port\\s=>\\s*\"\\$\\{tenx_marker_pipeline_tcp_port:\\s*(?<rawOutputSocketPort>\\d+)\\s*\\}\""

    # Load the TCP socket module
  - run/modules/output/event/socket

# ============================= Output Options ================================

outputSocket:

  - protocol: TCP
    host: 127.0.0.1
    port: $=rawOutputSocketPort

    fields:
      - $?outputEncodeField=fullText
      - $?logstashOutputFields

    encodeType: $?logstashOutputEncodeType
    encodeDelimiter: ","

    writeTemplates: $?outputWriteTemplates=false
