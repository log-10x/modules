# 🔟❎ 'run' device output module log4j configuration

# The device output log4j2 configuration defines the loggers and appenders used to
# write TenXObject field and template values to a target device output.
# Multiple device outputs are supported, each specified by the instance 
# of the 'stdout' module defined in https://doc.log10x.com/run/output/event/stdout

log4j:

  # 'loggerName' defines a prefix to use with a running counter (e.g., 'tenxStdout0') 
  #  to name matching log4j2 logger and appender objects uniquely 
  #  for each instance of the 'stdout' options group 

  #  This provides the ability to encode TenXObjects to different sockets
  #  based on different sets of filters (specified by 'outputStdoutFilter') 
  #  and fields (specified by 'outputStdoutFields'). 
  loggerName: tenxStdout

  configuration: 
    appenders:    
  
      console:

          # 'name' sets a unique identifier assigned to each appender
          #  generated for a target output defined by an instance of the 
          #  'stdout' options group 
        - name: $loggerName
          
          # define the pipe to which to write: SYSTEM_OUT/SYSTEM_ERR
          target: $?outputStdoutTarget=SYSTEM_OUT

          # The 'encodedFields' and 'filter' options of the 'tenxLayout' layout 
          # are set to the 'outputStdoutFields' and 'outputStdoutFilter' arguments                  
          tenxLayout:
          # The 'encodedFields' and 'filter' options of the 'tenxLayout' layout 
          # consume the 'outputStdoutFields' and 'outputStdoutFilter' arguments at runtime
            encodedFields: null
            filter: null

          # ensure a large buffer size for very long lines
          bufferSize: 2000000
                   
    loggers:
      logger:
 
          # A dedicated logger whose name matches the socket appender is used to
          # to write object/template values for this output instance
        - name: $loggerName
          additivity: false
          appenderRef:
            - ref: $loggerName
