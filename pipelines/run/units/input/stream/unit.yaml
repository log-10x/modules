#
# 🔟❎ 'run' input streams unit

unit:
  
  name: inputStreams

  title: Input stream

  description: read events from a variety of sources to transform into TenXObjects 

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: +include $=TenXEnv.get("docGenerate") ? "run/units/input/stream/doc.md":""

  # 'allowMultiple' is enabled for this unit. Pipeline command line arguments and configuration files
  #  can specify multiple groupings of the options defined below.
  allowMultiple: true
   
  # 'options' defines a group of named/typed configuration values to pass to a pipeline unit/module at startup
  #  via command line arguments (e.g., '> tenx -myA X -myB Y') or YAML launch files (e.g., '> tenx @my.config').
  #  Instances of this group passed are accessible at runtime via TenXEnv.get: https://doc.log10x.com/api/js/#TenXEnv.get
  options:
  
    - names:
      - inputName
      description: logical name for the input stream 
      type: string
      required: false
      category: general
      doc: |
        defines a unique logical name for the input (e.g., `myFluentd`). 
        Each TenXObject instantiated from events read from this input
        will return this value via its [inputName](https://doc.log10x.com/api/js/#TenXBaseObject+inputName) field. 
      defValue: an automatically generated input name  
 
    - names:
      - inputEnabled
      description: a JavaScript expression that must be evaluated as 'truthy' to enable the input
      type: string
      required: false
      category: general      
      doc: |
        enables/disables this input stream. If set, the JavaScript expression returns a truthy value
        to open the input. For example, to configure this value to use a startup argument/shell variable, use:
        
        ``` yaml
        input:
           name: myInput
           enabled: TenXEnv.get("readFromStdin") 
          ... 
        ```
      defValue: true  

    - names:
      - inputType
      description: type of stream. Possible values:[stream, file, inline, stdin]
      type: string
      category: stream      
      required: true
      doc: |
        determines the type of input. Possible values:
        - file: contents of a target file specified by [inputPath](https://doc.log10x.com/run/input/stream/#inputpath). The file is read once and NOT tailed.
        - stdin: read from the process stdin device.
        - inline: read JSON-escaped event(s) from the value of `inputPath` separated by `\n`.
        - stream: read events from an [InputStream](https://docs.oracle.com/javase/8/docs/api/java/io/InputStream.html) 
          or [Reader](https://docs.oracle.com/javase/8/docs/api/java/io/Reader.html?is-external=true) sub-class specified by by 'inputPath'
           
    - names:
      - inputPath
      description: input stream location
      type: string
      required: true
      category: stream      
      doc: |
        specifies the location from which to read events. This value depends on [inputType](https://doc.log10x.com/run/input/stream/#inputtype). For:
        - file: file path\glob on disk (relative or canonical), or `stdin`` to read from the process stdin device
        - inline: JSON-escaped content events separated by `\n`.
        - stream: fully qualified [InputStream](https://docs.oracle.com/javase/8/docs/api/java/io/InputStream.html)/
          [Reader](https://docs.oracle.com/javase/8/docs/api/java/io/Reader.html?is-external=true) sub-class to instantiate.
        - stdin: [inputPath](https://doc.log10x.com/run/input/stream/#inputpath) is ignored.
      
    - names:
      - inputArgs
      description: custom arguments passed to InputStream
      type: list
      category: stream      
      required: false
      doc: |
        If [inputType](https://doc.log10x.com/run/input/stream/#inputtype) is `stream`, this argument specifies a list of values pairs (key1,value1...) passed to the constructor of the
        InputStream/Reader sub-class specified by [inputPath](https://doc.log10x.com/run/input/stream/#inputpath). 
        
        A Map combining these values and those of the input's module option group 
        specified by the (inputForeach)[#inputforeach] argument (if present) provides the 
        stream with module-specific context (e.g., auth tokens, host addresses) 'config' map.

        An [EvaluatorBean](https://github.com/log-10x/pipeline-extensions/blob/main/edge-extensions/src/main/java/com/log10x/api/bean/EvaluatorBean.java) reference
        provides an interface to the 10x JavaScript engine.

        For example:

        ``` java
          import com.log10x.api.bean.EvaluatorBean;
          import java.io.Reader;
          import java.util.Map;

          public class MyReader extends Reader {
        
            /**
            * If a constructor with this signature is found, it is used. 
            * 
            * @param config	combines launch argument provided to the 10x Engine
            * 					    for this input with those specified by 'inputArgs' 	
            * @param bean		provides an interface to the 10x Engine
            */
            public MyReader(Map<String, Object> config, EvaluatorBean bean) {
            }
 
            /**
            * If the above constructor is not defined this signature is used. 
            * 
            * @param config	combines launch argument provided to the 10x Engine
            * 					    for this input with those specified by 'inputArgs'
            */
    
            public MyReader(Map<String, Object> config) {
            }

            /**
            * 
            * If the two signatures above are not defined a parameterless
            * constructor must be defined.
            */
            public MyReader(){
            } 

            @Override
            public int read(char[] cbuf, int off, int len) throws IOException {
              //Read data from the underlying input 
              return charsRead;
            }

            @Override
            public void close() throws IOException {
            // close input
            }
        }
        ```
        
        If the search for a matching constructor fails, the pipeline halts. 
        
    - names:
      - inputPrintProgress
      description: sets whether this input reports progress to the console 
      type: string
      category: general      
      required: false
      doc: |
        controls whether to print information on the volume of events read input to the console.
        The [printProgress](https://doc.log10x.com/run/console/#printprogress) launch argument must also be set for this value to take effect.

    - names:
      - inputExtractors
      description: names of extractors defining JSON fields/regex capture groups to select
      type: list
      category: parse      
      required: false
      doc: |
        specifies a list of [input extractors](https://doc.log10x.com/run/input/extract) to apply on events read from this input stream. 
          
        If this value is empty, each line read from the stream of up to 65536 characters
        is used to instantiate an TenXObject. Lines that exceed that length force 
        a virtual line break, and the following characters will form the next event until a line break is detected.


    - names:
      - inputEscapeScheme
      description: unescape scheme to apply to characters read from the underlying input
      type: string
      category: parse      
      required: false
      doc: |
        specifies an unescape algorithm to apply to characters read from the underlying input.
        Supported values: [json,java,xml,html,javaScript]. If not specified, characters are treated as not escaped.

        To learn more see [Unescape algorithms](https://www.unbescape.org/usingunbescape.html).
                          
    - names:
       - inputSourcePattern
      description: a regex pattern used to extract the 'source' value
      type: string
      category: parse      
      required: false
      doc: |
        defines a regex pattern that, if matched for the current event text
        is attached to each TenXObject extracted from it as its 'source' value.  

        The source value identifies the logical location (e.g., log file, host address) from which an event originated. For example,
        a [forwarder input](https://doc.log10x.com/run/input/forwarder) may read events from multiple log files (i.e., sources) concurrently.
    
        Assigning source values ensures that single and multiline events (e.g., stack traces) read from a target input (e.g., Filebeat, Fluent Bit) 
        originating from a source location (e.g., /var/log/a.log) are sequenced and grouped
        without interlacing with events from a different source (e.g., /var/log/b.log).

        For example, when reading events originating from different log files,
        the `sourcePattern` can be set to: `\"fileName\":"(.*?)\"`
        to extract a 'fileName' JSON field within each event to ensure the resulting
        TenXObjects are sequenced and grouped (as in the case of stack traces)
        with other TenXObjects based on the actual log file from which they originated. 

        The TenXObject intrinsic [source](https://doc.log10x.com/api/js/#TenXObject+source) field provides access to this value at runtime 
        to control how to sequence an instance with other TenXObjects read from the current input stream. 

        To learn more see [event source](https://doc.log10x.com/run/transform/group/#event-source).

    - names:
      - inputSourceFields
      description: JSON fields from which to extract the 'source' value
      type: string
      category: parse      
      required: false
      doc:
        specifies a list of JSON fields whose value are captured from every matching capture group within [inputSourcePattern](https://doc.log10x.com/run/input/stream/#inputsourcepattern).

        If no source pattern is set the entire event is scanned for the target JSON field values.

        The TenXObject intrinsic [source](https://doc.log10x.com/api/js/#TenXObject+source) field provides access to joint value at runtime 
        to control how to sequence an instance with other TenXObjects read from the current input stream. 

        To learn more see [event source](https://doc.log10x.com/run/transform/group/#event-source).


    - names:
      - inputSourceFilter
      description: a regex pattern used to filter out input events from applying 'inputSourcePattern'
      type: string
      category: parse      
      required: false
      doc: |
        specifies a regex pattern to match for [inputSourcePattern](https://doc.log10x.com/run/input/stream/#inputsourcepattern) to be applied.

        This pattern provides an option to specify a fast-performing pattern to determine 
        whether inputSourcePattern is applied to capture 'source' values for TenXObjects extracted for an event read from the input.
        
        For example, `inputSourceFilter` can determine whether an input event
        begins with a target character sequence before a more complex `inputSourcePattern` is
        applied to select its 'source' value.
      
    - names:
      - inputBackpressureIntervalBytesLimit
      description: the max allowed number of bytes to read within 'inputBackpressureIntervalBytesDuration'
      type: string
      category: backpressure      
      required: false
      doc: |
        sets the maximum number of bytes that can be read by the
        input within the target [inputBackpressureIntervalBytesDuration](https://doc.log10x.com/run/input/stream/#inputbackpressureintervalbytesduration). If exceeded,
        the input blocks further reading (if supported); otherwise, the input
        drops events from the pipeline for the remainder of the interval.
        
        For example:
        ``` yaml
        inputBackpressureIntervalBytesLimit: $=ParseBytes("10MB")
        ```
        
        If set, [inputBackpressureIntervalBytesDuration](https://doc.log10x.com/run/input/stream/#inputbackpressureintervalbytesduration) must also be set.
        
        This option aims to prevent a situation where the inflow of data exceeds the
        memory allocated to the pipeline's host JVM via the XMX argument.
        
        To learn more see [JVM heap](https://www.baeldung.com/jvm-parameters#explicit-heap-memory---xms-and-xmx-options).
       
    - names:
       - inputBackpressureIntervalBytesDuration
      description: the time interval after which to reset the backpressure input quota 
      type: string
      category: backpressure      
      required: false
      doc: |
        sets the interval in milliseconds for which [inputBackpressureIntervalBytesLimit](https://doc.log10x.com/run/input/stream/#inputbackpressureintervalbyteslimit) is enforced.
        
        When the duration elapses, the input resets the counter against which `inputBackpressureIntervalBytesLimit` is measured. 
        
        If set, `inputBackpressureIntervalBytesLimit` must also be set.
        
        For example:
        ``` yaml
        inputBackpressureIntervalBytesDuration: $=parseDuration("1m")
        ```

    - names:
      - inputBackpressureTotalEventsLimit
      description: the total number of bytes to read from input
      type: string
      category: backpressure      
      required: false
      doc: |
        set the max number of events a target pipeline input will read into the pipeline. 
        This value limits the volume of events to read from a local/remote source (e.g., log analyzer). 
        
    - names:
      - inputBackpressureTotalBytesLimit
      description: the total number of bytes to read from input
      type: string
      category: backpressure      
      required: false
      doc: |
        set the max number of bytes a target pipeline input will read into the pipeline. 
        This value limits the volume of events to read from a local/remote source (e.g., log analyzer). 
        
        For example:
        ``` yaml
        inputBackpressureTotalBytesLimit: $=ParseBytes("1GB")
        ```
        
    - names:
      - inputBackpressureTotalDuration
      description: a JavaScript expression that evaluates the max duration in which an input can read events before closing
      type: string
      category: backpressure      
      required: false
      doc: |
        set the max duration (e.g. `1m`) an input can read events from a local/remote
        source before closing. 

        For example:
        ``` yaml
        inputBackpressureTotalDuration: $=parseDuration("5m")
        ```

    - names:
      - inputForeach
      description: name of option group for whose instances to create input streams
      type: string
      category: advanced      
      required: false
      doc: |
        specifies the name of an options group for whose instances 
        to replicate this input stream object. This value enables 10x modules
        to create multiple input instances, each receiving a unique set of arguments.
       
        For a full example, see [Elastic input](https://doc.log10x.com/run/input/analyzer/elasticsearch).
      