# Fluentd 'report' (read-only) configuration
#
# This configuration utilizes the Fluentd 'exec-filter' plugin to launch and
# pipe events into a 10x sub-process for read-only aggregation. 10x reads
# events, runs aggregators, and publishes TenXSummary metrics — but does NOT
# write events back (reducerReadOnly=true gates the forward output module).
#
# The exec_filter still acts as a long-running pipe to the 10x sub-process;
# it just emits nothing downstream because 10x produces no stdout output.
# Events reach their final Fluentd output via the parallel @FINAL-OUTPUT
# route configured in 04_outputs_report.conf (a `<copy>` that fans out to
# both @TENX and @FINAL-OUTPUT).
#
# To use, include this file in your Fluentd config via an '@include' directive
# and ensure the 04_outputs_report.conf variant is in use (the chart's
# fluentd-configurations-cm.yaml selects it when tenx.readOnly is true).
#

# Loads the Unix-backed exec_filter and sets TENX_RUN_ARGS to the
# 'report' configuration (reducer with reducerReadOnly=true).
#
@include "#{(ENV['TENX_RUN_ARGS']='@run/input/forwarder/fluentd/regulate/config.yaml @apps/reducer reducerReadOnly true') && 'auxiliary/tenx-unix-exec-filter.conf'}"

# NOTE: no `auxiliary/tenx-unix-source.conf` include and no @TENX-PHASE-2
# label here — read-only mode has no return loop, so there is nothing to
# read back from 10x. Events flow through the original Fluentd pipeline via
# the parallel @FINAL-OUTPUT route in the chart's 04_outputs_report.conf.
