#
# 🔟❎ 'run' AWS CloudWatch metrics stream settings

# The 'cloudwatchMetrics' module defines an AWS CloudWatch output to publish TenXSummary metrics.
# The configuration below constructs a micrometer-backed output stream for each instance of the options group
# passed to the 10x Engine via configuration files or command line arguments.

# Set the 10x pipeline to 'run'
tenx: run

output:

    # 'type' defines the output type (e.g., stdout, log4j, micrometer).
  - type: metric

    # 'enabled' controls whether to open this output stream.
    enabled: $?cloudwatchEnabled=true

    # 'name' assigns a logical name to this output instance
    name: $cloudwatchNamespace

    # 'path' points to the fully qualified class name that implements 'MetricRegistryFactory'
    # which is instantiated to create the AWS CloudWatch micrometer registry.
    #  To learn more see: https://github.com/log-10x/pipeline-extensions/blob/main/edge-extensions/src/main/java/com/log10x/ext/edge/micrometer/MetricRegistryFactory.java
    path: com.log10x.ext.cloud.micrometer.registry.CloudWatchMetricRegistryFactory

    # 'fields' is set to all the metrics dimension Tags
    # To learn more about tags, see: https://www.baeldung.com/micrometer#1-tags
    fields: $?cloudwatchTagFields

    # 'filter' is set to write TenXSummary instances to the micrometer registry
    filter: $?cloudwatchFilter=isSummary

    # 'foreach' sets 'cloudwatchMetrics' as the options group for whose instances
    #  to create matching output streams. This option enables the creation of multiple time series outputs.
    foreach: cloudwatchMetrics
