# 🔟❎ 'run' Unix domain socket output settings

# The 'unixSocketOutput' module defines a Unix domain socket output
# to write TenXObject instance/template field values. The configuration
# below constructs a log4j-backed output stream for each instance of
# the 'unixSocketOutput' options group.

# To learn more about unix sockets, see https://man7.org/linux/man-pages/man7/unix.7.html

# Set the 10x pipeline to 'run'
tenx: run

output:

    # 'type' defines the type of output (e.g., stdout, event, metric).
    #  The 'Unix' output utilizes a log4j2 file appender to emit object/template values
  - type: event

    # 'name' assigns a logical name to this output instance
    name: $outputUnixSocketAddress

    # 'path' points to the log4j2 configuration used for the output's
    #  appender and logger at: https://github.com/log-10x/modules/blob/main/pipelines/run/modules/output/event/unix/log4j2.yaml
    path: run/modules/output/event/unix

    # 'enabled' sets whether to open the output. If true, any 'filter' value
    #  set below is evaluated for each TenXObject to determine whether to write its instance/template field values to output.
    enabled: $?outputUnixSocketWriteObjects=true

    # 'filter' is set to skip templates when encoding object field values.
    #  A separate unix output stream is defined below to encode templates
    filter: $?outputUnixSocketFilter=isObject

    # 'foreach' sets 'unixSocketOutput' as the options group for whose instances
    #  to create matching output streams to allow multiple Unix domain socket outputs.
    foreach: unixSocketOutput

    # 'group' sets 'outputUnixSocketAddress' as the key for grouping all socket outputs
    #  targeting a socket into a single log4j2 appender. This
    #  prevents a situation where multiple non-synchronized appenders may be trying
    #  to write to the same Unix domain socket.
    group:
      - $outputUnixSocketAddress

    # 'encodedLinePrefix', 'encodeType' and 'encodeDelimiter' control how TenXObject field values are
    #  written to output. To learn more see https://doc.log10x.com/run/output/event/unix/#outputunixsocketencodetype
    encodedLinePrefix: $?outputUnixSocketEncodedLinePrefix=""
    encodeType: $?outputUnixSocketEncodeType=delimited
    encodeDelimiter: $?outputUnixSocketEncodeDelimiter=" "

    # 'encodeGroupDelimiter' controls how grouped TenXObject field values are
    #  written to output.
    encodeGroupDelimiter: $?outputFileEncodeGroupDelimiter=""

    # 'fields' defines the intrinsic/extracted/calculated field values
    #  to write to for each TenXObject passed to this output.
    fields:
      - $?outputUnixSocketFields

    # If 'outputUnixSocketWriteTemplates' is true, encode Template values for TenXObjects as JSON objects.
    # To learn more about TenXTemplates, see https://doc.log10x.com/run/template
  - type: event

    # 'name' assigns a logical name to this output instance
    name: $outputUnixSocketAddress

    # 'foreach' sets 'unixSocketOutput' as the options group for whose instances
    #  to create matching output streams to allow multiple Unix domain socket outputs.
    foreach: unixSocketOutput

    # 'path' points to the log4j2 configuration used for this output at:
    #  https://github.com/log-10x/modules/blob/main/pipelines/run/modules/output/event/unix/log4j2.yaml
    path: run/modules/output/event/unix

    # 'group' sets 'outputUnixSocketAddress' as the key for grouping all socket outputs
    #  targeting a socket into a single log4j2 appender. This
    #  prevents a situation where multiple non-synchronized appenders may be trying
    #  to write to the same Unix domain socket.
    group:
      - $outputUnixSocketAddress

    # 'enabled' is false by default. 'outputUnixSocketWriteTemplates' must be set to
    # true for templates to be encoded
    enabled: $?outputUnixSocketWriteTemplates=false

    # 'filter' uses the 'isNewTemplate' 10x JavaScript function to skip templates
    #  loaded via the https://doc.log10x.com/run/template/#templatefiles argument or previously written to this output
    filter: isNewTemplate()

    encodeType: json
    fields:
      - templateHash
      - template
