#
# 🔟❎ 'compile' scan and link unit

unit:
  
  name: link

  title: Symbol library linker

  description: link symbol unit files to an output symbol library file
 
  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: compile/link
  
  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: +include $=TenXEnv.get("docGenerate") ? "compile/units/link/doc.md":""

  # 'allowMultiple' is disabled for this unit. Pipeline command line arguments and configuration files
  #  can specify a single value at max for each option defined below.
  allowMultiple: false
  
  # 'options' defines a group of named/typed configuration values to pass to a unit/module at startup
  #  via command line arguments (e.g., '> tenx -myA X -myB Y') or YAML launch files (e.g., '> tenx @my.config').
  #  Instances of this group passed are accessible at runtime via TenXEnv.get: https://doc.log10x.com/api/js/#TenXEnv.get
  options:
      
    - names:
      - outputSymbolLibraryFile
      description: location of output symbol library file
      type: file
      required: false
      doc: |
        specifies an output symbol library file merging the symbol unit files produced for [inputPaths](https://doc.log10x.com/compile/scan/#inputpaths).
        The symbol library file provides a single artifact to set as the [symbolPaths](https://doc.log10x.com/run/symbol/#symbolpaths) at run time.

    - names:
      - maxSymbolUnitFileSize
      description: max file size for 'outputSymbolLibraryFile' before it is split into chunks
      type: string
      required: false
      doc: |
        sets the maximum file size (e.g., 40MB) for [outputSymbolLibraryFile](https://doc.log10x.com/compile/link/#outputsymbollibraryfile) before splitting 
        into chunks, each weighing no more than this value. This option enables large 
        artifacts to remain [GitHub committable](https://docs.github.com/en/repositories/working-with-files/managing-large-files/about-large-files-on-github).
      defValue: 40MB
      
    - names:
      - symbolTypes 
      description: token types read from input source/binary files written to output
      type: list
      required: false
      doc: | 
        filter symbol values to write to [outputSymbolLibraryFile](https://doc.log10x.com/compile/link/#outputsymbollibraryfile) based on their [context](https://doc.log10x.com/run/transform/symbol/#contexts). 
        This option reduces the size of the output symbol library file by omitting symbol types not required at run time. 
        For possible values, see: [contexts](https://doc.log10x.com/run/transform/symbol/#contexts).
      defValue: [package,class,enum,log,text,exec]


    - names:
      - symbolFileNameFilters 
      description: regex patterns to exclude symbol files from output symbol library
      type: list
      required: false
      doc: | 
        filters symbol files to exclude from [outputSymbolLibraryFile](https://doc.log10x.com/compile/link/#outputsymbollibraryfile) using regex patterns. 
        This option is typically used to exclude test files from the symbol library, reducing output size and focusing on production code symbols.
        
        Common patterns for excluding test files across languages:
        - Java: `^.*(Test|Tests|TestCase)\.java$` (JUnit/TestNG test files)
        - JavaScript/TypeScript: `^.*\.(test|spec)\.(js|jsx|ts|tsx|mjs|cjs)$` (Jest/Mocha/Vitest test files)
        - Python: `^test_.+\.py$` or `^.+_test\.py$` (pytest/unittest test files)
        - Scala: `^.*(Spec|Test)\.scala$` (ScalaTest/Specs2 test files)
        - C#: `^.*(Test|Tests)\.cs$` (xUnit/NUnit/MSTest test files)
        - Go: `^.*_test\.go$` (built-in testing framework test files)
        - C++: `^.*(_test|Test)s?\.(cpp|cc|cxx|hpp|h|hxx)$` (GoogleTest/Catch2/Boost.Test test files)

    - names:
      - symbolFolderFilters
      description: patterns to exclude symbol files by folder from output symbol library
      type: list
      required: false
      doc: |
        filters symbol files to exclude from [outputSymbolLibraryFile](https://doc.log10x.com/compile/link/#outputsymbollibraryfile) based on folder location.
        This option complements [symbolFileNameFilters](https://doc.log10x.com/compile/link/#symbolfilenamefilters) by excluding files based on their containing folder.

        **Plain folder name** (e.g., `test`) - matches when the file's direct parent folder has this name.
        Only alphanumeric characters, underscores, and hyphens are treated as plain names.

        **Regex pattern** (anything else) - matched against the full file path (case-insensitive).
        Use `[/\\]` for cross-platform path separators (Unix `/` and Windows `\`).

        **Examples:**
        - `test` - Files directly inside a `test` folder
        - `__tests__` - Files directly inside `__tests__` (Jest convention)
        - `[/\\]vendor[/\\]` - Files anywhere under a `vendor` folder (Go vendored deps)
        - `[/\\]node_modules[/\\]` - Files anywhere under `node_modules`

      
                   