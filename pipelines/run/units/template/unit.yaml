#
# 🔟❎ 'run' TenXTemplates loader unit

unit:
  
  name: templateLoader

  title: TenXTemplate Loader

  description:  import joint JSON schemas files to expand events into well-defined TenXObjects.

  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: run/template
  
  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: +include $=TenXEnv.get("docGenerate") ? "run/units/template/doc.md":""
  
  # 'allowMultiple' is disabled for this unit. Pipeline command line arguments and configuration files
  #  can specify a single value at max for each option defined below.
  allowMultiple: false
    
  # 'options' defines a group of named/typed configuration values to pass to a pipeline unit/module at startup
  #  via command line arguments (e.g., '> tenx -myA X -myB Y') or YAML launch files (e.g., '> tenx @my.config').
  #  Instances of this group passed to the pipeline are accessible at runtime via the TenXEnv JavaScript class.
  options:

    - names:
      - templateFiles
      description: input files or glob patterns containing JSON-encoded TenXTemplates
      type: list
      required: false
      category: load  
      defValue: [path("data/sample/templates/*.json")]         
      doc:
        input files or glob patterns from which to load JSON-encoded TenXTemplates.
            
    - names:
      - varPlaceholder
      description: placeholder character for notating TenXObject instance variables
      type: string
      required: false
      category: parse     
      defValue: "$" 
      doc: |
        specifies a character to use when encoding an TenXTemplate to signify the location of a 
        runtime variable value.

        For example, for an TenXTemplate containing the following segment: 
        'ERROR: could not connect to host IP: $.$.$.$'

        The '$' entries designate that any TenXObject associated with this template 
        will substitute the '$' slots with matching values from its individual [vars](https://doc.log10x.com/api/js/#TenXBaseObject+vars) array (e.g. 0,0,0,127).

    - names:
      - timestampPrefix
      description: template timestamp prefix
      type: string
      required: false
      category: parse  
      defValue: (    
      doc: |
        specifies a prefix for an TenXTemplate's set of variable and symbol tokens describing
        a timestamp (e.g., ${DD/MM/YY HH-mm-ss}). 

    - names:
      - timestampPostfix
      description: template timestamp postfix
      type: string
      required: false
      category: parse   
      defValue: )   
      doc: |
        specifies a value appended to an TenXTemplate's and set of variable and symbol tokens 
        describing a timestamp (e.g., ${DD/MM/YY HH-mm-ss}). 

    - names:
      - varMaxRecurIndexes
      description: maximum number of template reusable variable value
      type: number
      required: false
      category: parse    
      defValue: 10  
      doc: |
        controls the maximum number of variable values to reuse when
        encoding an TenXObject's [vars](https://doc.log10x.com/api/js/#TenXBaseObject+vars) array to stream. When generating a new 
        TenXTemplate for an TenXObject instance whose variables contain repetitive values, 
        the template may indicate that a value is a repetition of a previous variable value and 
        does not need to be encoded again.

        For example, for an TenXObject whose [text](https://doc.log10x.com/api/js/#TenXBaseObject+text) field contains the following segment:
        `userID=45dfgdfs4,parentID=45dfgdfs4`, the resulting TenXTemplate can be encoded
        as: `userID=$,parentID=$1` specifying that the value of the `parentID` variable
        can be found one slot behind in the TenXObject's [vars array](https://doc.log10x.com/api/js/#TenXBaseObject+vars), saving
        the need to encode this value multiple times.

    - names:
      - templateCacheSize
      description: maximum total byte size of in-memory cached templates
      type: number
      required: false
      category: advanced
      defValue: 20971520
      doc: |
        controls the maximum total byte size of templates held in the in-memory cache.
        When the cache exceeds this limit, least recently used templates are pruned to a
        temporary file on disk. Pruned templates are automatically reloaded from disk when
        accessed again.

        Set to 0 to disable pruning and keep all templates in memory.
