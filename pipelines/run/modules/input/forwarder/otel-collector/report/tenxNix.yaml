# OpenTelemetry Collector 10x 'report' configuration for Linux
#
# This OTel Collector configuration sends log events to Log10x for reporting
# via Unix domain socket using the syslog exporter (RFC5424 format).
# Reporter mode is one-way - events are sent for metric aggregation only.
#
# REQUIREMENTS:
# - OpenTelemetry Collector Contrib v0.143.0+ (for syslog exporter Unix socket support)
#
# Architecture:
#   OTel Collector --[syslog/unix]--> Log10x Reporter --> Metrics
#
# Prerequisites:
# - Log10x must be running with: tenx @run/input/forwarder/otel-collector/report @apps/edge/reporter
# - Log10x will listen on Unix socket: /tmp/tenx-otel-in.sock
#
# Usage:
# - Run Log10x first: tenx @run/input/forwarder/otel-collector/report @apps/edge/reporter
# - Then run: otelcol-contrib --config=tenxNix.yaml

receivers:
  # Primary receivers for incoming logs
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  filelog:
    include:
      - /var/log/**/*.log
    start_at: end

processors:
  # Batch processor for efficiency
  batch:
    timeout: 1s
    send_batch_size: 100
    send_batch_max_size: 1000

  # Memory limiter to prevent OOM
  memory_limiter:
    check_interval: 1s
    limit_mib: 512

exporters:
  # Export logs to Log10x via Unix socket using syslog protocol (RFC5424)
  syslog/tenx:
    endpoint: /tmp/tenx-otel-in.sock
    network: unix
    protocol: rfc5424
    enable_octet_counting: false
    tls:
      insecure: true

  # Debug exporter for troubleshooting
  debug:
    verbosity: basic

service:
  pipelines:
    # Send all logs to Log10x for reporting (one-way, metrics only)
    logs:
      receivers: [otlp, filelog]
      processors: [memory_limiter, batch]
      exporters: [syslog/tenx, debug]

  telemetry:
    logs:
      level: info
      initial_fields:
        service: otelcol-tenx-report

