#
# 'run' AWS S3 Logs input module

module:

  name: s3Logs

  title: AWS S3 Logs input

  description: read log events from a single AWS S3 object

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: +include $=TenXEnv.get("docGenerate") ? "run/modules/input/analyzer/s3Logs/doc.md":""

  # 'configFolder' specifies a folder containing default configuration files for this module
  configFolder: run/input/analyzer/s3Logs

  # 'allowMultiple' is enabled for this module. Pipeline command line arguments and configuration files
  #  can specify multiple groupings of the options defined below.
  allowMultiple: true

  # 'options' defines a group of named/typed configuration values to pass to a unit/module at startup
  #  via command line arguments (e.g., '> tenx -myA X -myB Y') or YAML launch files (e.g., '> tenx @my.config').
  #  Instances of this group passed are accessible at runtime via TenXEnv.get: https://doc.log10x.com/api/js/#TenXEnv.get
  options:

    # ================================ General Options ================================

    - names:
      - s3LogsName
      description: logical name for this AWS S3 input
      type: string
      required: true
      category: general
      doc: |
        sets a logical name (e.g., 'myS3Input') for this input.
        The [inputName](https://doc.log10x.com/api/js/#TenXBaseObject+inputName) field
        returns this value at run time to allow for identifying and operating on instances originating from this input.

    - names:
        - s3LogsEnabled
      description: sets whether this input is enabled
      type: boolean
      required: false
      category: general
      doc: |
        sets whether to open the input stream.
        To enable this input only when an 's3LogsBucket' startup argument value is truthy, use:
        ``` yaml
        s3LogsEnabled: $=TenXEnv.get("s3LogsBucket")
        ```
        To learn more see [TenXEnv.get](https://doc.log10x.com/api/js/#TenXEnv.get).

    - names:
      - s3LogsPrintProgress
      description: sets whether this input prints throughput stats to the console
      type: boolean
      required: false
      category: general
      doc: |
        sets whether this input prints throughput stats to the console
        for testing an integration to a remote endpoint.
      defValue: false

    # ================================ Authentication Options ================================

    - names:
        - s3LogsAwsRegion
      description: AWS region
      type: string
      category: authentication
      required: false
      doc: |
        sets the AWS region (e.g., 'us-east-1') hosting
        the target S3 bucket.

        To learn more see [AWS Regions](https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/using-regions-availability-zones.html)

    - names:
        - s3LogsAwsAccessKeyID
      description: AWS authentication access key ID
      type: string
      required: false
      category: authentication
      doc: |
        sets the AWS access key (e.g., 'AKIAIOSFODNN7EXAMPLE')
        used as part of the request signing process.

        **If not specified**, the system automatically falls back to the
        [AWS default credential provider chain](https://docs.aws.amazon.com/sdk-for-java/latest/developer-guide/credentials-chain.html),
        which checks (in order):

        1. Environment variables (`AWS_ACCESS_KEY_ID`, `AWS_SECRET_ACCESS_KEY`)
        2. Java system properties
        3. Web identity token (for EKS)
        4. Shared credentials file (`~/.aws/credentials`)
        5. ECS container credentials
        6. EC2 instance profile credentials

        To learn more see [AWS access keys](https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html)

    - names:
      - s3LogsAwsSecretKey
      description:  AWS authentication secret key
      type: string
      required: false
      category: authentication
      doc: |
        sets the AWS access secret key
        (e.g. 'wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY') used as part of the request signing process.

        **If not specified**, the system automatically falls back to the
        [AWS default credential provider chain](https://docs.aws.amazon.com/sdk-for-java/latest/developer-guide/credentials-chain.html).
        This allows using credentials from `~/.aws/credentials`, IAM roles, or environment variables
        without explicit configuration.

        To learn more see [AWS security credentials](https://docs.aws.amazon.com/general/latest/gr/aws-sec-cred-types.html)

    # ================================ S3 Object Options ================================

    - names:
        - s3LogsBucket
      description: AWS S3 bucket name
      type: string
      required: true
      category: object
      doc: |
        sets the S3 bucket name (e.g., 'my-log-bucket') containing the object to read.

        To learn more see [S3 Bucket Naming](https://docs.aws.amazon.com/AmazonS3/latest/userguide/bucketnamingrules.html)

    - names:
        - s3LogsKey
      description: S3 object key to fetch
      type: string
      required: true
      category: object
      doc: |
        sets the S3 object key (e.g., 'logs/2024/01/15/app.log') to fetch.

        This input reads a single S3 object and transforms its line-delimited
        content into TenXObjects for analysis.

        For example:
        ``` yaml
        s3Logs:
          - name: MyLogs
            bucket: my-bucket
            key: logs/application.log
        ```

    # ================================ Backpressure Options ================================

    - names:
      - s3LogsTotalBytesLimit
      description: maximum total bytes to read from input before closing
      type: string
      required: false
      category: backpressure
      doc: |
        sets the maximum number of bytes a target pipeline input will read into the pipeline.
        This value limits the volume of events to read from the S3 object.

        For example:
        ``` yaml
        s3LogsTotalBytesLimit: $=parseBytes("1GB")
        ```
      defValue: $=parseBytes("50MB")

    - names:
      - s3LogsTotalEventsLimit
      description: maximum total events to read from input before closing
      type: string
      required: false
      category: backpressure
      doc: |
        sets the maximum number of events a target pipeline input will read into the pipeline.
        This value limits the volume of events to read from the S3 object.
      defValue: 10000

    - names:
      - s3LogsTotalDuration
      description: maximum duration to keep input open before closing
      type: string
      required: false
      category: backpressure
      doc: |
        sets the maximum duration a target pipeline input will remain open.
        When reached, the input will close and no more data will be read.

        For example:
        ``` yaml
        s3LogsTotalDuration: $=parseDuration("10min")
        ```
      defValue: parseDuration("5min")

