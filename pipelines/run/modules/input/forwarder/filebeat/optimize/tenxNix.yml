#
# 🔟❎ Filebeat 'optimize' configuration

# This Filebeat configuration reads filtered 10x Objects
# back from the 10x process. It should be included in the
# filebeat master 'filebeat.yml' config using a 'filebeat.config.inputs' stanza

# To learn more see https://www.elastic.co/guide/en/beats/filebeat/current/filebeat-configuration-reloading.html#load-input-config

# Events encoded by the 10x process are returned via a UNIX in-mem socket
- type: unix
  max_message_size: 10MiB

  # The location of the UNIX client socket is read from 'path' below
  # by the 10x process to connect to the correct socket address

  path: /tmp/tenx_filebeat.sock

  # Decode JSON event back to Filebeat records
  processors:
  - decode_json_fields:
      fields: ["message"]
      process_array: false
      max_depth: 1
      target: ""
      overwrite_keys: true
      add_error_key: true

      # For 10x templates, we need the document ID in ES to match the template hash.
      # This also removes the 'templateHashDocId' from the actual document.
      # See: https://www.elastic.co/guide/en/beats/filebeat/current/decode-json-fields.html
      document_id: "templateHashDocId"
  - drop_fields:
      fields: ["tenx"]
