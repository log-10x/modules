#
# 🔟❎ 'run' Fluentd 'forward' output module

module:

  name: forwardOutput

  title: Fluentd Forward output

  description: write TenXObject and template values to a log4j2 'forward' appender

  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: run/output/event/forward

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: '+include $=TenXEnv.get("docGenerate") ? "run/modules/output/event/forward/doc.md":""'

  # 'allowMultiple' is enabled for this module. Pipeline command line arguments and configuration files
  #  can specify multiple groupings of the options defined below.
  allowMultiple: true

  # 'options' defines a group of named/typed configuration values to pass to a unit/module at startup
  #  via command line arguments (e.g., '> tenx -myA X -myB Y') or YAML launch files (e.g., '> tenx @my.config').
  #  Instances of this group passed are accessible at runtime via TenXEnv.get: https://doc.log10x.com/api/js/#TenXEnv.get
  options:

    - names:
        - outputForwardAddress
      description: location of target Unix domain socket for encoded object field values
      type: file
      category: host
      required: false
      doc: |
        specifies a Unix domain socket address to write [TenXObject](https://doc.log10x.com/api/js/#TenXObject) instance and template field values.
        if specified, [outputForwardHostAddress](https://doc.log10x.com/run/output/event/forward/#outputforwardhostaddress) and [outputForwardHostPort](https://doc.log10x.com/run/output/event/forward/#outputforwardhostport) are ignored

    - names:
        - outputForwardHostAddress
      description: host address of target fluent instance
      type: string
      category: host
      required: false
      doc: |
        specifies a host address used together with [outputForwardHostPort](https://doc.log10x.com/run/output/event/forward/#outputforwardhostport) are ignored to encode object field values to.
        Ignored if [outputForwardAddress](https://doc.log10x.com/run/output/event/forward/#outputforwardaddress) is specified
      defValue: "127.0.0.1"

    - names:
        - outputForwardHostPort
      description: host port of target fluent instance
      type: number
      category: host
      required: false
      doc: |
        specifies a host por used together with [outputForwardHostAddress](https://doc.log10x.com/run/output/event/forward/#outputforwardhostaddress) are ignored to encode object field values to.
        Ignored if [outputForwardAddress](https://doc.log10x.com/run/output/event/forward/#outputforwardaddress) is specified
      defValue: 24224

    - names:
        - outputForwardFields
      description: list of TenXObject field names to encode
      type: list
      category: encoding
      required: false
      doc: |
        specifies a list of TenXObject intrinsic/calculated/extracted field names to extract and write to the output.

    - names:
        - outputForwardWriteObjects
      description: if true, encode TenXObjects [outputForwardFields](https://doc.log10x.com/run/output/event/forward/#outputforwardfields) to this output
      type: string
      category: encoding
      required: false
      doc: |
        Determine whether to write [outputForwardFields](https://doc.log10x.com/run/output/event/forward/#outputforwardfields) values of an TenXObject passed to this output.
        This configuration is typically defined using a JavaScript expression.
        
        To enable/disable the output depending on whether a launch argument, environment variable,
        or JVM -D option evaluates as truthy, use:
        ``` yaml
          outputFileWriteObjects: $=TenXEnv.get("myForwardAddress")
        ```
        To learn more see [TenXEnv.get](https://doc.log10x.com/api/js/#TenXEnv.get).

      defValue: true

    - names:
        - outputForwardWriteTemplates
      description: if true, write new TenXTemplates to this output
      type: string
      category: encoding
      required: false
      doc: |
        controls whether to write template values of TenXObjects passed to this output.
        The output will only emit TenXTemplates that the pipeline did not load at startup via the [templateFile](https://doc.log10x.com/run/template/#templatefiles) argument,
        and will only emit an TenXTemplate once based on its [templateHash](https://doc.log10x.com/api/js/#TenXBaseObject+templateHash) value.
      defValue: false

    - names:
        - outputForwardTagField
      description: field name to extract from an TenXObjects as its Fluentd 'tag' value
      type: string
      category: encoding
      required: false
      doc: |
        specifies an intrinsic/extracted/calculated TenXObject field name
        to use as the TenXObject's forward `tag` value.
        To learn more see [Fluentd tagging](https://docs.fluentd.org/quickstart/life-of-a-fluentd-event#event-structure)
      defValue: the TenXObject's 'source' intrinsic field value, if present

    - names:
        - outputForwardTagValue
      description: default tag value for TenXObjects
      type: string
      category: encoding
      required: false
      doc: |
        specifies an default value for TenXObject forward `tag` value, if the internal 'tag'
        and [outputForwardTagField](https://doc.log10x.com/run/output/event/forward/#outputforwardtagfield) returned empty

    - names:
        - outputForwardFilter
      description: a JavaScript expression an TenXObject must evaluate as 'truthy' against to be written to this output
      type: string
      category: encoding
      required: false
      doc: |
        Specifies a JavaScript expression that an TenXObject must evaluate as truthy to write its
        instance/template field values to this output.
        For example, `outputForwardFilter: this.timestamp` will only emit [timestamped](https://doc.log10x.com/api/js/#TenXBaseObject+timestamped) TenXObjects.

    - names:
        - outputForwardEncodeType
      description: the output format in which to encode TenXObject values. Possible values:[json, delimited]
      type: string
      defValue: delimited
      category: encoding
      required: false
      doc: |
        specifies how [outputForwardFields](https://doc.log10x.com/run/output/event/forward/#outputforwardfields) are encoded to a stream/event to this output. Possible values:
        - **json**: formats names and values for the current TenXObject as: {"field":"str","field2":1, "field3": true}
        - **delimited**: formats values for the current TenXObject as: "str",1,true
           The [outputForwardEncodeDelimiter](https://doc.log10x.com/run/output/event/forward/#outputforwardencodedelimiter) argument determines the separator to use.

    - names:
        - outputForwardEncodeDelimiter
      description: the delimiter placed between key and values pairs if 'outputForwardEncodeType' is 'delimited'
      type: string
      required: false
      category: encoding
      doc: |
        sets the delimiter to separate TenXObject field values when [outputForwardEncodeType](https://doc.log10x.com/run/output/event/forward/#outputforwardencodetype) is `delimited`.
      defValue: ' '
