# 10x 'report' Fluent Bit Lua script configuration

# This file is designed to be included in your Fluent Bit '.conf' file
# using the @INCLUDE <path-to-tenx.conf> macro

# script path
# -----------
# modifiy 'tenx_lua' to set the location of tenx.lua script loaded by Fluent Bit
# to launch and transmit events into an 10x subprocess
#
@SET tenx_lua=pipelines/run/modules/input/forwarder/fluentbit/conf/lua/tenx-report.lua

[FILTER]
    Name Lua
    Match *
    script ${TENX_MODULES}/${tenx_lua}
    call tenx_process
