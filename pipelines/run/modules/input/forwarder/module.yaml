#
# 🔟❎ 'run' forwarder input modules

module:

  name: forwarderInputs

  title: Log Forwarder inputs

  description: report, regulate and optimize events collected by log forwarders

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: +include $=TenXEnv.get("docGenerate") ? "run/modules/input/forwarder/doc.md":""

  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: run/input/forwarder

  moduleSort: [fluentbit,fluentd,otelCollector,filebeat,logstash,splunkUF,datadogAgent]

  # Shared options applicable across all forwarder flavors (fluentbit, fluentd,
  # logstash, filebeat, otel-collector, …). Each flavor's stream.yaml reads the
  # flat name via TenXEnv.get; user YAML sets it at top level.
  options:

    - names:
      - encodeObjects
      description: controls whether events written to the forwarder are encoded or written in raw form
      type: string
      required: false
      defValue: false
      doc: |
        sets the format in which to serialize TenXObjects back to the log forwarder.
        If true, write events using the [encode](https://doc.log10x.com/api/js/#TenXObject+encode) function.
        If false, write events in their original form as read from the forwarder using the
        [fullText](https://doc.log10x.com/api/js/#TenXBaseObject+fullText) field.

        Defaults to the value of `regulatorOptimize` when used with the Regulator app.