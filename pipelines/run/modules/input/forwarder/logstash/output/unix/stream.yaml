# ЁЯФЯтЭО 'run' Logstash Unix output stream configuration

# Writes events to a Logstash forwarder via a Unix domain socket.
#
# Mode is selected by `outputEncodeField` and `outputWriteTemplates` тАФ see
# run/modules/input/forwarder/module.yaml for the shared-option model.

# Set the 10x pipeline to 'run'
tenx: run

# =============================== Dependencies ================================

include:
  - source: match
    options:

      # Capture outputUnixSocketAddress from 'tenx-pipe-in-unix.conf' as 10x env variable.
      # The optimize/regulate selection here is for the Logstash-side config, not an
      # engine writeObjects gate тАФ so key it off outputWriteTemplates.
      path: '$="run/input/forwarder/logstash/" + (TenXEnv.get("outputWriteTemplates") ? "optimize" : "regulate") + "/tenx-pipe-in-unix.conf"'
      regex: "path\\s=>\\s*\"\\$\\{tenx_marker_pipeline_unix_address:\\s*(?<rawOutputUnixSocketAddress>.*?)\\s*\\}\""

  # load the unix domain socket module
  - run/modules/output/event/unix

# ============================= Output Options ================================

outputUnixSocket:

  - address: $=rawOutputUnixSocketAddress

    fields:
      - $?outputEncodeField=fullText
      - $?logstashOutputFields

    encodeType: $?logstashOutputEncodeType
    encodeDelimiter: ","

    writeTemplates: $?outputWriteTemplates=false
