# Fluentd 'optimize' configuration over Unix domain socket
#
# This configuration utilizes the Fluentd 'exec-filter' plugin to launch
# and write events into a 10x sub-process for filtering and optimization. 
# Fluentd reads processed events from the 10x process via a Unix domain socket.
#
# To use, include this file in your Fluentd config via an '@include' directive
# and add '@label @TENX' to target input(s) to connect to the 10x process.
#
# Events read back from the 10x pipeline are returned to their proper place in
# of the main Fluentd conf because the 'forward' protocol used by the Unix input
# plugin retains the event's original tag.
#
# Events generated by the 10x sub-process not originally read from
# a Fluentd input (such as tenxTemplates with tag 'tenx-template') can be
# written to the Elastic/Splunk configs defined in: 'run/modules/forwarder/fluentd/output'
# or routed to Fluentd output via a <match tenx-template> stanza.
#
# To learn more about TenXTemplates, see: '/run/units/structure/template/settings.yaml'

# This both loads up the Unix based 'exec_filter' config and sets the TENX_RUN_ARGS variable
# to the 'optimize' configuration
#
@include "#{(ENV['TENX_RUN_ARGS']='@run/input/forwarder/fluentd/optimize/config.yaml @apps/edge/optimizer') && 'auxiliary/tenx-unix-exec-filter.conf'}"

# Setup the return source for the optimized events coming back from the 10x pipeline
#
@include auxiliary/tenx-unix-source.conf

<label @TENX-PHASE-2>
	# Add handling for template events coming from the 10x pipeline
	#
	@include auxiliary/tenx-process-templates.conf

	# Return optimized events to the main Fluentd pipeline
	#
	@include auxiliary/tenx-return-events-to-main.conf
</label>
