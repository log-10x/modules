#
# 🔟❎ 'run' modules

module:

  name: runModules

  title: "'run' modules"

  description: read, regulate and output TenXObjects using customizable modules

  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: run/
  
  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: +include $=TenXEnv.get("docGenerate") ? "run/modules/doc.md":""
