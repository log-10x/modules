#
# 🔟❎ 'compile' scan and link unit

unit:
  
  name: scan

  title: Input Scanner

  description: capture symbol values from source code/binary files and link to an output symbol library
 
  # 'configFolders' specifies folders containing default configuration files for this module
  configFolders:
    scan: compile/scanners
    advanced: compile/scanners/advanced
 
  moduleSort: [antlr,javaParser,pythonAST,bytecode,scalameta,executable,text,patterns,archive,symbol,logMethods]

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: +include $=TenXEnv.get("docGenerate") ? "compile/units/scan/doc.md":""

  # 'allowMultiple' is disabled for this unit. Pipeline command line arguments and configuration files
  #  can specify a single value at max for each option defined below.
  allowMultiple: false
  
  # 'options' defines a group of named/typed configuration values to pass to a unit/module at startup
  #  via command line arguments (e.g., '> tenx -myA X -myB Y') or YAML launch files (e.g., '> tenx @my.config').
  #  Instances of this group passed are accessible at runtime via TenXEnv.get: https://doc.log10x.com/api/js/#TenXEnv.get
  options:

    - names:
      - inputPaths
      description: input folders to scan
      type: list
      required: true
      category: input            
      doc: |
        provides a list of folders that are traversed in search of source code (e.g. .js, .cpp), 
        binary (e.g., .so, .jar, .zip) and text (e.g., .json, .xml) files to capture symbol values from and
        output to symbol unit files. Input folders may contain files and folders pulled from [GitHub](https://doc.log10x.com/compile/pull/github/) or 
        and [Artifactory](https://doc.log10x.com/compile/artifactory).
 
    - names:
      - outputSymbolFolder
      description: location of output symbol folder
      type: file
      required: false
      category: output                  
      doc: |
        specifies the root folder in which to write output symbol unit files.
        This compiler [scan phase](https://doc.log10x.com/compile/scan/) mirrors the structure of the [inputPaths](https://doc.log10x.com/compile/scan/#inputpaths) argument, placing each
        output symbol unit in the same relative path under [outputSymbolFolder](https://doc.log10x.com/compile/scan/#outputsymbolfolder)
        as its source/binary input file under its respective `inputPaths` folder entry.

        For example, if [inputPaths](https://doc.log10x.com/compile/scan/#inputpaths) is `~/dev` and it contains the file `~/dev/app/foo.js`,
        and this value is `~/symbols`, the respective output symbol unit file is: `~/symbols/app/foo.js.10x.json`.

    - names:
      - scanForce
      description: control whether to scan input files even if a matching existing symbol file exists
      type: boolean
      required: false
      category: output            
      doc: |
        controls whether to reuse matching symbol files within [inputPaths](https://doc.log10x.com/compile/scan/#inputpaths).
        This option is primarily useful when debugging a new scanner module configuration (e.g., ANTLR grammar) 
        in conjunction with the [scanner debugging](https://doc.log10x.com/compile/scan) options.
      defValue: false  

    - names:
      - scanInProcess
      description: controls whether to scan source/binary input files using sub-process(es)
      type: boolean
      required: false
      category: subprocess
      doc: |
        The scanner can launch [subprocesses](https://doc.log10x.com/compile/scan/#subprocess_1) to capture [symbol](https://doc.log10x.com/run/transform/structure/#symbols)
        information from specific target source/binary input files. 

        Generating input file [ASTs](https://en.wikipedia.org/wiki/Abstract_syntax_tree) to scan for symbols values for complex syntaxes can be a lengthy, resource-consuming operation, which in the case of 
        [ANTLR syntaxes](https://tomassetti.me/improving-the-performance-of-an-antlr-parser/) may timeout or run out of memory.   

        Process [isolation](https://en.wikipedia.org/wiki/Process_isolation) allows for terminating scan operations that timeout for specific files, while allowing others to proceed. 
      defValue: false

    - names:
      - printOutput
      description: controls whether to emit output scan operations progress to the console
      type: boolean
      category: subprocess
      required: false
      doc: |
        controls whether information relating to symbol units scanning 
        is emitted to the stdout stream. This value should be set to true when the current 10x process is 
        spawned by a parent 10x 'compile' pipeline to report its progress.
      defValue: false
           
    - names:
      - unitsToScanPerBatch
      description:  maximum number of input files to scan per sub-process.
      type: number
      required: false 
      category: subprocess
      doc: | 
        sets the maximum number of source/binary input files to scan by a single 'compile' sub-process.  
        Set to 0 to unlimited.
      defValue: 40
      
      
    - names:
      - scanThreadPoolSize
      description: maximum number of threads to use concurrently process input source code /binary files
      type: string
      required: false
      category: parallel      
      doc: |
        controls the maximum number of threads to process input source code/binary files concurrently:
        
          - If the value is between 0 and 1, the number calculates a percentage of available cores (e.g., 0.5 = use up to 50% of available cores).
          - If the value is >= 1, the value sets a fixed number of threads (e.g., 10 = 10 threads).
          - If the value is 1, allocate a single thread to process input files.
      defValue: 0.5

    - names:
      - scanUnitTimeout
      description: timeout interval for scanning a source code /binary input file 
      type: string
      required: false
      category: parallel      
      doc: |
        sets the timeout interval when scanning a source code /binary input file before dropping it. 
        Set to null to ignore.
      defValue: 20s

    - names:
      - scanOperationTimeout
      description: timeout interval for the entire scanning operation
      type: string
      required: false
      category: parallel      
      doc: |
        sets the timeout interval for the entire scanning operation before terminating it.     
        Set to null to ignore.
      defValue: 10m

    - names:
      - maxSymbolUnitSectionSize
      description: maximum number of symbol tokens to store in a single symbol unit file
      type: number
      required: false
      category: output      
      doc: |
        controls the maximum number of symbol tokens to store in a symbol unit before splitting it. 
        This option supports large source code /binary input files that may have thousands of text symbols to avoid 
        creating sizeable individual symbol unit files.        
        Set to null to ignore.
      defValue: 500
  
    - names:
      - tokenDelims
      description: token delimiters
      type: string
      required: false
      category: tokenize
      doc: |
        defines which characters break a string of event characters into tokens to classify as symbols or variables.
      defValue: <>|. ][:-+/*=\\,{}_();'\"$\t\n@
      
    - names:
       - fileExtStringFormats
      description: string format specifier characters
      type: list
      required: false
      category: tokenize
      doc: |
        controls which characters identify the start of a [format specifier](https://en.wikipedia.org/wiki/Printf#Format_specifier) 
        for each programming language extension in the form of <ext>:<formatPrefix> (e.g., `.java:%`).
        
        It is a standard programming practice to use string formats to log messages in the form of:
        
        ``` java
        log.error("could not connect to {} with status {}", host, status);
        ```

        When an TenXTemplate tokenizer processing an event identifies a format prefix (e.g., `%`)
        it skips it and appends subsequent symbol tokens (e.g., `with status`)
        to the symbol sequence preceding them (e.g., `could not connect to`).

    - names:
      - maxSymbolUnitsPerToken
      description: number of symbol units to retrieve when searching for the origin of an TenXTemplate symbol sequence
      type: number
      required: false
      category: tokenize
      defValue: 128
      doc: |
        controls the maximum number of symbol units to load from the pipeline's symbol library 
        when searching for the origin of a specific [TenXTemplate](https://doc.log10x.com/run/template/) symbol. 
        
        The [symbolSequence](https://doc.log10x.com/api/js/#TenXObject+symbolSequence) function queries the source code/binary origin
        of symbol sequences in a target TenXTemplate to identify the logical [message](https://doc.log10x.com/run/initialize/message/) portion of a target app/infra
        events vs. variable and context information (e.g., user, host, severity). 
        
        Since a [symbol](https://doc.log10x.com/run/transform/structure/#symbols) value may appear in hundreds or more locations across a code base, 
        limiting the number of symbol units to load is necessary to reduce memory consumption. 
    
        A second consideration is placing an upper limit on the number of units to load from the symbol library, 
        which is the more frequent a symbol is, the lower the probability of selecting the correct origin.
        
    - names:
      - scanDebugOrigins
      description: list of input file names for which to log information 
      type: list
      required: false
      category: debug
      doc: |
        specifies a list of input file names (e.g., my.scala, foo.java) to log information relating to which symbols were captured/skipped. 
        
        Specify '*' for all files.
      
    - names:
       - scanDebugSymbols
      description: list of node types within a scanner AST tree for which to log information
      type: list
      required: false
      category: debug
      doc: |
        list of nodes within an input AST tree, such as class and method names(e.g., 'MyClass', 'foo') 
        for which to log information relating to the context in which they were captured/skipped as symbols.
        
        Specify '*' for all nodes.     

    - names:
       - scanDebugLoggerName
      description: debug logger name
      type: string
      required: false
      category: debug
      doc: |
        specifies the log4j logger for logging values for symbols/files matching 'debugOrigins' and 'debugSymbols'. 
      defValue: "[consoleOut](https://github.com/log-10x/config/blob/main/log4j2.yaml#L66)"
    
