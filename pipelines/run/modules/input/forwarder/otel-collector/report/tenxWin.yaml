# OpenTelemetry Collector 10x 'report' configuration for Windows
#
# This OTel Collector configuration sends log and trace events to a 
# separately running Log10x reporter instance for metric aggregation.
#
# Prerequisites:
# - Log10x must be running with: tenx @run/input/forwarder/otel-collector/report @apps/edge/reporter
# - Log10x will listen on TCP port 4318 for incoming JSON events
#
# Usage:
# - Include this file in your OTel Collector config via a merge or reference
# - Or run: otelcol.exe --config=tenx-report-windows.yaml

receivers:
  # Your existing receivers (e.g., OTLP, windowseventlog, etc.)
  # Example:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  
  windowseventlog:
    channel: Application
    start_at: beginning
  
  windowseventlog/system:
    channel: System
    start_at: beginning

processors:
  # Batch processor for efficiency
  batch:
    timeout: 1s
    send_batch_size: 100
    send_batch_max_size: 1000

  # Memory limiter to prevent OOM
  memory_limiter:
    check_interval: 1s
    limit_mib: 512

  # Resource processor to add metadata
  resource:
    attributes:
      - key: service.name
        value: ${SERVICE_NAME:unknown}
        action: upsert
      - key: deployment.environment
        value: ${ENVIRONMENT:production}
        action: upsert
      - key: os.type
        value: windows
        action: upsert

exporters:
  # Export JSON logs to Log10x TCP input
  otlphttp/tenx:
    endpoint: http://localhost:4318
    compression: none
    encoding: json
    timeout: 10s
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 300s

  # Debug exporter for troubleshooting (optional)
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

service:
  pipelines:
    # Logs pipeline - send to Log10x for reporting
    logs:
      receivers: [otlp, windowseventlog, windowseventlog/system]
      processors: [memory_limiter, batch, resource]
      exporters: [otlphttp/tenx]
    
    # Traces pipeline - send to Log10x for reporting
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlphttp/tenx]

  telemetry:
    logs:
      level: info
      initial_fields:
        service: otelcol-tenx-report

