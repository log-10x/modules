#
# 🔟❎ 'run' OutputStream options

module:

  name: outputStream

  title: Java OutputStream output

  description: write TenXObject and template values to a Java OutputStream/Writer instance

  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: run/output/event/outputStream

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: +include $=TenXEnv.get("docGenerate") ? "run/modules/output/event/outputStream/doc.md":""

  # 'allowMultiple' is enabled for this module. Pipeline command line arguments and configuration files
  #  can specify multiple groupings of the options defined below.
  allowMultiple: true

  # 'options' defines a group of named/typed configuration values to pass to a unit/module at startup
  #  via command line arguments (e.g., '> tenx -myA X -myB Y') or YAML launch files (e.g., '> tenx @my.config').
  #  Instances of this group passed are accessible at runtime via TenXEnv.get: https://doc.log10x.com/api/js/#TenXEnv.get
  options:

    - names:
        - outputStreamClass
      description: fully2 qualified java.io.OutputStream/Writer sub-class name
      type: string
      category: general
      required: true
      doc: |
        specifies a fully qualified [OutputStream](https://docs.oracle.com/javase/8/docs/api/java/io/OutputStream.html) or [Writer](https://docs.oracle.com/javase/8/docs/api/java/io/Writer.html)
        sub-class to instantiate. The specified [outputStreamFields](https://doc.log10x.com/run/output/event/outputStream/#outputstreamfields) of each encoded TenXObjects will be written
        to the stream with a matching call to its [flush](https://docs.oracle.com/javase/8/docs/api/java/io/Flushable.html#flush--) method
        after each instance.

        The class must implement a parameterless constructor or one with the following signature:	

        ``` java
        /**
        * @param args
        *   The values of the 'outputStream' option group specified
        * 	for this OutputStream/Writer instance provided as a map(<argName>=<argValue>...).
        *   This allows the stream to read configuration values provided via config files/command line arguments.
        *
        * @param evaluatorBean
        *   An evaluator bean to enable this stream to interact with the 10x Engine
        */
        public MyOutputStream(Map<String, Object> args, com.log10x.api.bean.EvaluatorBean evaluatorBean){...}
        ```

    - names:
        - outputStreamArgs
      description: arguments to pass to the constructor of 'outputStreamClass'
      type: list
      category: general
      required: false
      doc: |
        value pairs to insert to the OutputStream/Writer constructor 'args' Map.
        This argument adds configuration values to the map passed to Stream/Writer ctor
        in addition to those specified by its matching 'outputStream' option group instance.

        This argument allows for providing stream-specific context and default values such as a host address, port, etc.

    - names:
        - outputStreamFields
      description: list of TenXObject field names to encode
      type: list
      category: encode
      required: false
      doc: |
        specifies a list of TenXObject intrinsic/calculated/extracted field names to extract and write to the output.

    - names:
        - outputStreamGroupKeys
      description: values to assign an 'outputStream' to a target output instance
      type: list
      category: advanced
      required: false
      doc: |
        specifies a list of values by which instances of the 'outputStream' option group
        are assigned to specific instances of 'outputStreamClass' to enable
        multiple outputs to use a single synchronized OutputStream instance.

    - names:
        - outputStreamFilter
      description: a JavaScript expression an TenXObject must evaluate as 'truthy' against to be written to this output
      type: string
      category: general
      required: false
      doc: |
        Specifies a JavaScript expression that an TenXObject must evaluate as truthy to write its
        instance/template field values to this output.

        For example, to only emit [timestamped](https://doc.log10x.com/api/js/#TenXBaseObject+timestamped) TenXObjects, specify:
        ``` yaml
        outputStreamFilter: this.timestamped
        ```
    - names:
        - outputStreamWriteObjects
      description: if true, TenXObject field values specified by [outputStreamFields](https://doc.log10x.com/run/output/event/outputstream/#outputstreamfields) are encoded to this output
      type: string
      category: encode
      required: false
      doc: |
        Determine whether to write [outputStreamFields](https://doc.log10x.com/run/output/event/outputstream/#outputstreamfields) values of an TenXObject passed to this output.
        This configuration is typically defined using a JavaScript expression.

        To enable/disable the output depending on whether a launch argument, environment variable,
        or JVM -D option evaluates as truthy, use:
        ``` yaml
          outputStreamWriteObjects: $=TenXEnv.get("myOutputStreamClass")
        ```
        To learn more see [TenXEnv.get](https://doc.log10x.com/api/js/#TenXEnv.get).

      defValue: true

    - names:
        - outputStreamWriteTemplates
      description: if true, write new TenXTemplates to this output
      type: string
      category: encode
      required: false
      doc: |
        controls whether to write template values of TenXObjects passed to this output.
        The output will only emit TenXTemplates that the pipeline did not load at startup via the [templateFile](https://doc.log10x.com/run/template/#templatefiles) argument,
        and will only emit an TenXTemplate once based on its [templateHash](https://doc.log10x.com/api/js/#TenXBaseObject+templateHash) value.
      defValue: false

    - names:
        - outputStreamEncodeType
      description: the output format in which to encode TenXObject values. Possible values:[json, delimited]
      type: string
      defValue: delimited
      category: encode
      required: false
      doc: |
        specifies how to encode [outputStreamFields](https://doc.log10x.com/run/output/event/outputStream/#outputstreamfields) values to this output. Possible values:
        - **json**: formats names and values for the current TenXObject as: {"field":"str","field2":1, "field3": true}
        - **delimited**: formats values for the current TenXObject as: "str",1,true
           The [outputStreamEncodeDelimiter](https://doc.log10x.com/run/output/event/outputStream/#outputstreamencodedelimiter) argument determines the separator to use.

    - names:
        - outputStreamEncodedLinePrefix
      description: the line prefix prepended to the encoded event if 'outputStreamEncodeType' is 'delimited'
      type: string
      category: encode
      required: false
      doc: |
        sets the char which is prepended to the emitted TenXObject field values when [outputStreamEncodeType](https://doc.log10x.com/run/output/event/outputStream/#outputstreamencodetype) is `delimited`.
      defValue: ''

    - names:
        - outputStreamEncodeDelimiter
      description: the delimiter placed between key and values pairs if 'outputStreamEncodeType' is 'delimited'
      type: string
      category: encode
      required: false
      doc: |
        sets the char delimiter to separate TenXObject field values when [outputStreamEncodeType](https://doc.log10x.com/run/output/event/outputStream/#outputstreamencodetype) is `delimited`.
      defValue: '" "'
