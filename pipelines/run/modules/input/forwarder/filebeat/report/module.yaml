#
# 🔟❎ 'run' Filebeat Report module

module:

  name: filebeatReport

  title: Filebeat reporter

  description: read events from Filebeat forwarders

  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: run/input/forwarder/filebeat/report

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: '+include $=TenXEnv.get("docGenerate") ? "run/modules/input/forwarder/filebeat/report/doc.md":""'