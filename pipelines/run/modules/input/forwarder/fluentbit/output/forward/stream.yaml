# 🔟❎ 'run' Fluent Bit forward output stream configuration (Windows / TCP)

# This configuration defines a Forward protocol output over TCP to write events
# back to a Fluent Bit forwarder process. Used on Windows (no Unix domain sockets).

# To learn more see: https://github.com/fluent/fluent-bit-docs/blob/master/pipeline/outputs/forward.md

# Mode is selected by `outputEncodeField` and `outputWriteTemplates` — see
# run/modules/input/forwarder/module.yaml for the shared-option model.

# Set the 10x pipeline to 'run'
tenx: run

# =============================== Dependencies ================================

include:

  - source: match
    options:

      # Capture rawOutputForwardPort from tenx-forward.conf as a 10x config variable
      path: run/modules/input/forwarder/fluentbit/conf/tenx-forward.conf
      regex: "^\\s*@SET\\s+forwardPort\\s*=\\s*(?<rawOutputForwardPort>.*?)$"

    # load the forward protocol output module
  - run/modules/output/event/forward

# ============================= Output Options ================================

outputForward:

  - hostAddress: 127.0.0.1
    hostPort: $=rawOutputForwardPort

    fields:
      - $?outputEncodeField=fullText
      - $?fluentbitOutputFields

    encodeType: $?fluentbitOutputEncodeType
    encodeDelimiter: ","

    writeTemplates: $?outputWriteTemplates=false
