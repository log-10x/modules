#
#  🔟❎ Logstash Report module

module:

  name: logstashReport

  title: Logstash reporter

  description: read events from Logstash forwarders

  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: run/input/forwarder/logstash/report

  configSort:
    logstashReport: [config, tenx-pipe-out]

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: '+include $=TenXEnv.get("docGenerate") ? "run/modules/input/forwarder/logstash/report/doc.md":""'
