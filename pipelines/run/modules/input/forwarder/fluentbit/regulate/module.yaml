#
# 🔟❎ 'run' Fluent Bit Regulate module

module:

  name: fluentbitRegulate

  title: Fluent Bit regulator

  description: read events from Fluent Bit forwarders to regulate which events to ship
  
  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: run/input/forwarder/fluentbit/regulate

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: '+include $=TenXEnv.get("docGenerate") ? "run/modules/input/forwarder/fluentbit/regulate/doc.md":""'

  allowMultiple: false

  options:

    - names:
      - fluentbitEncodeObjects
      description: controls whether events written to a Fluent Bit forwarder are encoded or written in raw form
      type: string
      required: false
      defValue: false
      doc: |
        sets the format in which to serialize TenXObjects back to the Fluent Bit forwarder.
        If true, write events using the [encode](https://doc.log10x.com/api/js/#TenXObject+encode) function.
        If false, write events in their original form as read from the Fluent Bit forwarder
        using the [fullText](https://doc.log10x.com/api/js/#TenXBaseObject+fullText) field.

        Defaults to the value of `regulatorOptimize` when used with the Edge Regulator app.

    - names:
      - fluentbitOutputFields
      description: list of TenXObject field names to include alongside the main event in output
      type: list
      required: false
      defValue: []
      doc: |
        specifies TenXObject field names to emit alongside the main event text
        when writing back to the Fluent Bit forwarder. When empty (default), only
        the main event field is written. Example fields: level, group, symbolMessage.

    - names:
      - fluentbitOutputEncodeType
      description: "output format when outputFields are set. Possible values: [json, delimited]"
      type: string
      required: false
      defValue: delimited
      doc: |
        specifies how the combined output (main event field plus outputFields)
        is encoded when writing back to the Fluent Bit forwarder. Possible values:
        - **json**: formats all fields as a JSON object
        - **delimited**: formats field values separated by the output delimiter
        Only takes effect when fluentbitOutputFields is set.