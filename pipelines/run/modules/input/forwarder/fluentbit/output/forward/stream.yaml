# 🔟❎ 'run' Fluent Bit forward output stream configuration (Windows)

# This configuration defines a Forward protocol output over TCP to write
# encoded/plain-text events to a Fluent Bit forwarder process.
# This is the Windows equivalent of the Unix domain socket output.

# To learn more see: https://github.com/fluent/fluent-bit-docs/blob/master/pipeline/outputs/forward.md

# Set the 10x pipeline to 'run'
tenx: run

# =============================== Dependencies ================================

include:

  - source: match
    options:

      # Capture rawOutputForwardPort from tenx-forward.conf as a 10x config variable
      path: run/modules/input/forwarder/fluentbit/conf/tenx-forward.conf
      regex: "^\\s*@SET\\s+forwardPort\\s*=\\s*(?<rawOutputForwardPort>.*?)$"

    # load the forward protocol output module
  - run/modules/output/event/forward

# ============================= Output Options ================================

# 'outputForward' defines the output(s) used to write back to the Fluent Bit forwarder
outputForward:

    # Write objects in plain-text form using the intrinsic 'fullText' field if 'encodeObjects' has NOT been set.
  - writeObjects: /$=!TenXEnv.get("encodeObjects")

    # Use TCP host/port for Forward protocol (Windows does not support Unix domain sockets)
    hostAddress: 127.0.0.1
    hostPort: $=rawOutputForwardPort

    # 'fields' is set to the 'fullText', which contains the TenXObject's original text
    fields:
      - fullText
      - $?fluentbitOutputFields
    encodeType: $?fluentbitOutputEncodeType
    encodeDelimiter: ","

    # Do not encode templates
    writeTemplates: false

    # Write objects in encoded form using the encode() function if 'encodeObjects' is set.
    # To learn more see https://doc.log10x.com/api/js/#TenXObject+encode
  - writeObjects: /$=TenXEnv.get("encodeObjects")

    # Use TCP host/port for Forward protocol (Windows does not support Unix domain sockets)
    hostAddress: 127.0.0.1
    hostPort: $=rawOutputForwardPort

    # 'fields' is set to the return value of the encode() function
    #  https://doc.log10x.com/api/js/#TenXObject+encode
    fields:
      - 'encoded=shouldEncode() ? encode() : fullText'
      - $?fluentbitOutputFields
    encodeType: $?fluentbitOutputEncodeType
    encodeDelimiter: ","

    # Encode templates in JSON format.
    # To learn more about TenXTemplates, see: https://doc.log10x.com/run/template
    # Only write the templates when also encoding objects.
    writeTemplates: /$=TenXEnv.get("encodeObjects")
