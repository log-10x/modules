# 🔟❎ 'run' Filebeat output module stream

# This Configuration defines the output stream with which to write encoded/filtered
# TenXObjects back to a Filebeat forwarder via a Unix domain socket.

# Set the 10x pipeline to 'run'
tenx: run

# =============================== Dependencies ================================

# Parse config vars from 'tenx.yml':
include:

  # Load the Unix domain socket path 'rawOutputUnixSocketAddress' variable from the 'path' value in 'tenx.yml'.
  # This socket writes JSON-encoded TenXObject values into the Filebeat pipeline
  - source: '$="run/modules/input/forwarder/filebeat/" + (TenXEnv.get("filebeatEncodeObjects") ? "optimize" : "regulate") + (TenXString.includes(TenXEnv.get("os.name"), "Windows") ? "/tenxWin.yml" : "/tenxNix.yml")'
    options:
      path: rawOutputUnixSocketAddress

  # Load the Unix domain socket appender configuration
  - run/modules/output/event/unix

# ============================= Output Options ================================

# Customize how events are written back to Filebeat via a Unix domain socket
outputUnixSocket:

  # Regulate-only mode (filebeatEncodeObjects=false): every event goes out as fullText.
  # Compact decisions are a no-op here because Filebeat isn't wired to decode compact form.
  - writeObjects: /$=!TenXEnv.get("filebeatEncodeObjects")

    filter: extractorKey == "message"

    # Sets Unix domain socket address from the value read from tenxNix.yml/tenxWin.yml (see above)
    address: $=rawOutputUnixSocketAddress

    fields:
      - fullText
      - $?filebeatOutputFields
    encodeType: $?filebeatOutputEncodeType
    encodeDelimiter: ","
    encodeGroupDelimiter: "\\n"

  # Compact-capable mode (filebeatEncodeObjects=true): per-event decision via the
  # compactRegulator predicate. `shouldEncode()` returns the lookup-backed bool
  # (see run/modules/regulate/compact), falling back to `compactRegulatorDefault`
  # when no entry applies. One stream, ternary output field.
  - writeObjects: /$=TenXEnv.get("filebeatEncodeObjects")

    filter: extractorKey == "message"

    address: $=rawOutputUnixSocketAddress

    # Per-event: call encode() if shouldEncode() says yes, otherwise emit fullText.
    # When no compact module is loaded, shouldEncode() isn't defined — in that case
    # the deployer should either omit the compact module (keeping regulate-only mode
    # above by setting filebeatEncodeObjects=false) or default the predicate to true
    # via `compactRegulatorDefault: true` so every event is encoded.
    fields:
      - 'output=shouldEncode() ? encode() : fullText'
      - $?filebeatOutputFields
    encodeType: $?filebeatOutputEncodeType
    encodeDelimiter: ","
    encodeGroupDelimiter: "\\n"

  # New-template emission: fires only when an event is actually being compacted
  # (so the downstream has the template to decode it). Gated on shouldEncode() so
  # we don't ship templates for events that went out as fullText.
  - writeObjects: /$=TenXEnv.get("filebeatEncodeObjects")

    filter: (extractorKey == "message") && isNewTemplate()

    address: $=rawOutputUnixSocketAddress

    # Send custom TenXTemplate JSON, with duplicated templateHash field as 'templateHashDocId'.
    # This is because Filebeat 'decode_json_fields' will use that to set the correct
    # Document Id for ES indexing while also removing it from the JSON.
    # See: https://www.elastic.co/guide/en/beats/filebeat/current/decode-json-fields.html
    fields: customTemplate=stringify("templateHashDocId", templateHash, "templateHash", templateHash, "template", template)
