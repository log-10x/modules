# ЁЯФЯтЭО 'run' Fluentd forward output stream configuration

# Unix domain socket output to write events back to a Fluentd forwarder
# process via the native Fluentd 'forward' protocol.
#
# Mode is selected by `outputEncodeField` and `outputWriteTemplates`
# (shared forwarder options) тАФ see run/modules/input/forwarder/module.yaml.

#  To learn more see: https://github.com/fluent/fluent-bit-docs/blob/master/pipeline/outputs/forward.md

# Set the 10x pipeline to 'run'
tenx: run

# =============================== Dependencies ================================

include:

  - source: match
    options:

      # Capture 'rawOutputForwardAddress' from tenx-unix-source.conf value as a 10x env variable
      path: run//modules/input/forwarder/fluentd/conf/auxiliary/tenx-unix-source.conf
      regex: "^\\s*path\\s+(?<rawOutputForwardAddress>.*?)$"

    # load the forward protocol over the Unix domain socket module
  - run/modules/output/event/forward

# ============================= Output Options ================================

outputForward:

  - address: $=rawOutputForwardAddress

    fields:
      - $?outputEncodeField=fullText
      - $?fluentdOutputFields

    encodeType: $?fluentdOutputEncodeType
    encodeDelimiter: ","

    writeTemplates: $?outputWriteTemplates=false
