# 🔟❎ 'run' custom output stream configuration

#    This configuration defines a request to fetch byte ranges from Object storage (e.g., AWS S3).
#   
#    This 'query' option group is instantiated by 
#    the https://doc.log10x.com/run/input/objectStorage/query module to fetch bytes ranges from Object storage
#    container (e.g., AWS S3 bucket) matching a search term, time range, and target app.

# Set the 10x pipeline to 'run'
tenx: run


# ============================== Filter Options ===============================

# 'groupFilters' apply the query's filters is set to the 'groupFilters' option.
#  To learn more see: https://doc.log10x.com/run/transform/group/#groupfilters
groupFilters:
  - 'eval[TenXEnv.get("queryObjectFrom") ? "(!this.timestamp) || TenXDate.isAfterOrEqual(this.timestamp, TenXEnv.get(\"queryObjectFrom\"))" : ("")]'
  - 'eval[TenXEnv.get("queryObjectTo") ? "(!this.timestamp) || TenXDate.isBefore(this.timestamp, TenXEnv.get(\"queryObjectTo\"))" : ("")]'
  - 'eval[TenXEnv.get("queryObjectFilter")]'
  - 'eval[Block(TenXLog_info("QOF-COMPILE: val=["+TenXEnv.get("queryObjectFilter")+"]"),"true")]'

# ============================== Input Options ================================

input:

    # 'type' defines the type of input (e.g., stdin, file, stream).
  - type: stream

    # 'path is set to the 'IndexObjectReader' reader
    #  See: https://github.com/log-10x/pipeline-extensions/blob/main/cloud-extensions/src/main/java/com/log10x/ext/cloud/index/object/IndexQueryObjectReader.java
    path: com.log10x.ext.cloud.index.query.object.IndexObjectQueryReader

    # 'printProgress' controls whether input stats are printed to the console
    printProgress: $?queryObjectPrintProgress

    # the 'foreach' macro will duplicate the input node for every instance of the
    # 'fetchBlob' option group
    foreach: fetchBlob

# ============================== Output Options ===============================

output:

    # 'type' defines the type of input (e.g., stdout, file, stream).
  - type: stream

    # 'path' is set to the 'IndexObjectWriter' class to tally the size of events read from the blob
    path: com.log10x.ext.cloud.index.query.object.IndexObjectQueryWriter

    # 'name' assigns a logical name to this output instance
    name: queryObjectUtf8Sizes

    # --------------------------- Encoding Options ----------------------------

    # 'filter' is set to write only TenXObject instances to output. 
    filter: isObject          
    
    # 'fields' are set to extract the following values from each TenXObject read
    #  from storage.
    fields: 
      - utf8Size
      
    encodeType: delimited 
    
    # 'async' is set to create a dedicated thread for this output.
    async: true

    # the 'foreach' macro will duplicate the input node for every instance of the
    # 'fetchBlob' option group
    foreach: fetchBlob

    # --------------------------- Results Output ----------------------------

    # A second output that buffers matched events to a local temp file as JSONL
    # and uploads the file to object storage on close. Enables out-of-band
    # consumers (e.g. the Log10x MCP server) to retrieve query results by
    # polling S3 under {indexObjectPath(queryResults)}/{queryId}/.
    #
    # Runs alongside the byte-count marker writer above, which remains the
    # completion backstop used by the query coordinator. Results are written
    # under a separate top-level prefix (IndexObjectType.queryResults, key
    # "qr") so the coordinator's numeric-key poll is not disturbed.
  - type: stream

    # 'path' is set to the 'IndexObjectQueryResultsWriter' class which buffers
    # events to disk and uploads them to object storage on close.
    path: com.log10x.ext.cloud.index.query.object.IndexObjectQueryResultsWriter

    # 'name' assigns a logical name to this output instance
    name: queryObjectResults

    # 'enabled' gates the results writer. Defaults to false so the extra
    # JSONL upload only runs when a caller explicitly opts in (e.g. the
    # Log10x MCP server passes writeResults=true on its query request,
    # which the coordinator forwards as queryObjectWriteResults=true on
    # the stream pipeline launch). Deployments that rely solely on the
    # byte-count marker backstop leave this off and pay no results-writer
    # overhead.
    enabled: $?queryObjectWriteResults=false

    # 'filter' is set to write only TenXObject instances to output.
    filter: isObject

    # 'fields' list the values serialized to JSON per event. Defaults to
    # 'timestamp' + 'text' (raw event text) plus every field name registered
    # by initializer modules in the global 'enrichmentFields' option, so the
    # output automatically tracks whatever enrichments the pipeline produces.
    fields:
      - timestamp
      - text
      - $=yield TenXEnv.get("enrichmentFields")

    encodeType: json

    # 'async' is set to create a dedicated thread for this output.
    async: true

    # the 'foreach' macro will duplicate the input node for every instance of the
    # 'fetchBlob' option group
    foreach: fetchBlob

    # --------------------------- Summaries Output ----------------------------

    # A third output (same Java writer class as queryObjectResults above)
    # configured for TenXSummary records produced by the optional
    # run/aggregate/stream aggregator. Routes summary JSONL to a separate
    # querySummaries S3 prefix so consumers can fetch a low-volume per-slice
    # rollup (count, bytesum, grouping fields) for high-cardinality patterns
    # instead of pulling raw events.
    #
    # Both outputs key their S3 path by the coordinator's TimeSlice:
    #   {indexObjectPath(querySummaries)}/{queryId}/{sliceFrom}_{sliceTo}/*.jsonl
    # so an MCP consumer can stream partial progress per slice without
    # waiting for the whole query to complete.
  - type: stream

    path: com.log10x.ext.cloud.index.query.object.IndexObjectQueryResultsWriter

    name: queryObjectSummaries

    # Tells the writer to upload under the querySummaries (qrs/) prefix
    # rather than the default queryResults (qr/) prefix.
    args:
      indexObjectType: querySummaries

    enabled: $?queryObjectWriteSummaries=false

    # 'filter' selects only TenXSummary instances (produced by the
    # aggregator). TenXObject instances flow to the events writer above.
    filter: isSummary

    # TenXSummary fields: count + bytesum + grouping fields. These are the
    # canonical summary attributes; pattern names + enrichment fields show
    # up under summaryValues so the consumer can group/sort client-side.
    fields:
      - timestamp
      - summaryVolume
      - summaryBytes
      - summaryValues
      - summaryTotals
      - summaryValuesHash

    encodeType: json

    async: true

    foreach: fetchBlob
