 #
 # 🔟❎ 'run' output stream settings

# Output streams define locations to write TenXObject field values
# Output stream presents a low-level approach towards defining pipeline outputs,
# and usually wrapped by higher-level configuration modules tailored for each destination.

# ------------------------------Filter Settings -------------------------------

# 'outputFilters' define a set of 10x script expressions an TenXObject must evaluate 
#  as truthy against to write to any of the outputs defined
#  by 'outputStreams'. This setting allows modules to install a 'global' reducer 
#  applied to all outputs combined with each output's 'outputFilter' property.
outputFilters: 
  - $?outputFilters

# ----------------------------- Output Settings -------------------------------

# 'outputActions' are 10x JavaScript statements that execute once per output stream.
outputActions: 
  - $?outputActions

# Below is an example of a definition of an 'output' stream defined within
# the Filebeat input/output integration in https://github.com/log-10x/modules/blob/main/pipelines/run/modules/input/forwarder/filebeat/input/stream.yaml

# output:
#   - name: event
#     type: file
#     path: in/filebeat 
#     filter: extractorKey == "log"

outputStreams:  

  - $?outputStreams
  
  # If no 'outputStreams' are defined, the default outputs below will emit 
  # optimized and aggregated object values to stdout. 
 
