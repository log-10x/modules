#
#  🔟❎ OpenTelemetry Collector Report module

module:

  name: otelCollectorReport

  title: OpenTelemetry Collector reporter

  description: read events from an OpenTelemetry Collector forwarder

  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: run/input/forwarder/otel-collector/report

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: '+include $=TenXEnv.get("docGenerate") ? "run/modules/input/forwarder/otel-collector/report/doc.md":""'    

