# 🔟❎ 'run' HTTP output module log4j configuration

# The 'http' log4j2 configuration defines the loggers and appenders to
# write TenXObject instance/template field values to an HTTP socket.
# Multiple forward outputs are supported, each specified by the instance 
# of the 'httpOutput' module defined in https://doc.log10x.com/run/output/event/http

log4j:

  # 'loggerName' defines a prefix to use with a running counter (e.g., 'tenxHttp0') 
  #  to name matching log4j2 logger and appender objects uniquely 
  #  for each instance of the 'httpOutput' options group 

  #  This provides the ability to encode TenXObjects to different sockets
  #  based on different sets of filters (specified by 'outputHttpFilter') 
  #  and fields (specified by 'outputHttpFields'). 
  loggerName: tenxHttp

  configuration:

    appenders:

      Http:

          # 'name' sets a unique identifier assigned to each appender
          #  generated for a target output defined by an instance of the 
          #  'httpOutput' options group 
        - name: $loggerName

          # The 'encodedFields' and 'filter' options of the 'tenxLayout' layout 
          # consume the 'outputHttpFields' and 'outputHttpFilter' arguments at runtime
          tenxLayout:          
            encodedFields: null
            filter: null

          url: $outputHttpUrl
          
          method: $?outputHttpMethod=POST
          
          # translate the 'outputHttpHeaders' array into a log4j property array
          property: 
            - $=TenXMap.fromEntries(TenXEnv.get("outputHttpHeaders"), "name", "value", "=")
          
    loggers:
      logger:

          # A dedicated logger whose name matches the HTTP appender is used to
          # to write TenXObject instance/template field values for this output instance
        - name: $loggerName
          additivity: false
          appenderRef:
            - ref: $loggerName
