#
# 🔟❎ 'compile' ANTLR rule selector module

module:

  name: antlrRule

  title: ANTLR language rules

  description: rules for extracting symbols from a target ANTLR AST
     
  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: +include $=TenXEnv.get("docGenerate") ? "compile/modules/scanner/antlr/rules/doc.md":""

  # 'allowMultiple' is enabled for this module. Pipeline command line arguments and configuration files
  #  can specify multiple groupings of the options defined below.
  allowMultiple: true
    
  # 'options' defines a group of named/typed configuration values to pass to a unit/module at startup
  #  via command line arguments (e.g., '> tenx -myA X -myB Y') or YAML launch files (e.g., '> tenx @my.config').
  #  Instances of this group passed are accessible at runtime via TenXEnv.get: https://doc.log10x.com/api/js/#TenXEnv.get
  options:
  
    - names:
      - antlrRuleLang
      description: lang to apply rule selector to
      type: string
      required: true
      category: rule
      doc: |
        specifies the name of the [antlrLang](https://doc.log10x.com/compile/scanner/antlr/langs) this rule selector will apply to (e.g., 'cpp'). 
      
    - names:
      - antlrRuleName
      description: grammar rule to apply this selector to
      type: string
      required: true
      category: rule
      doc: |
        specifies the rule within the target ANTLR grammar (e.g., 'enumerator') 
        to apply this selector to

    - names:
      - antlrRuleContext
      description: context to assign to symbols collected from this selector
      type: string
      required: true
      category: rule
      doc: |
        sets the source context to assign any symbols collected using this 
        this selector. For possible values, see symbol [contexts](https://doc.log10x.com/run/transform/symbol/#contexts). 
      
    - names:
      - antlrRuleRecursive
      description: sets whether to collect symbols from sub-nodes 
      type: string
      category: capture
      required: true
      doc: |
        sets whether to collect symbol values from child nodes of an ANTLR AST node selected by this rule.

    - names:
      - antlrRuleSubRule
      description: rule name to matched for any direct children of the current AST node for which extend its 'capture' behavior
      type: string
      required: false
      category: capture
      doc: |
        sets an optional rule name that, if matched for any direct children 
        of the current AST node will extend the `antlrRuleCapture` behavior
        for this node to its child node as well. This option enables
        capturing symbol values from a target node based on the name of its direct parent.

    - names:
      - antlrRuleCapture
      description: 'symbols values to capture from the current AST node. Possible: [literalsOnly,allSymbols,allSymbolsIfMatchCond,literalsIfMatchCond]'
      type: string
      required: true
      category: capture
      doc: |
        controls which values to capture from an AST node matching this rule. Possible values:
          - **literalsOnly**: capture only string literals (e.g., 'ERROR', "hello world")
          - **allSymbols**: capture all symbols, both literal (e.g., "hello") and non-quoted (e.g., 'MyClass', 'foo') values 
          - **allSymbolsIfMatchCond**: capture all symbols if this selector's `antlrRuleIfTag` equals the current tag.
          - **literalsIfMatchCond**: capture only literal symbols if this selector's `antlrRuleIfTag` equals the current tag.
         
    - names:
      - antlrRuleTag
      description: a pattern to match to apply this rule's tag 
      type: string
      required: false
      category: tag
      doc: |
        specifies a string value to set as the current ANTLR node tag and its children if the `antlrRuleCondition` pattern matches the current node.
        If 'antlrRuleCondition' is set, this value is required.

    - names:
      - antlrRuleCondition
      description: a pattern to match against the current AST node value to set 'antlrRuleTag' 
      type: string
      required: false
      category: tag
      doc: |
        sets an optional pattern to match against either the rule name or the text value of the ANTLR AST node.
        If the pattern is a match, `antlrRuleTag` is set as the current tag value for
        the current node or its children. 
   
        Any children whose `ifTag` matches the current tag 
        and `antlrRuleCapture` will capture their values based on their `antlrRuleCapture` is
        set to 'allSymbolsIfMatchCond' or 'literalsIfMatchCond'.


    - names:
      - antlrRuleIfTag
      description: tag value to compare against the 'tag' value that 
      type: string
      required: false
      category: tag
      doc: |
        specifies a string value to compare for the current node against the `tag` value set by its direct/indirect parent.
 
        If the current `tag` set by a parent node value is equal to the current node's 
        `antlrRuleIfTag` value, the `allSymbolsIfMatchCond` and `literalsIfMatchCond` 
        literal capture values below are triggered based on whether the node's value is literal (i.e., in quotations).

        For example, in the [Python ANTLR rule-set](https://github.com/log-10x/config/blob/main/pipelines/compile/config/scan/antlr/python.yaml), tagging enables a class that has 
        an `Enum` child to select left-side statement expressions 
        (i.e., its enum literals), but skip them for any other non-enum class.
