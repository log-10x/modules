# 🔟❎ 'run' OpenTelemetry Collector Unix socket input stream configuration
#
# This configuration defines a Unix domain socket input that receives
# RFC5424 syslog messages from OpenTelemetry Collector's syslog exporter.
# The syslog MSG field is extracted and passed to the Log10x pipeline.

# Set the 10x pipeline to 'run'
tenx: run

# Adding a runtime attribute for metrics reporting
runtimeAttributes:
  - fwd_input:otel-collector

# Events are read from the OpenTelemetry Collector via a Unix socket
# with syslog RFC5424 parsing enabled to extract the MSG field.
input:

  - type: stream

    name: otelCollector

    # Use the Unix socket input stream with syslog parsing
    path: com.log10x.ext.edge.input.unix.UnixSocketInputStream

    # Configuration options passed to the InputStream constructor (flat list format)
    args:
      # Unix socket path where OTel Collector's syslog exporter sends data
      - path
      - $=TenXEnv.get("otelCollectorInputPath", "/tmp/tenx-otel-in.sock")
      # Parse RFC5424 syslog format and extract MSG field only
      - syslog
      - $=TenXEnv.get("otelCollectorInputSyslog", true)

    # Sets the recommended backpressure limit for the 10x pipeline
    backpressure:
      intervalBytesLimit: $=parseBytes("2MB")
      intervalBytesDuration: $=parseDuration("1s")
