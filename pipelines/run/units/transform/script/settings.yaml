# 🔟❎ 'run' event transform settings

# 10x transforms unstructured events read from input into well-defined TenXObjects

# The structuring process analyzes the contents of input events 
# and utilizes the 10x symbol files generated by the 10x 'compile' pipeline 
# to assign/create a schema (i.e., TenXTemplate) to each instance. 

# -------------------------- Structure Settings  ------------------------------

# 'tokens' control which delimiters characters (e.g., ',' '\t') to use
#  to break incoming unstructured text lines into tokens which can then be classified
#  as 'variable' or 'symbol' tokens based on the 10x symbol files loaded into the pipeline.
tokens: +include units/transform/structure/settings.yaml

# 'timestamps' control the patterns used to try and extract epoch time stamps
#  from parsed events. Learn more at 'timestamp.yaml'
timestamps: +include units/transform/timestamp/settings.yaml

# -------------------------- Scripting Settings  ------------------------------

# 10x JavaScripts allows for run-time customization of how TenXObjects are filtered, aggregated
# and written to output streams. 

# 'inputActions' are 10x JavaScript statements that execute once per input stream.
#  Common action types include loading lookup tables, connecting to geoIP DBs, and setting counters,..
inputActions:
- $?inputActions

# 'objectActions are 10x JavaScript statements that execute for each TenXObject upon instantiation.
#  An implicit 'this' variable is passed into each expression to refer
#  to the fields of the current TenXObject instance.
objectActions:
- $?objectActions

# 'templateActions are 10x JavaScript statements that execute for each TenXTemplate upon instantiation.
templateActions:
- $?templateActions

# 'functionActions define 10x custom JavaScript functions.
functionActions:
- $?functionActions