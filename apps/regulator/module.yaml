#
# 🔟❎ 'run' Regulator module

module:

  name: regulator

  title: Regulator

  description: regulate and optionally optimize log/trace events before they ship to output

  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this module
  configFolder: apps/regulator

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: '+include $=TenXEnv.get("docGenerate") ? "apps/regulator/doc.md":""'

  # 'allowMultiple' is disabled for this module.
  allowMultiple: false

  options:

    - names:
      - regulatorOptimize
      description: enable optimization mode to encode emitted events for volume reduction
      type: boolean
      required: false
      defValue: false
      doc: |
        enables optimization mode on the regulator. When true, the regulator encodes
        emitted events using the [encode](https://doc.log10x.com/api/js/#TenXObject+encode)
        function, reducing log volume by 50-80% before shipping to the destination.

        When false (default), the regulator filters events but emits them in their
        original plain-text form via the [fullText](https://doc.log10x.com/api/js/#TenXBaseObject+fullText) field.

        **Effect on forwarder output:**
        When optimization is enabled, the forwarder output `encodeObjects` option
        defaults to `true`, and the aggregator tracks `optimized_size` metrics
        to measure optimization effectiveness.

        **Usage:**
        ```yaml
        regulator:
          optimize: true
        ```
