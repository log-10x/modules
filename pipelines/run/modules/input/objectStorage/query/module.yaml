#
# 🔟❎ 'run' Object storage query module

module:

  name: objectStorageQuery

  title: Object storage query input

  description: query an object storage container for events matching target criteria

  # 'configFolder' specifies a folder containing default configuration files for the settings defined by this unit/module
  configFolder: run/input/objectStorage/query

  # 'doc' specifies the markdown doc content, only required when generating docs.
  doc: +include $=TenXEnv.get("docGenerate") ? "run/modules/input/objectStorage/query/doc.md":""

  # 'allowMultiple' is enabled for this module. Pipeline command line arguments and configuration files
  #  can specify multiple groupings of the options defined below.
  allowMultiple: true

  # 'options' defines a group of named/typed configuration values to pass to a unit/module at startup
  #  via command line arguments (e.g., '> tenx -myA X -myB Y') or YAML launch files (e.g., '> tenx @my.config').
  #  Instances of this group passed are accessible at runtime via TenXEnv.get: https://doc.log10x.com/api/js/#TenXEnv.get
  options:

  # -------------------------------- General Options --------------------------

    - names:
        - queryName
      description: logical name for the query
      type: string
      required: false
      category: general
      doc: |
        Specifies a logical name associated with the query (e.g., `errorsQuery`)
        This value identifies this query operation in aggregated metrics reports.
        If not specified, defaults to a concatenation of [queryTarget](https://doc.log10x.com/run/input/objectStorage/query/#querytarget) and [querySearch](https://doc.log10x.com/run/input/objectStorage/query/#querysearchs)

    - names:
        - queryReadPrintProgress
      description: sets whether this input prints throughput stats to the console
      type: boolean
      required: false
      category: general
      doc: |
        sets whether this input prints throughput stats to the console
        This value is commonly used when testing an integration to a remote endpoint.

    - names:
        - queryLogLevels
      description: log levels to send to CloudWatch Logs for query progress tracking
      type: string
      required: false
      category: general
      doc: |
        Specifies which query event log levels are sent to CloudWatch Logs for tracking query progress.
        Valid values: `ERROR`, `INFO`, `DEBUG`, `PERF`.

        If not specified, defaults to `ERROR`, `INFO`, `PERF`.

        **Note:** `PERF` is required for console progress tracking (gauges, completion detection).
        Disabling it will cause the console to not detect query completion.

        ``` yaml
        queryLogLevels: ERROR,INFO,PERF
        ```

    - names:
        - queryLogGroup
      description: CloudWatch Logs log group for query event logging
      type: string
      required: false
      category: general
      doc: |
        Specifies the CloudWatch Logs log group name for logging query lifecycle events.
        The log group must be pre-created (e.g. by Terraform). If not specified or empty,
        query event logging is disabled.

        ``` yaml
        queryLogGroup: /log10x/query
        ```

    - names:
        - queryWriteResults
      description: sets whether matched events are buffered to JSONL and uploaded to object storage
      type: boolean
      required: false
      defValue: false
      category: general
      doc: |
        Controls whether the stream pipeline launches the JSONL results writer
        in addition to the byte-count marker backstop used by the query
        coordinator.

        Defaults to `false` so the extra JSONL upload only runs when a caller
        explicitly opts in. The query coordinator forwards this flag to each
        stream worker it dispatches via a `queryObjectWriteResults=<value>`
        bootstrap arg on the stream pipeline launch.

        Out-of-band consumers like the Log10x MCP server set this to `true`
        so they can retrieve full event payloads from S3 under
        `{indexObjectPath(queryResults)}/{queryId}/{sliceFrom}_{sliceTo}/*.jsonl`.
        Deployments that only rely on the coordinator's numeric-key poll
        leave this off.

        ``` yaml
        queryWriteResults: true
        ```

    - names:
        - queryWriteSummaries
      description: sets whether per-slice TenXSummary aggregates are buffered to JSONL and uploaded
      type: boolean
      required: false
      defValue: false
      category: general
      doc: |
        Controls whether the stream pipeline launches a TenXSummary-mode
        results writer in addition to the events writer (gated by
        `queryWriteResults`) and the byte-count marker backstop.

        Defaults to `false`. The query coordinator forwards this flag to each
        stream worker it dispatches via a `queryObjectWriteSummaries=<value>`
        bootstrap arg on the stream pipeline launch.

        When set to `true`, per-slice aggregated summaries (count, bytesum,
        grouping fields produced by `run/aggregate/stream`) are written to
        `{indexObjectPath(querySummaries)}/{queryId}/{sliceFrom}_{sliceTo}/*.jsonl`.
        Consumers (e.g. log10x_pattern_trend, log10x_top_patterns) can poll
        these per-slice summaries to render time-spread results for high-cardinality
        patterns without paying the bandwidth cost of full event JSONL.

        Independent of `queryWriteResults`; either can be on in isolation
        or both together.

        ``` yaml
        queryWriteSummaries: true
        ```

  # -------------------------------- Filter Options ---------------------------

    - names:
        - queryTarget
      description: logical prefix to filter index objects by
      type: string
      required: true
      category: filter
      doc: |
        specifies a logical name associated with the search target.
        This value identifies the app that produced the queried events (e.g., `acme-client`).
        
        This value corresponds with the [indexWriteTarget](https://doc.log10x.com/run/input/objectStorage/index/#indexwritetarget) argument.

    - names:
        - querySearch
      description: list of terms to search for
      type: string
      required: false
      category: filter
      doc: |
        Specifies a search expression applied to the underlying storage via [TenXTemplate filters](https://doc.log10x.com/run/input/objectStorage/index/#tenxtemplate-filters) for efficient pre-filtering.
        Supports only basic operations: `&&` (AND), `||` (OR), == (equality), and [includes](https://doc.log10x.com/api/js/#TenXString.includes) (substring match).
        
        Example: 
        
        ``` js
        (level==INFO || level==WARN) && includes(text, "POST")
        ```
        
        This narrows down data fetched from storage before in-memory processing. 
        To perform more complex in-memory filtering, specify [queryFilters](https://doc.log10x.com/run/input/objectStorage/query/#queryfilters).

    - names:
        - queryFilters
      description: list of terms to search for
      type: list
      required: false
      category: filter
      doc: |
        Specifies JavaScript expressions applied in-memory to all TenXObjects that match the [querySearch](https://doc.log10x.com/run/input/objectStorage/query/#querysearch) expression.
        
        Supports all valid [TenX JavaScript](https://doc.log10x.com/api/js/) expressions for complex filtering, enrichment, and processing.
        
        This provides precise, exact filtering after data is fetched from storage.
        
        ``` yaml
        queryFilters:
          - LevelTemplate.level == "ERROR" 
          - Math.max(this.price, 100)
        ```

    - names:
        - queryFrom
      description: beginning of the search time range (inclusive)
      type: string
      required: true
      category: filter
      doc: |
        defines the beginning of the search time range (inclusive) expressed as a UNIX millisecond epoch value. 
        
        This value commonly uses the [now](https://doc.log10x.com/api/js/#TenXDate.now) function.

        For example, to express the value of one hour before the current millisecond epoch, specify:

        ``` yaml
        queryFrom: now("-1h")
        ```

    - names:
        - queryTo
      description: end of the search time range (exclusive)
      type: string
      required: true
      category: filter
      doc: |
        defines the end of the search time range expressed as a UNIX millisecond epoch value (exclusive). 
        
        This value commonly uses the [now](https://doc.log10x.com/api/js/#TenXDate.now) function.

        For example, to express the value of the current millisecond epoch, specify:

        ``` yaml
        queryTo: now()
        ```

  # ----------------------------- Container Options ---------------------------

    - names:
        - queryObjectStorageName
      description: object storage logical name
      type: String
      required: true
      category: access
      doc: |
        identifies the [Object Storage](https://doc.log10x.com/run/input/objectStorage/#objectstorageclassname) against which this query is made (e.g., `AWS`).

    - names:
        - queryIndexContainer
      description: Object storage container containing index objects
      type: String
      required: true
      category: scan
      doc: |
        specifies the object storage container (e.g., AWS S3 bucket) name in which to store [TenXTemplate Filters](https://doc.log10x.com/run/input/objectStorage/index/#tenxtemplate-filters)'.
        
        This value corresponds with the [indexWriteContainer](https://doc.log10x.com/run/input/objectStorage/index)

    - names:
        - queryReadContainer
      description: location of the output file for writing TenXObject field values
      type: String
      required: true
      category: stream
      doc: |
        specifies the object storage container (e.g., S3 bucket) name where input objects (e.g., log file) to scan are stored.
        
        This value corresponds with the [indexWriteContainer](https://doc.log10x.com/run/input/objectStorage/index)

    - names:
        - queryObjectStorageArgs
      description: custom object storage args
      type: list
      required: false
      category: advanced
      doc: |
        custom arguments passed as a map to the constructor of the underlying [object storage](https://doc.log10x.com/run/input/objectStorage/query/#indexobjectstoragename).
        This list is expected to hold pairs of key values (e.g., args: [key1, value1, key2, value2])

  # ----------------------------- Fetch Limit Options -------------------------

    - names:
        - queryLimitProcessingTime
      description: max milliseconds alloted for this query
      type: string
      required: true
      category: limit
      doc: |
        Milliseconds allotted for this query to complete. Once this period has elapsed the query will terminate regardless of
        whether [queryLimitResultSize](https://doc.log10x.com/run/input/objectStorage/query/#querylimitresultsize) has not been exceeded.

    - names:
        - queryLimitResultSize
      description: max byte volume of matching events to fetch
      type: string
      required: true
      category: limit
      doc: |
        volume in bytes of events matching the app prefix, terms and time range to fetch.
        Once this volume has been reached the query will terminate.

        If [queryLimitProcessingTime](https://doc.log10x.com/run/input/objectStorage/query/#querylimitprocessingtime) has elapsed before the requested result volume has been fetched, the query will still terminate.
 
  # --------------------------- Scan Worker Options -------------------------

    - names:
        - queryScanFunctionParallelTimeslice
      description: max time range to process by a scan worker instance
      type: string
      required: false
      category: scan
      doc: |
        specifies the max time duration (e.g., 1min) an instance of the [scan](https://doc.log10x.com/run/input/objectStorage/query/#scan) worker will traverse within the index.
        For example, if a query specifies a time range of `15min` and this value is set to `1m`, 15 instances of the scan
        worker will execute in parallel to scan through the index.
        If this value is 0, a single worker instance will sequentially scan through the index.

    - names:
        - queryScanFunctionParallelMaxInstances
      description: max number of instances of the scan worker
      type: number
      required: false
      category: scan
      doc: |
        specifies the maximum number of [scan](https://doc.log10x.com/run/input/objectStorage/query/#scan) worker instances that will traverse the index.
        if the provided time range and [timeSlice](https://doc.log10x.com/run/input/objectStorage/query/#queryscanfunctionparalleltimeslice) provided will result in more instances than the
        provided value, the time slice will increase its size until the amount of workers needed
        will be less than this value.

        For example, if a query specifies a time range of `60min` and a time slice of `1m`, while this
        value is set to `25`, the time slice will be effectively increased to `3m` to accommodate this.
        
        The maximum value for this option is: 10,000
      defValue: 1000

    - names:
        - queryScanFunctionParallelThreads
      description: max number of threads allocated per each 'scan' worker instance
      type: number
      required: false
      category: scan
      doc: |
        sets the number of JVM threads to scan through a time slice of the index within a [scan](https://doc.log10x.com/run/input/objectStorage/query/#scan) worker instance.
        For example, if [timeSlice](https://doc.log10x.com/run/input/objectStorage/query/#queryscanfunctionparalleltimeslice) is `10min` and this value is set to 10,
        scan each 1m index time range using a dedicated thread.
        If set to 1 or 0, a single thread will scan through the entire index time range (e.g., 10min).

    - names:
        - queryScanFlushInterval
      description: interval to wait before posting pending 'stream' worker requests
      type: string
      required: false
      category: scan
      doc: |
        specifies a maximum interval (e.g., `2sec`) when scanning an index time slice to wait
        to submit pending [stream](https://doc.log10x.com/run/input/objectStorage/query/#stream) worker requests.
        If not set, all stream worker requests are sent after the index scanning process for a target index time slice has finished.

    - names:
        - queryScanFunctionUrl
      description: scan worker endpoint URL
      type: string
      required: true
      category: scan
      doc: |
        specifies the endpoint used to invoke the [scan](https://doc.log10x.com/run/input/objectStorage/query/#scan) worker

  # --------------------------- Stream Worker Options -----------------------

    - names:
        - queryStreamFunctionParallelObjects
      description: max number of input object byte ranges to process in a single 'stream' instance
      type: number
      required: false
      category: stream
      doc: |
        defines the maximum number of Storage objects to process
        by a single instance of the [stream](https://doc.log10x.com/run/input/objectStorage/query/#stream) worker.

        For example, if set to 50 and the [scan](https://doc.log10x.com/run/input/objectStorage/query/#scan) phase
        has identified 200 potentially matching input object byte ranges,
        four instances of the stream worker will split the workload in parallel.

    - names:
        - queryStreamFunctionParallelByteRange
      description: max input object bytes for a single fetch request
      type: string
      required: true
      category: stream
      doc: |
        defines the max byte range within an input object (e.g., log file) that can fetched via a single request.
        
        For example, if this value is `5Mb` and two matching 1Mb
        byte ranges spaced 2Mb apart are identified within a target object
        fetch both from the storage via a single operation.
        If there is a 2Mb gap, launch two instances of the [stream](https://doc.log10x.com/run/input/objectStorage/query/#stream) worker.

    - names:
        - queryStreamFunctionUrl
      description: stream worker endpoint URL
      type: string
      required: true
      category: stream
      doc: |
        specifies the endpoint used to invoke the [stream](https://doc.log10x.com/run/input/objectStorage/query/#stream) worker

  # --------------------------- Internal Options -----------------------------

  # These options distribute the index 'scan' phase across parallel instances of the worker.

    - names:
        - queryFilterVars
      description: specifies a list of variable values to scan for
      type: list
      required: false
      category: advanced
      doc: |
        specifies a list of variable values to scan for

    - names:
        - queryFilterTemplateHashes
      description: specifies a list of TenXTemplate hash values to scan for
      type: list
      required: false
      category: advanced
      doc: |
        specifies a list of TenXTemplate hash values to scan for

    - names:
        - queryId
      description: unique ID of host query
      type: string
      required: false
      category: advanced
      doc: |
        UUID identifying this query. This value is automatically assigned if not explicitly set.

    - names:
        - queryElapseTime
      description: epoch after which processing times out
      type: number
      required: false
      category: advanced
      doc: |
        Epoch value which if exceeds the current system time will result in this request being cancelled

    - names:
        - queryScanFunctionLimitResultSizeInterval
      description: interval by which to check whether 'queryLimitResultSize' is exceeded
      type: string
      required: false
      category: advanced
      doc: |
        interval by which to check whether [queryLimitResultSize](https://doc.log10x.com/run/input/objectStorage/query/#querylimitresultsize)
        that is the query has returned >= the request result volume.
